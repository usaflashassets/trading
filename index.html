<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Dubai Live Trade | Pro Terminal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-firestore-compat.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap');
        body { background: #020408; color: #e2e8f0; font-family: 'Plus Jakarta Sans', sans-serif; margin: 0; height: 100dvh; overflow: hidden; }
        .glass { background: rgba(15, 23, 42, 0.8); backdrop-filter: blur(16px); border: 1px solid rgba(255,255,255,0.05); }
        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.98); z-index: 1000; align-items: center; justify-content: center; padding: 15px; }
        .auth-input { background: #0f172a; border: 1px solid #1e293b; padding: 12px; border-radius: 12px; width: 100%; color: white; outline: none; }
        
        /* Terminal Layout */
        #appTerminal { display: none; height: 100dvh; flex-direction: column; padding: 10px; }
        
        /* ASSETS HUB (EXACT SCREENSHOT LAYOUT) */
        #assetsPanel { display: none; position: fixed; inset: 0; background: #020408; z-index: 500; overflow-y: auto; padding: 20px; animation: slideUp 0.3s ease; }
        @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
        .history-card { background: #0a0f1d; border-radius: 15px; padding: 12px; margin-bottom: 10px; border: 1px solid rgba(255,255,255,0.03); display: flex; justify-content: space-between; align-items: center; }
        .status-badge { padding: 3px 10px; border-radius: 50px; font-size: 8px; font-weight: 800; text-transform: uppercase; }
        .pending { background: rgba(234, 179, 8, 0.1); color: #eab308; }
        .success { background: rgba(34, 197, 94, 0.1); color: #22c55e; }
        
        #loadingScreen { position: fixed; inset: 0; background: #020408; z-index: 9999; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .loader-spin { width: 35px; height: 35px; border: 3px solid #1a1f29; border-top: 3px solid #fbbf24; border-radius: 50%; animation: spin 0.8s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

    <div id="loadingScreen"><div class="loader-spin"></div></div>

    <div id="authSec" class="hidden h-full flex items-center justify-center p-6">
        <div class="glass w-full max-w-xs p-8 rounded-[35px] text-center">
            <h1 class="text-2xl font-black text-white italic mb-8">PRO TRADE</h1>
            <input type="email" id="email" placeholder="Email" class="auth-input mb-3">
            <input type="password" id="pass" placeholder="Password" class="auth-input mb-6">
            <button onclick="handleAuth()" class="w-full py-4 bg-yellow-500 text-black font-black rounded-2xl uppercase text-[11px]">Login Terminal</button>
        </div>
    </div>

    <div id="appTerminal">
        <header class="flex justify-between items-center mb-4">
            <div class="flex items-center gap-3">
                <div onclick="showM('profileM')" id="userInitial" class="w-10 h-10 rounded-xl bg-yellow-500 flex items-center justify-center text-black font-black cursor-pointer shadow-lg">👤</div>
                <div><p class="text-[8px] text-gray-500 font-bold uppercase">Balance</p><h2 id="balanceDisp" class="text-xl font-black text-white">$0.00</h2></div>
            </div>
            <button onclick="openAssets()" class="bg-white text-black px-5 py-2.5 rounded-xl text-[10px] font-black uppercase shadow-white/10 shadow-lg">My Assets</button>
        </header>

        <select id="assetSelect" onchange="loadChart(this.value)" class="w-full bg-white/5 border border-white/10 rounded-xl p-3 text-yellow-500 font-bold text-xs outline-none mb-3">
            <optgroup label="FOREX MAJOR (OTC)">
                <option value="FX:EURUSD">EUR/USD</option><option value="FX:GBPUSD">GBP/USD</option><option value="FX:USDJPY">USD/JPY</option><option value="FX:AUDUSD">AUD/USD</option><option value="FX:USDCAD">USD/CAD</option>
            </optgroup>
            <optgroup label="CRYPTO ASSETS">
                <option value="BINANCE:BTCUSDT">BTC/USDT</option><option value="BINANCE:ETHUSDT">ETH/USDT</option><option value="BINANCE:SOLUSDT">SOL/USDT</option><option value="BINANCE:BNBUSDT">BNB/USDT</option>
            </optgroup>
        </select>

        <main class="relative flex-grow rounded-[30px] overflow-hidden bg-black border border-white/5 mb-3">
            <div id="tv_chart" class="h-full w-full"></div>
            <div id="tradeTimer" class="hidden absolute bottom-5 right-5 bg-yellow-500 text-black px-4 py-1.5 rounded-full font-black text-xs">⏱ <span id="timerText">00:00</span></div>
        </main>

        <footer class="glass p-5 rounded-[35px]">
            <div class="grid grid-cols-2 gap-4 mb-4">
                <div class="bg-black/50 p-3 rounded-2xl border border-white/5">
                    <span class="text-[8px] text-gray-500 font-bold uppercase block mb-1 ml-1">Trade Amount</span>
                    <input id="tradeAmt" type="number" value="100" class="bg-transparent outline-none font-black text-white text-lg w-full">
                </div>
                <div class="bg-black/50 p-3 rounded-2xl border border-white/5">
                    <span class="text-[8px] text-gray-500 font-bold uppercase block mb-1 ml-1">Expiry</span>
                    <select id="duration" class="bg-transparent font-black text-white text-lg w-full outline-none">
                        <option value="5">5s</option><option value="15">15s</option><option value="60">1m</option><option value="300">5m</option>
                    </select>
                </div>
            </div>
            <div class="grid grid-cols-2 gap-4">
                <button onclick="initTrade('UP')" class="h-14 rounded-2xl font-black text-white uppercase bg-green-600">Call</button>
                <button onclick="initTrade('DOWN')" class="h-14 rounded-2xl font-black text-white uppercase bg-red-600">Put</button>
            </div>
        </footer>
    </div>

    <div id="assetsPanel">
        <header class="flex justify-between items-center py-6 mb-4">
            <h2 class="text-xl font-black italic text-white uppercase">Member Hub</h2>
            <button onclick="closeAssets()" class="w-10 h-10 rounded-full bg-white/5 flex items-center justify-center text-white text-xl">&times;</button>
        </header>

        <div class="glass p-8 rounded-[40px] mb-6 text-center border border-white/10 shadow-2xl relative overflow-hidden">
            <div class="flex items-center gap-4 justify-center mb-6">
                <div class="w-12 h-12 bg-yellow-500 rounded-xl flex items-center justify-center text-2xl shadow-xl shadow-yellow-500/20">👤</div>
                <div class="text-left">
                    <p class="text-[8px] text-gray-500 font-bold uppercase">Total Balance</p>
                    <h1 id="assetBalDisp" class="text-3xl font-black text-white">$0.00</h1>
                </div>
                <span class="ml-auto flex items-center gap-1"><span class="w-1.5 h-1.5 bg-green-500 rounded-full animate-pulse"></span> <p class="text-[8px] font-bold text-white uppercase opacity-40">Live</p></span>
            </div>
            <div class="grid grid-cols-2 gap-3">
                <button onclick="showM('depM')" class="py-4 bg-white text-black font-black rounded-2xl text-[10px] uppercase">Deposit</button>
                <button onclick="showM('witM')" class="py-4 bg-red-600 text-white font-black rounded-2xl text-[10px] uppercase">Withdraw</button>
            </div>
            <button onclick="showM('histM')" class="w-full mt-3 py-3 border border-white/5 bg-white/5 rounded-xl text-[9px] font-black uppercase text-gray-400">Transaction History</button>
        </div>
    </div>

    <div id="depM" class="modal">
        <div class="glass p-8 rounded-[35px] w-full max-w-sm">
            <div id="dStep0" class="space-y-3">
                <h2 class="text-center font-black uppercase text-xs mb-4">Choose Method</h2>
                <button onclick="toD(1, 'crypto')" class="w-full p-5 bg-white/5 border border-white/10 rounded-2xl font-bold text-left">Deposit Crypto (USDT)</button>
                <button onclick="toD(1, 'pkr')" class="w-full p-5 bg-white/5 border border-white/10 rounded-2xl font-bold text-left">Deposit PKR (Bank)</button>
            </div>
            <div id="dStep1" class="hidden">
                <input type="number" id="dAmount" placeholder="Enter Amount" class="auth-input mb-4 text-center text-xl font-black">
                <button onclick="toD(2)" class="w-full py-4 bg-yellow-500 text-black font-black rounded-2xl uppercase">Next Step</button>
            </div>
            <div id="dStep2" class="hidden text-center">
                <img id="depQR" src="" class="mx-auto mb-4 p-2 bg-white rounded-2xl w-40 h-40">
                <p id="cryptoAddr" class="text-[8px] text-gray-500 break-all mb-6 px-4 hidden">0x76ecfe8a3bd89297189e16cdcd275d743fb71a62</p>
                <button onclick="toD(3)" class="w-full py-4 bg-yellow-500 text-black font-black rounded-2xl uppercase">I Have Paid</button>
            </div>
            <div id="dStep3" class="hidden space-y-3">
                <input type="text" id="dName" placeholder="Account Name" class="auth-input">
                <input type="number" id="dSent" placeholder="Amount Sent" class="auth-input">
                <input type="text" id="dTxid" placeholder="Transaction ID" class="auth-input">
                <button onclick="submitDep()" class="w-full py-4 bg-green-600 text-white font-black rounded-2xl uppercase">Submit Now</button>
            </div>
            <button onclick="hideM('depM')" class="w-full mt-4 text-[9px] text-gray-600 font-bold uppercase">Cancel</button>
        </div>
    </div>

    <div id="witM" class="modal">
        <div class="glass p-8 rounded-[35px] w-full max-w-sm">
            <div id="wStep0" class="space-y-3">
                <h2 class="text-center font-black uppercase text-xs mb-4">Withdraw Method</h2>
                <button onclick="toW('crypto')" class="w-full p-5 bg-white/5 border border-white/10 rounded-2xl font-bold text-left">Crypto Withdraw</button>
                <button onclick="toW('pkr')" class="w-full p-5 bg-white/5 border border-white/10 rounded-2xl font-bold text-left">PKR Withdraw</button>
            </div>
            <div id="wCrypto" class="hidden space-y-3">
                <select id="wcNet" class="auth-input"><option>USDT (BEP20)</option><option>USDT (TRC20)</option></select>
                <input type="text" id="wcWallet" placeholder="Wallet Address" class="auth-input">
                <input type="number" id="wcAmt" placeholder="Amount ($)" class="auth-input">
                <button onclick="submitWit('crypto')" class="w-full py-4 bg-white text-black font-black rounded-2xl uppercase">Submit</button>
            </div>
            <div id="wPkr" class="hidden space-y-3">
                <select id="wpBank" class="auth-input"><option>EasyPaisa</option><option>JazzCash</option><option>Bank Transfer</option></select>
                <input type="text" id="wpAccNum" placeholder="Account Number" class="auth-input">
                <input type="text" id="wpAccName" placeholder="Account Name" class="auth-input">
                <input type="number" id="wpAmt" placeholder="Amount (PKR)" class="auth-input">
                <button onclick="submitWit('pkr')" class="w-full py-4 bg-white text-black font-black rounded-2xl uppercase">Submit</button>
            </div>
            <button onclick="hideM('witM')" class="w-full mt-4 text-[9px] text-gray-600 font-bold uppercase">Back</button>
        </div>
    </div>

    <div id="histM" class="modal">
        <div class="glass p-6 rounded-[35px] w-full max-w-sm h-[70vh] flex flex-col">
            <div class="flex gap-2 mb-4">
                <button onclick="loadHistory('requests')" class="flex-1 py-3 bg-yellow-500/10 text-yellow-500 rounded-xl text-[9px] font-black uppercase">Deposits</button>
                <button onclick="loadHistory('withdrawals')" class="flex-1 py-3 bg-red-600/10 text-red-600 rounded-xl text-[9px] font-black uppercase">Withdraws</button>
            </div>
            <div id="historyList" class="flex-grow overflow-y-auto pr-1"></div>
            <button onclick="hideM('histM')" class="mt-4 text-gray-500 font-bold text-[9px] uppercase text-center w-full">Close</button>
        </div>
    </div>

    <div id="profileM" class="modal"><div class="glass p-10 rounded-[45px] w-80 text-center"><p id="uEmail" class="text-white font-bold text-xs mb-8 opacity-40"></p><button onclick="auth.signOut().then(()=>location.reload())" class="w-full py-4 bg-red-600/10 text-red-500 border border-red-600/10 rounded-2xl font-black uppercase text-[10px]">Logout</button><button onclick="hideM('profileM')" class="mt-6 text-gray-500 font-bold text-[10px] uppercase">Back</button></div></div>
    <div id="resultM" class="modal"><div id="resultBox" class="glass p-12 rounded-[50px] text-center w-85"></div></div>

    <script type="text/javascript" src="https://s3.tradingview.com/tv.js"></script>
    <script>
        const firebaseConfig = { apiKey: "AIzaSyAySRA1YSpTpmC8WjnKmDhnNMHkEmkeP50", authDomain: "waqas-47f30.firebaseapp.com", projectId: "waqas-47f30", storageBucket: "waqas-47f30.appspot.com", messagingSenderId: "374104279093", appId: "1:374104279093:web:6e1844b60456c700940364" };
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth(), db = firebase.firestore();
        let userData = null, curDM = '', chartLoaded = false;

        // FAST LOAD LOGIC
        auth.onAuthStateChanged(user => {
            const loader = document.getElementById('loadingScreen');
            if(user) {
                document.getElementById('authSec').style.display = 'none';
                document.getElementById('appTerminal').style.display = 'flex';
                loader.style.display = 'none';
                db.collection('users').doc(user.uid).onSnapshot(doc => {
                    userData = doc.data() || { balance: 0 };
                    const bal = "$" + (userData.balance || 0).toFixed(2);
                    document.getElementById('balanceDisp').innerText = bal;
                    document.getElementById('assetBalDisp').innerText = bal;
                    document.getElementById('uEmail').innerText = user.email;
                    if(!chartLoaded) { loadChart('FX:EURUSD'); chartLoaded = true; }
                });
            } else {
                loader.style.display = 'none';
                document.getElementById('authSec').style.display = 'flex';
            }
        });

        async function handleAuth() {
            const e = document.getElementById('email').value, p = document.getElementById('pass').value;
            if(!e || !p) return alert("Details Required");
            try { await auth.signInWithEmailAndPassword(e, p); } catch(err) { alert(err.message); }
        }

        function loadChart(s) { new TradingView.widget({ "autosize": true, "symbol": s, "interval": "1", "theme": "dark", "container_id": "tv_chart", "hide_top_toolbar": true, "hide_side_toolbar": true }); }
        function openAssets() { document.getElementById('assetsPanel').style.display = 'block'; }
        function closeAssets() { document.getElementById('assetsPanel').style.display = 'none'; }
        function showM(id) { document.getElementById(id).style.display = 'flex'; }
        function hideM(id) { document.getElementById(id).style.display = 'none'; }

        // DEPOSIT STEPS
        function toD(s, m) {
            if(m) {
                curDM = m;
                document.getElementById('depQR').src = m === 'crypto' ? "https://api.qrserver.com/v1/create-qr-code/?size=180x180&data=0x76ecfe8a3bd89297189e16cdcd275d743fb71a62" : "https://i.postimg.cc/HLPQpW92/Screenshot-20260504-033311.jpg";
                m === 'crypto' ? document.getElementById('cryptoAddr').classList.remove('hidden') : document.getElementById('cryptoAddr').classList.add('hidden');
            }
            ['dStep0','dStep1','dStep2', 'dStep3'].forEach(d => document.getElementById(d).classList.add('hidden'));
            document.getElementById('dStep'+s).classList.remove('hidden');
        }

        async function submitDep() {
            const amt = document.getElementById('dSent').value, tx = document.getElementById('dTxid').value;
            if(!amt || !tx) return alert("Fill details");
            await db.collection('requests').add({ uid: auth.currentUser.uid, email: auth.currentUser.email, amount: parseFloat(amt), currency: curDM==='crypto'?'USD':'PKR', txid: tx, status: 'Pending', time: Date.now() });
            alert("Deposit Submitted!"); hideM('depM');
        }

        // WITHDRAW STEPS
        function toW(m) {
            document.getElementById('wStep0').classList.add('hidden');
            if(m==='crypto') document.getElementById('wCrypto').classList.remove('hidden');
            else document.getElementById('wPkr').classList.remove('hidden');
        }

        async function submitWit(type) {
            let amt = 0;
            if(type === 'crypto') {
                amt = parseFloat(document.getElementById('wcAmt').value);
                if(userData.balance < amt) return alert("Low Balance");
                await db.collection('withdrawals').add({ uid: auth.currentUser.uid, email: auth.currentUser.email, amount: amt, currency: 'USD', status: 'Pending', time: Date.now() });
            } else {
                amt = parseFloat(document.getElementById('wpAmt').value);
                let usd = amt / 280;
                if(userData.balance < usd) return alert("Low Balance");
                await db.collection('withdrawals').add({ uid: auth.currentUser.uid, email: auth.currentUser.email, amount: amt, currency: 'PKR', status: 'Pending', time: Date.now() });
            }
            alert("Withdrawal Pending!"); hideM('witM');
        }

        async function loadHistory(coll) {
            db.collection(coll).where('uid', '==', auth.currentUser.uid).onSnapshot(snap => {
                let html = '';
                snap.forEach(doc => {
                    const d = doc.data();
                    html += `<div class="history-card"><div><p class="text-white text-[10px] font-black uppercase">${coll==='requests'?'Deposit':'Withdraw'}</p></div><div class="text-right"><p class="font-black text-white">$${d.amount}</p><span class="status-badge pending">${d.status}</span></div></div>`;
                });
                document.getElementById('historyList').innerHTML = html || '<p class="text-center py-10 opacity-20 text-[8px]">NO ACTIVITY</p>';
            });
        }

        // TRADE LOGIC
        async function initTrade() {
            const amt = parseFloat(document.getElementById('tradeAmt').value), dur = parseInt(document.getElementById('duration').value);
            if(amt > userData.balance) return alert("Low balance");
            await db.collection('users').doc(auth.currentUser.uid).update({ balance: firebase.firestore.FieldValue.increment(-amt) });
            document.getElementById('tradeTimer').classList.remove('hidden');
            let l = dur;
            let iv = setInterval(() => {
                let m = Math.floor(l/60), s = l%60;
                document.getElementById('timerText').innerText = `${m
