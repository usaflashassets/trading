<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ProTrade Global | Elite Terminal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-firestore-compat.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap');
        body { background: #05070a; color: #e2e8f0; font-family: 'Plus Jakarta Sans', sans-serif; overflow: hidden; height: 100dvh; margin: 0; }
        .glass-card { background: rgba(17, 24, 39, 0.8); backdrop-filter: blur(12px); border: 1px solid rgba(255,255,255,0.05); }
        .auth-input { background: #1a1f29; border: 1px solid #2d3748; padding: 14px; border-radius: 12px; width: 100%; color: white; outline: none; }
        #appTerminal { display: none; height: 100dvh; flex-direction: column; padding: 8px; }
        .timer-badge { position: absolute; bottom: 10px; right: 10px; background: #eab308; color: black; padding: 5px 15px; border-radius: 50px; font-weight: 800; display: none; z-index: 100; font-size: 12px; }
        .btn-grad-green { background: linear-gradient(135deg, #22c55e 0%, #15803d 100%); }
        .btn-grad-red { background: linear-gradient(135deg, #ef4444 0%, #b91c1c 100%); }
        #loadingScreen { position: fixed; inset: 0; background: #05070a; z-index: 9999; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .loader-spin { width: 35px; height: 35px; border: 3px solid #1a1f29; border-top: 3px solid #eab308; border-radius: 50%; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        
        /* Profile Fancy Items */
        .profile-item { background: rgba(255, 255, 255, 0.03); border: 1px solid rgba(255, 255, 255, 0.08); border-radius: 16px; padding: 12px 16px; margin-bottom: 12px; display: flex; align-items: center; justify-content: space-between; }
        .logout-btn { background: linear-gradient(135deg, #ef4444 0%, #991b1b 100%); transition: transform 0.2s ease; }

        /* ═══════════════════════════════════════════
           FANCY MODAL SYSTEM
        ═══════════════════════════════════════════ */
        .modal {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.85);
            backdrop-filter: blur(8px);
            z-index: 1000;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .modal.active { display: flex; animation: modalFadeIn 0.3s ease; }
        @keyframes modalFadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        /* Fancy Modal Box */
        .fancy-modal-box {
            position: relative;
            width: 100%;
            max-width: 380px;
            border-radius: 28px;
            overflow: hidden;
            animation: modalSlideUp 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
        }
        @keyframes modalSlideUp {
            from { opacity: 0; transform: translateY(60px) scale(0.92); }
            to { opacity: 1; transform: translateY(0) scale(1); }
        }

        /* Modal Inner Glow Border */
        .fancy-modal-box::before {
            content: '';
            position: absolute;
            inset: 0;
            border-radius: 28px;
            padding: 1px;
            background: linear-gradient(135deg, rgba(234,179,8,0.6), rgba(255,255,255,0.05), rgba(234,179,8,0.3));
            -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
            -webkit-mask-composite: xor;
            mask-composite: exclude;
            pointer-events: none;
            z-index: 2;
        }

        .fancy-modal-inner {
            background: linear-gradient(145deg, #0d1117 0%, #111827 60%, #0a0f1a 100%);
            padding: 32px 28px;
            position: relative;
            z-index: 1;
        }

        /* Decorative corner accent */
        .fancy-modal-inner::before {
            content: '';
            position: absolute;
            top: 0; right: 0;
            width: 120px; height: 120px;
            background: radial-gradient(circle at top right, rgba(234,179,8,0.08), transparent 70%);
            pointer-events: none;
        }

        /* Modal Header */
        .modal-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 24px;
        }
        .modal-title-tag {
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .modal-icon-circle {
            width: 38px; height: 38px;
            border-radius: 12px;
            display: flex; align-items: center; justify-content: center;
            font-size: 17px;
            flex-shrink: 0;
        }
        .modal-icon-circle.gold { background: linear-gradient(135deg, #fbbf24, #d97706); box-shadow: 0 4px 15px rgba(251,191,36,0.35); }
        .modal-icon-circle.red { background: linear-gradient(135deg, #ef4444, #b91c1c); box-shadow: 0 4px 15px rgba(239,68,68,0.35); }
        .modal-icon-circle.blue { background: linear-gradient(135deg, #3b82f6, #1d4ed8); box-shadow: 0 4px 15px rgba(59,130,246,0.35); }
        .modal-icon-circle.green { background: linear-gradient(135deg, #22c55e, #15803d); box-shadow: 0 4px 15px rgba(34,197,94,0.35); }

        .modal-title-text h3 {
            font-size: 14px;
            font-weight: 800;
            color: #fff;
            letter-spacing: 1.5px;
            text-transform: uppercase;
            line-height: 1;
        }
        .modal-title-text p {
            font-size: 9px;
            color: rgba(255,255,255,0.35);
            font-weight: 600;
            margin-top: 2px;
            letter-spacing: 0.5px;
        }

        .modal-close-btn {
            width: 34px; height: 34px;
            border-radius: 10px;
            background: rgba(255,255,255,0.04);
            border: 1px solid rgba(255,255,255,0.08);
            color: rgba(255,255,255,0.4);
            display: flex; align-items: center; justify-content: center;
            cursor: pointer;
            font-size: 18px;
            transition: all 0.2s;
            line-height: 1;
        }
        .modal-close-btn:hover { background: rgba(255,255,255,0.08); color: white; }

        /* Divider line */
        .modal-divider {
            height: 1px;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.07), transparent);
            margin: 0 -28px 24px -28px;
        }

        /* Fancy Input */
        .fancy-input-wrap {
            position: relative;
            margin-bottom: 14px;
        }
        .fancy-input-label {
            font-size: 8px;
            font-weight: 800;
            color: rgba(255,255,255,0.3);
            letter-spacing: 1.5px;
            text-transform: uppercase;
            margin-bottom: 6px;
            display: block;
        }
        .fancy-input {
            width: 100%;
            background: rgba(255,255,255,0.03);
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 14px;
            padding: 14px 16px;
            color: white;
            font-size: 13px;
            font-weight: 600;
            outline: none;
            transition: border-color 0.2s, box-shadow 0.2s;
            box-sizing: border-box;
            font-family: 'Plus Jakarta Sans', sans-serif;
        }
        .fancy-input:focus {
            border-color: rgba(234,179,8,0.5);
            box-shadow: 0 0 0 3px rgba(234,179,8,0.07);
        }
        .fancy-input option { background: #111827; color: white; }

        /* Step indicator */
        .step-indicator {
            display: flex;
            align-items: center;
            gap: 6px;
            margin-bottom: 20px;
        }
        .step-dot {
            width: 6px; height: 6px;
            border-radius: 50%;
            background: rgba(255,255,255,0.1);
            transition: all 0.3s;
        }
        .step-dot.active { background: #eab308; width: 18px; border-radius: 3px; }
        .step-dot.done { background: rgba(34,197,94,0.6); }

        /* Fancy Primary Button */
        .fancy-btn-primary {
            width: 100%;
            padding: 15px;
            border-radius: 16px;
            font-size: 11px;
            font-weight: 800;
            letter-spacing: 2px;
            text-transform: uppercase;
            cursor: pointer;
            border: none;
            position: relative;
            overflow: hidden;
            transition: transform 0.15s, box-shadow 0.15s;
            font-family: 'Plus Jakarta Sans', sans-serif;
        }
        .fancy-btn-primary:active { transform: scale(0.97); }
        .fancy-btn-primary.gold {
            background: linear-gradient(135deg, #fbbf24 0%, #f59e0b 50%, #d97706 100%);
            color: #000;
            box-shadow: 0 8px 25px rgba(251,191,36,0.3);
        }
        .fancy-btn-primary.gold:hover { box-shadow: 0 12px 35px rgba(251,191,36,0.45); }
        .fancy-btn-primary.blue {
            background: linear-gradient(135deg, #3b82f6 0%, #2563eb 100%);
            color: white;
            box-shadow: 0 8px 25px rgba(59,130,246,0.3);
        }
        .fancy-btn-primary.white {
            background: linear-gradient(135deg, #fff 0%, #e5e7eb 100%);
            color: #000;
            box-shadow: 0 8px 25px rgba(255,255,255,0.1);
        }

        /* Cancel link */
        .fancy-cancel {
            text-align: center;
            margin-top: 14px;
            font-size: 9px;
            font-weight: 700;
            color: rgba(255,255,255,0.2);
            letter-spacing: 1px;
            text-transform: uppercase;
            cursor: pointer;
            transition: color 0.2s;
        }
        .fancy-cancel:hover { color: rgba(255,255,255,0.4); }

        /* QR Payment Box */
        .qr-payment-box {
            background: rgba(255,255,255,0.02);
            border: 1px solid rgba(255,255,255,0.06);
            border-radius: 20px;
            padding: 20px;
            text-align: center;
            margin-bottom: 16px;
        }
        .qr-payment-box img {
            width: 160px; height: 160px;
            object-fit: contain;
            border-radius: 12px;
            background: white;
            padding: 8px;
            margin: 0 auto 12px auto;
            display: block;
        }
        .qr-label {
            font-size: 11px;
            font-weight: 800;
            color: rgba(255,255,255,0.8);
            letter-spacing: 1px;
            text-transform: uppercase;
        }
        .qr-sublabel {
            font-size: 9px;
            color: rgba(255,255,255,0.25);
            margin-top: 3px;
            font-weight: 600;
        }

        /* Info badge */
        .info-badge {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            background: rgba(234,179,8,0.08);
            border: 1px solid rgba(234,179,8,0.2);
            border-radius: 8px;
            padding: 6px 12px;
            font-size: 9px;
            font-weight: 700;
            color: #fbbf24;
            letter-spacing: 0.5px;
            margin-bottom: 16px;
            width: 100%;
            box-sizing: border-box;
            justify-content: center;
        }

        /* Result Modal Styles */
        #resultBox {
            position: relative;
            overflow: hidden;
        }
        .result-amount {
            font-size: 42px;
            font-weight: 900;
            letter-spacing: -1px;
            margin: 8px 0;
        }
        .result-label {
            font-size: 10px;
            font-weight: 800;
            letter-spacing: 3px;
            text-transform: uppercase;
            margin-bottom: 4px;
        }
        .result-glow-win {
            position: absolute;
            top: -40px; left: 50%;
            transform: translateX(-50%);
            width: 200px; height: 200px;
            background: radial-gradient(circle, rgba(34,197,94,0.15) 0%, transparent 70%);
            pointer-events: none;
        }
        .result-glow-lose {
            position: absolute;
            top: -40px; left: 50%;
            transform: translateX(-50%);
            width: 200px; height: 200px;
            background: radial-gradient(circle, rgba(239,68,68,0.15) 0%, transparent 70%);
            pointer-events: none;
        }

        /* Profile modal special */
        .profile-avatar-ring {
            width: 80px; height: 80px;
            border-radius: 50%;
            background: linear-gradient(135deg, #fbbf24, #d97706);
            display: flex; align-items: center; justify-content: center;
            margin: 0 auto 12px auto;
            font-size: 30px;
            font-weight: 900;
            color: black;
            box-shadow: 0 0 0 4px rgba(251,191,36,0.15), 0 0 30px rgba(251,191,36,0.2);
        }
        .fancy-profile-item {
            background: rgba(255,255,255,0.025);
            border: 1px solid rgba(255,255,255,0.06);
            border-radius: 14px;
            padding: 12px 16px;
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        /* Ticker tape at top of modals */
        .modal-ticker {
            background: linear-gradient(90deg, rgba(234,179,8,0.06), rgba(234,179,8,0.02));
            border-bottom: 1px solid rgba(234,179,8,0.08);
            padding: 6px 28px;
            font-size: 8px;
            font-weight: 700;
            color: rgba(234,179,8,0.5);
            letter-spacing: 2px;
            text-transform: uppercase;
            margin: -32px -28px 24px -28px;
        }
    </style>
</head>
<body>

    <div id="loadingScreen">
        <div class="loader-spin"></div>
        <p class="mt-3 text-[9px] font-bold text-yellow-500 uppercase tracking-widest">Verifying Session...</p>
    </div>

    <div id="authSection" class="h-full items-center justify-center p-4" style="display:none;">
        <div class="glass-card w-full max-w-sm p-8 rounded-[32px]">
            <h1 class="text-3xl font-black text-center mb-8 uppercase italic">ProTrade</h1>
            <div class="flex bg-black/40 p-1.5 rounded-2xl mb-8">
                <button onclick="switchAuth('login')" id="loginTab" class="flex-1 py-3 text-sm font-bold">Login</button>
                <button onclick="switchAuth('reg')" id="regTab" class="flex-1 py-3 text-sm font-bold bg-[#2d3748] rounded-xl">Registration</button>
            </div>
            <input type="email" id="userEmail" placeholder="Email" class="auth-input mb-4">
            <input type="password" id="userPass" placeholder="Password" class="auth-input mb-6">
            <button onclick="handleAuth()" id="authBtn" class="w-full py-4 bg-blue-600 text-white font-black rounded-2xl uppercase">Registration</button>
        </div>
    </div>

    <div id="appTerminal">
        <header class="flex justify-between items-center mb-2 px-1">
            <div class="flex items-center gap-2">
                <div onclick="showM('settingsM')" id="userInitial" class="w-10 h-10 rounded-full bg-yellow-500 border-2 border-white/10 flex items-center justify-center text-black font-extrabold cursor-pointer text-sm shadow-lg shadow-yellow-500/20">?</div>
                <div><p class="text-[7px] text-gray-500 font-bold uppercase">Balance</p><h1 id="balanceDisp" class="text-lg font-black text-white">$0.00</h1></div>
            </div>
            <div class="flex gap-1.5">
                <button onclick="showM('depM')" class="bg-yellow-500 text-black px-4 py-2 rounded-xl text-[10px] font-black uppercase">Deposit</button>
                <button onclick="showM('witM')" class="bg-white/5 text-white px-4 py-2 rounded-xl text-[10px] font-black uppercase border border-white/10">Withdraw</button>
            </div>
        </header>

        <div class="mb-2 px-1">
            <select id="assetSelect" onchange="loadChart(this.value)" class="w-full bg-white/5 border border-white/10 rounded-xl p-2.5 text-yellow-500 font-bold text-[11px] outline-none">
                <optgroup label="FOREX MAJOR">
                    <option value="FX:EURUSD">EUR/USD (98%)</option><option value="FX:GBPUSD">GBP/USD (95%)</option>
                    <option value="FX:USDJPY">USD/JPY (92%)</option><option value="FX:AUDUSD">AUD/USD (90%)</option>
                    <option value="FX:USDCAD">USD/CAD (88%)</option><option value="FX:USDCHF">USD/CHF (85%)</option>
                    <option value="FX:EURGBP">EUR/GBP (82%)</option><option value="FX:EURJPY">EUR/JPY (80%)</option>
                </optgroup>
                <optgroup label="CRYPTO">
                    <option value="BINANCE:BTCUSDT">BTC/USDT (OTC)</option><option value="BINANCE:ETHUSDT">ETH/USDT (OTC)</option>
                    <option value="BINANCE:SOLUSDT">SOL/USDT (OTC)</option><option value="BINANCE:BNBUSDT">BNB/USDT (OTC)</option>
                    <option value="BINANCE:DOGEUSDT">DOGE/USDT (OTC)</option><option value="BINANCE:XRPUSDT">XRP/USDT (OTC)</option>
                </optgroup>
                <optgroup label="STOCKS & METALS">
                    <option value="OANDA:XAUUSD">GOLD (XAU/USD)</option><option value="NASDAQ:TSLA">TESLA</option>
                    <option value="NASDAQ:AAPL">APPLE</option><option value="NASDAQ:NVDA">NVIDIA</option>
                    <option value="NASDAQ:MSFT">MICROSOFT</option>
                </optgroup>
            </select>
        </div>

        <main class="relative flex-grow rounded-[28px] overflow-hidden bg-black mb-2 border border-white/5 shadow-2xl">
            <div id="tv_chart" class="h-full w-full"></div>
            <div id="tradeTimer" class="timer-badge">⏱ <span id="timerText">00:00</span></div>
        </main>

        <footer class="glass-card p-4 rounded-[32px]">
            <div class="grid grid-cols-2 gap-3 mb-4">
                <div class="bg-black/40 p-2.5 rounded-2xl border border-white/5">
                    <span class="text-[8px] text-gray-500 font-bold uppercase block ml-1">Amount ($)</span>
                    <input id="tradeAmt" type="number" value="10" class="bg-transparent outline-none font-black text-white text-base w-full px-1">
                </div>
                <div class="bg-black/40 p-2.5 rounded-2xl border border-white/5">
                    <span class="text-[8px] text-gray-500 font-bold uppercase block ml-1">Time Duration</span>
                    <select id="duration" class="bg-transparent font-black text-white text-base w-full outline-none">
                        <option value="5">5 Sec</option><option value="15">15 Sec</option>
                        <option value="30">30 Sec</option><option value="60">1 Min</option>
                        <option value="120">2 Min</option><option value="300">5 Min</option>
                        <option value="600">10 Min</option><option value="900">15 Min</option>
                    </select>
                </div>
            </div>
            <div class="grid grid-cols-2 gap-4">
                <button onclick="initTrade('UP')" class="btn-grad-green h-14 rounded-2xl font-black text-white uppercase text-sm tracking-widest">Call</button>
                <button onclick="initTrade('DOWN')" class="btn-grad-red h-14 rounded-2xl font-black text-white uppercase text-sm tracking-widest">Put</button>
            </div>
        </footer>
    </div>

    <!-- ═════════════
