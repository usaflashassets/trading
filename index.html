<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ProTrade Global | Elite Terminal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap');
        body { background: #05070a; color: #e2e8f0; font-family: 'Plus Jakarta Sans', sans-serif; overflow: hidden; height: 100dvh; margin: 0; }
        .glass-card { background: rgba(17, 24, 39, 0.8); backdrop-filter: blur(12px); border: 1px solid rgba(255,255,255,0.05); }
        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.95); z-index: 1000; align-items: center; justify-content: center; padding: 20px; }
        .auth-input { background: #1a1f29; border: 1px solid #2d3748; padding: 14px; border-radius: 12px; width: 100%; color: white; outline: none; }
        #appTerminal { display: none; height: 100dvh; flex-direction: column; padding: 8px; }
        .timer-badge { position: absolute; bottom: 10px; right: 10px; background: #eab308; color: black; padding: 5px 15px; border-radius: 50px; font-weight: 800; display: none; z-index: 100; font-size: 12px; }
        .btn-grad-green { background: linear-gradient(135deg, #22c55e 0%, #15803d 100%); }
        .btn-grad-red { background: linear-gradient(135deg, #ef4444 0%, #b91c1c 100%); }
        
        /* Fixed Loading Logic */
        #loadingOverlay { position: fixed; inset: 0; background: #05070a; z-index: 9999; display: flex; flex-direction: column; align-items: center; justify-content: center; transition: opacity 0.4s ease; }
        .loader-spin { width: 40px; height: 40px; border: 4px solid #1a1f29; border-top: 4px solid #eab308; border-radius: 50%; animation: spin 0.8s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        .success-circle { width: 70px; height: 70px; background: #22c55e; border-radius: 50%; display: flex; align-items: center; justify-content: center; margin: 0 auto 20px; box-shadow: 0 0 30px rgba(34, 197, 94, 0.3); }
        .profile-card { background: #0f131d; border: 1px solid #1e293b; border-radius: 40px; }
        .profile-field { background: #1a1f2e; border: 1px solid #2d3748; padding: 18px; border-radius: 20px; display: flex; justify-content: space-between; align-items: center; }
    </style>
</head>
<body>

    <!-- Dynamic Loading Screen -->
    <div id="loadingOverlay">
        <div class="loader-spin"></div>
        <p class="mt-4 text-[10px] font-bold text-yellow-500 uppercase tracking-[0.2em] animate-pulse">Initializing Terminal...</p>
    </div>

    <!-- Auth Section -->
    <div id="authSection" class="h-full flex items-center justify-center p-4" style="display:none;">
        <div class="glass-card w-full max-w-sm p-8 rounded-[32px]">
            <h1 class="text-3xl font-black text-center mb-8 uppercase italic tracking-tighter text-white">ProTrade</h1>
            <div class="flex bg-black/40 p-1.5 rounded-2xl mb-8">
                <button onclick="switchAuth('login')" id="loginTab" class="flex-1 py-3 text-sm font-bold">Login</button>
                <button onclick="switchAuth('reg')" id="regTab" class="flex-1 py-3 text-sm font-bold bg-[#2d3748] rounded-xl text-white">Registration</button>
            </div>
            <div class="space-y-4">
                <input type="email" id="userEmail" placeholder="Email" class="auth-input">
                <input type="password" id="userPass" placeholder="Password" class="auth-input">
                <button onclick="handleAuth()" id="authBtn" class="w-full py-4 bg-blue-600 text-white font-black rounded-2xl uppercase mt-4 shadow-xl shadow-blue-600/20 shadow-xl active:scale-95 transition-transform">Registration</button>
            </div>
        </div>
    </div>

    <!-- Main Terminal -->
    <div id="appTerminal" style="display:none;">
        <header class="flex justify-between items-center mb-2 px-1">
            <div class="flex items-center gap-2">
                <div onclick="showM('settingsM')" id="userInitial" class="w-10 h-10 rounded-full bg-yellow-500 border-2 border-white/10 flex items-center justify-center text-black font-extrabold cursor-pointer text-sm shadow-lg shadow-yellow-500/20">?</div>
                <div><p class="text-[7px] text-gray-500 font-bold uppercase">Live Balance</p><h1 id="balanceDisp" class="text-lg font-black text-white">$0.00</h1></div>
            </div>
            <div class="flex gap-1.5">
                <button onclick="showM('depM')" class="bg-yellow-500 text-black px-4 py-2 rounded-xl text-[10px] font-black uppercase">Deposit</button>
                <button onclick="showM('witM')" class="bg-white/5 text-white px-4 py-2 rounded-xl text-[10px] font-black uppercase border border-white/10">Withdraw</button>
            </div>
        </header>

        <div class="mb-2 px-1">
            <select id="assetSelect" onchange="loadChart(this.value)" class="w-full bg-white/5 border border-white/10 rounded-xl p-2.5 text-yellow-500 font-bold text-[11px] outline-none">

                    <option value="FX:USDJPY">USD/JPY (92%)</option>
                    <option value="FX:AUDUSD">AUD/USD (90%)</option>
                    <option value="FX:USDCAD">USD/CAD (89%)</option>
                    <option value="FX:USDCHF">USD/CHF (88%)</option>
                    <option value="FX:NZDUSD">NZD/USD (87%)</option>
                </optgroup>
                <optgroup label="FOREX CROSSES">
                    <option value="FX:EURJPY">EUR/JPY (85%)</option>
                    <option value="FX:GBPJPY">GBP/JPY (85%)</option>
                    <option value="FX:EURGBP">EUR/GBP (84%)</option>
                    <option value="FX:EURAUD">EUR/AUD (83%)</option>
                    <option value="FX:EURCAD">EUR/CAD (82%)</option>
                    <option value="FX:GBPAUD">GBP/AUD (81%)</option>
                    <option value="FX:GBPCAD">GBP/CAD (80%)</option>
                    <option value="FX:GBPCHF">GBP/CHF (79%)</option>
                    <option value="FX:AUDJPY">AUD/JPY (78%)</option>
                    <option value="FX:CADJPY">CAD/JPY (77%)</option>
                    <option value="FX:CHFJPY">CHF/JPY (76%)</option>
                    <option value="FX:AUDCAD">AUD/CAD (75%)</option>
                    <option value="FX:AUDNZD">AUD/NZD (74%)</option>
                    <option value="FX:NZDJPY">NZD/JPY (73%)</option>
                    <option value="FX:EURNZD">EUR/NZD (72%)</option>
                    <option value="FX:EURCHF">EUR/CHF (71%)</option>
                    <option value="FX:CADCHF">CAD/CHF (70%)</option>
                    <option value="FX:AUDCHF">AUD/CHF (69%)</option>
                    <option value="FX:NZDCHF">NZD/CHF (68%)</option>
                    <option value="FX:NZDCAD">NZD/CAD (67%)</option>
                </optgroup>
                <optgroup label="EXOTIC PAIRS">
                    <option value="FX:USDTRY">USD/TRY (65%)</option>
                    <option value="FX:USDZAR">USD/ZAR (62%)</option>
                    <option value="FX:USDMXN">USD/MXN (60%)</option>
                    <option value="FX:USDSGD">USD/SGD (58%)</option>
                    <option value="FX:USDHKD">USD/HKD (55%)</option>
                </optgroup>
                <optgroup label="CRYPTO ASSETS">
                    <option value="BINANCE:BTCUSDT">BTC/USDT (99%)</option>
                    <option value="BINANCE:ETHUSDT">ETH/USDT (98%)</option>
                    <option value="BINANCE:BNBUSDT">BNB/USDT (97%)</option>
                    <option value="BINANCE:SOLUSDT">SOL/USDT (96%)</option>
                    <option value="BINANCE:XRPUSDT">XRP/USDT (95%)</option>
                    <option value="BINANCE:ADAUSDT">ADA/USDT (94%)</option>
                    <option value="BINANCE:DOGEUSDT">DOGE/USDT (93%)</option>
                    <option value="BINANCE:LTCUSDT">LTC/USDT (92%)</option>
                    <option value="BINANCE:MATICUSDT">MATIC/USDT (91%)</option>
                    <option value="BINANCE:TRXUSDT">TRX/USDT (90%)</option>
                    <option value="BINANCE:DOTUSDT">DOT/USDT (89%)</option>
                    <option value="BINANCE:LINKUSDT">LINK/USDT (88%)</option>
                    <option value="BINANCE:AVAXUSDT">AVAX/USDT (87%)</option>
                    <option value="BINANCE:SHIBUSDT">SHIB/USDT (86%)</option>
                </optgroup>
            </select>
        </div>

        <main class="relative flex-grow rounded-[28px] overflow-hidden bg-black mb-2 border border-white/5 shadow-2xl">
            <div id="tv_chart" class="h-full w-full"></div>
            <div id="tradeTimer" class="timer-badge">⏱ <span id="timerText">00:00</span></div>
        </main>

        <footer class="glass-card p-4 rounded-[32px]">
            <div class="grid grid-cols-2 gap-3 mb-4">
                <div class="bg-black/40 p-2.5 rounded-2xl border border-white/5">
                    <span class="text-[8px] text-gray-500 font-bold uppercase block ml-1">Investment</span>
                    <input id="tradeAmt" type="number" value="10" class="bg-transparent outline-none font-black text-white text-base w-full px-1">
                </div>
                <div class="bg-black/40 p-2.5 rounded-2xl border border-white/5">
                    <span class="text-[8px] text-gray-500 font-bold uppercase block ml-1">Time</span>
                    <select id="duration" class="bg-transparent font-black text-white text-base w-full outline-none">
                        <option value="5">5 Sec</option>
                        <option value="15">15 Sec</option>
                        <option value="30">30 Sec</option>
                        <option value="60">1 Min</option>
                        <option value="300">5 Min</option>
                    </select>
                </div>
            </div>
            <div class="grid grid-cols-2 gap-4">
                <button onclick="initTrade('UP')" class="btn-grad-green h-14 rounded-2xl font-black text-white uppercase text-sm tracking-widest active:scale-95 transition-transform shadow-lg shadow-green-500/20">Call</button>
                <button onclick="initTrade('DOWN')" class="btn-grad-red h-14 rounded-2xl font-black text-white uppercase text-sm tracking-widest active:scale-95 transition-transform shadow-lg shadow-red-500/20">Put</button>
            </div>
        </footer>
    </div>

    <!-- Modals Section -->
    <div id="settingsM" class="modal">
        <div class="profile-card p-8 w-full max-w-[360px] relative border border-white/5">
            <button onclick="hideM('settingsM')" class="absolute top-6 right-6 text-white text-2xl opacity-50">&times;</button>
            <div class="text-center mt-4 mb-8">
                <h2 class="text-left text-[10px] font-black text-yellow-500 uppercase tracking-widest mb-10">Terminal Profile</h2>
                <div id="modalInitial" class="w-24 h-24 bg-yellow-500 rounded-full flex items-center justify-center mx-auto text-4xl font-black text-black mb-6 shadow-2xl shadow-yellow-500/20">?</div>
                <p id="modalEmailLabel" class="text-white font-extrabold italic text-lg mb-8">Loading...</p>
            </div>
            <div class="space-y-4 mb-10">
                <div class="profile-field"><span class="text-[10px] font-bold text-gray-500 uppercase">Tier Status</span><span class="text-[11px] font-black text-green-500 uppercase italic">Elite Verified</span></div>
                <div class="profile-field"><span class="text-[10px] font-bold text-gray-500 uppercase">Account ID</span><span id="modalEmail" class="text-[9px] font-black text-white uppercase italic opacity-70">User ID</span></div>
            </div>
            <button onclick="auth.signOut().then(()=>location.reload())" class="w-full py-5 text-white font-black rounded-[20px] uppercase text-xs tracking-widest bg-red-600 active:scale-95 transition-all">Destroy Session</button>
        </div>
    </div>

    <div id="depM" class="modal">
        <div class="glass-card p-8 rounded-[32px] w-full max-w-sm text-center">
            <div id="dStep1">
                <h2 class="text-xl font-black text-white mb-6 uppercase italic">Deposit Funds</h2>
                <input type="number" id="depAmtInput" placeholder="Enter Amount (PKR)" class="auth-input mb-6 text-center text-lg">
                <button onclick="toDStep(2)" class="w-full py-4 bg-yellow-500 text-black font-black rounded-2xl uppercase">Continue</button>
            </div>
            <div id="dStep2" class="hidden">
                <img src="https://i.postimg.cc/vTdBngYS/Screenshot-20260504-033311.jpg" class="mx-auto mb-4 bg-white p-1 rounded-2xl w-44 h-44 object-contain shadow-2xl">
                <p class="text-white font-black mb-6 italic uppercase text-xs">Payment Merchant: Dubai Trade</p>
                <button onclick="toDStep(3)" class="w-full py-4 bg-yellow-500 text-black font-black rounded-2xl uppercase">Transfer Complete</button>
            </div>
            <div id="dStep3" class="hidden space-y-3">
                <input type="text" id="depAccName" placeholder="Sender Name" class="auth-input">
                <input type="number" id="depActualAmt" placeholder="Verified Amount" class="auth-input">
                <input type="text" id="depTx" placeholder="Transaction ID (TXID)" class="auth-input">
                <button onclick="submitFinalDep()" class="w-full py-4 bg-blue-600 text-white font-black rounded-2xl uppercase">Notify Terminal</button>
            </div>
            <button onclick="hideM('depM')" class="mt-6 text-gray-500 text-[10px] font-bold uppercase">Cancel Operation</button>
        </div>
    </div>

    <div id="witM" class="modal">
        <div class="glass-card p-8 rounded-[32px] w-full max-w-sm text-center">
            <h2 class="text-xl font-black text-white mb-6 uppercase italic">Withdraw</h2>
            <div class="space-y-3 text-left">
                <select id="witBank" class="auth-input text-sm"><option value="EasyPaisa">EasyPaisa</option><option value="JazzCash">JazzCash</option></select>
                <input type="text" id="witAccNum" placeholder="Account Number" class="auth-input">
                <input type="text" id="witAccName" placeholder="Account Name" class="auth-input">
                <input type="number" id="witAmtPKR" placeholder="Amount (PKR)" class="auth-input">
                <button onclick="submitWit()" class="w-full py-4 bg-white text-black font-black rounded-2xl uppercase mt-4">Confirm</button>
            </div>
            <button onclick="hideM('witM')" class="mt-6 text-gray-500 text-[10px] font-bold uppercase">Aborted</button>
        </div>
    </div>

    <div id="fancyResponseM" class="modal">
        <div class="glass-card p-8 rounded-[40px] w-full max-w-sm text-center">
            <div class="success-circle"><svg width="35" height="35" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="4"><polyline points="20 6 9 17 4 12"></polyline></svg></div>
            <h2 class="text-2xl font-black text-white mb-2 uppercase italic">Success</h2>
            <p id="fancyMsg" class="text-gray-400 text-[10px] font-bold mb-8 uppercase tracking-widest">Process success.</p>
            <button onclick="hideM('fancyResponseM')" class="w-full py-4 bg-yellow-500 text-black font-black rounded-2xl uppercase">Excellent</button>
        </div>
    </div>

    <div id="resultM" class="modal"><div id="resultBox" class="bg-[#1a1f2e] p-10 rounded-[40px] text-center border border-white/10 w-80 shadow-2xl"></div></div>

    <!-- Firebase & Scripts -->
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-firestore-compat.js"></script>
    <script type="text/javascript" src="https://s3.tradingview.com/tv.js"></script>

    <script>
        const firebaseConfig = { apiKey: "AIzaSyAySRA1YSpTpmC8WjnKmDhnNMHkEmkeP50", authDomain: "waqas-47f30.firebaseapp.com", projectId: "waqas-47f30", storageBucket: "waqas-47f30.appspot.com", messagingSenderId: "374104279093", appId: "1:374104279093:web:6e1844b60456c700940364" };
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth(), db = firebase.firestore();
        let userData = null, mode = 'reg', chartLoaded = false, isResolved = false;

        // Session Protection Logic
        const forceHide = setTimeout(() => { if (!isResolved) { hideLoading(); document.getElementById('authSection').style.display = 'flex'; } }, 5000);
        function hideLoading() { const ls = document.getElementById('loadingOverlay'); if(ls) { ls.style.opacity = '0'; setTimeout(() => ls.style.display = 'none', 400); } }

        auth.onAuthStateChanged(user => {
            isResolved = true; clearTimeout(forceHide);
            if(user) {
                db.collection('users').doc(user.uid).onSnapshot(doc => {
                    userData = doc.data();
                    if(userData) {
                        document.getElementById('balanceDisp').innerText = "$" + (userData.balance || 0).toFixed(2);
                        const init = user.email ? user.email[0].toUpperCase() : "?";
                        document.getElementById('userInitial').innerText = init;
                        document.getElementById('modalInitial').innerText = init;
                        document.getElementById('modalEmailLabel').innerText = user.email;
                        document.getElementById('modalEmail').innerText = user.email;
                        hideLoading();
                        document.getElementById('authSection').style.display = 'none';
                        document.getElementById('appTerminal').style.display = 'flex';
                        if(!chartLoaded) { loadChart('FX:EURUSD'); chartLoaded = true; }
                    } else { hideLoading(); document.getElementById('authSection').style.display = 'none'; document.getElementById('appTerminal').style.display = 'flex'; }
                }, err => { hideLoading(); document.getElementById('authSection').style.display = 'flex'; });
            } else { hideLoading(); document.getElementById('authSection').style.display = 'flex'; document.getElementById('appTerminal').style.display = 'none'; }
        });

        function showM(id) { document.getElementById(id).style.display = 'flex'; }
        function hideM(id) { document.getElementById(id).style.display = 'none'; if(id==='depM') toDStep(1); }
        function toDStep(s) { ['dStep1','dStep2','dStep3'].forEach(d => document.getElementById(d).classList.add('hidden')); document.getElementById('dStep'+s).classList.remove('hidden'); }
        function showFancy(msg) { document.getElementById('fancyMsg').innerText = msg; showM('fancyResponseM'); }

        function loadChart(s) { new TradingView.widget({ "autosize": true, "symbol": s, "interval": "1", "theme": "dark", "container_id": "tv_chart", "hide_top_toolbar": true, "hide_side_toolbar": true }); }
        
        async function handleAuth() {
            const e = document.getElementById('userEmail').value, p = document.getElementById('userPass').value;
            if(!e || !p) return alert("Fill data");
            try {
                if(mode==='reg') { 
                    const r = await auth.createUserWithEmailAndPassword(e, p); 
                    await db.collection('users').doc(r.user.uid).set({ email: e, balance: 0, tradeMode: 'normal
