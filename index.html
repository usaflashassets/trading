<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Dubai Live Trade | Elite Terminal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-firestore-compat.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap');
        body { background: #05070a; color: #e2e8f0; font-family: 'Plus Jakarta Sans', sans-serif; overflow: hidden; height: 100dvh; margin: 0; }
        .glass-card { background: rgba(17, 24, 39, 0.8); backdrop-filter: blur(12px); border: 1px solid rgba(255,255,255,0.05); }
        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.95); z-index: 1000; align-items: center; justify-content: center; padding: 20px; }
        .auth-input { background: #1a1f29; border: 1px solid #2d3748; padding: 14px; border-radius: 12px; width: 100%; color: white; outline: none; }
        #appTerminal { display: none; height: 100dvh; flex-direction: column; padding: 8px; }
        .timer-badge { position: absolute; bottom: 10px; right: 10px; background: #eab308; color: black; padding: 5px 15px; border-radius: 50px; font-weight: 800; display: none; z-index: 100; font-size: 12px; }
        .btn-grad-green { background: linear-gradient(135deg, #22c55e 0%, #15803d 100%); }
        .btn-grad-red { background: linear-gradient(135deg, #ef4444 0%, #b91c1c 100%); }
        #loadingScreen { position: fixed; inset: 0; background: #05070a; z-index: 9999; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .loader-spin { width: 35px; height: 35px; border: 3px solid #1a1f29; border-top: 3px solid #eab308; border-radius: 50%; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .method-card { border: 1px solid rgba(255,255,255,0.05); transition: 0.3s; cursor: pointer; }
        .method-card.active { border-color: #eab308; background: rgba(234, 179, 8, 0.1); }
    </style>
</head>
<body>

    <div id="loadingScreen">
        <div class="loader-spin"></div>
        <p class="mt-3 text-[9px] font-bold text-yellow-500 uppercase tracking-widest">Verifying Session...</p>
    </div>

    <div id="authSection" class="h-full flex items-center justify-center p-4">
        <div class="glass-card w-full max-w-sm p-8 rounded-[32px]">
            <h1 class="text-3xl font-black text-center mb-8 uppercase italic text-yellow-500">Dubai Trade</h1>
            <div class="flex bg-black/40 p-1.5 rounded-2xl mb-8">
                <button onclick="switchAuth('login')" id="loginTab" class="flex-1 py-3 text-sm font-bold bg-[#2d3748] rounded-xl">Login</button>
                <button onclick="switchAuth('reg')" id="regTab" class="flex-1 py-3 text-sm font-bold">Registration</button>
            </div>
            <input type="email" id="userEmail" placeholder="Email" class="auth-input mb-4">
            <input type="password" id="userPass" placeholder="Password" class="auth-input mb-6">
            <button onclick="handleAuth()" id="authBtn" class="w-full py-4 bg-yellow-500 text-black font-black rounded-2xl uppercase">Login</button>
        </div>
    </div>

    <div id="appTerminal">
        <header class="flex justify-between items-center mb-2 px-1">
            <div class="flex items-center gap-2">
                <div onclick="showM('settingsM')" id="userInitial" class="w-8 h-8 rounded-full bg-yellow-500 flex items-center justify-center text-black font-extrabold cursor-pointer text-xs">?</div>
                <div><p class="text-[7px] text-gray-500 font-bold uppercase">Balance</p><h1 id="balanceDisp" class="text-lg font-black text-white">$0.00</h1></div>
            </div>
            <div class="flex gap-1.5">
                <button onclick="showM('depM')" class="bg-yellow-500 text-black px-3 py-1.5 rounded-lg text-[9px] font-black uppercase">Deposit</button>
                <button onclick="showM('witM')" class="bg-white/10 text-white px-3 py-1.5 rounded-lg text-[9px] font-black uppercase border border-white/10">Withdraw</button>
            </div>
        </header>

        <div class="mb-2">
            <select id="assetSelect" onchange="loadChart(this.value)" class="w-full bg-white/5 border border-white/10 rounded-xl p-2 text-yellow-500 font-bold text-[11px] outline-none">
                <optgroup label="FOREX MAJOR"><option value="FX:EURUSD">EUR/USD</option><option value="FX:GBPUSD">GBP/USD</option></optgroup>
                <optgroup label="CRYPTO"><option value="BINANCE:BTCUSDT">BTC/USDT</option><option value="BINANCE:ETHUSDT">ETH/USDT</option></optgroup>
            </select>
        </div>

        <main class="relative flex-grow rounded-[24px] overflow-hidden bg-black mb-2 border border-white/5">
            <div id="tv_chart" class="h-full w-full"></div>
            <div id="tradeTimer" class="timer-badge">⏱ <span id="timerText">00:00</span></div>
        </main>

        <footer class="glass-card p-3 rounded-[24px]">
            <div class="grid grid-cols-2 gap-3 mb-3">
                <div class="bg-black/40 p-2 rounded-xl border border-white/5">
                    <span class="text-[8px] text-gray-500 font-bold uppercase block ml-1">Amount</span>
                    <input id="tradeAmt" type="number" value="10" class="bg-transparent outline-none font-black text-white text-base w-full px-1">
                </div>
                <div class="bg-black/40 p-2 rounded-xl border border-white/5">
                    <span class="text-[8px] text-gray-500 font-bold uppercase block ml-1">Time</span>
                    <select id="duration" class="bg-transparent font-black text-white text-base w-full outline-none">
                        <option value="5">5s</option><option value="60">1m</option><option value="300">5m</option>
                    </select>
                </div>
            </div>
            <div class="grid grid-cols-2 gap-3">
                <button onclick="initTrade('UP')" class="btn-grad-green h-12 rounded-xl font-black text-white uppercase text-sm">Call</button>
                <button onclick="initTrade('DOWN')" class="btn-grad-red h-12 rounded-xl font-black text-white uppercase text-sm">Put</button>
            </div>
        </footer>
    </div>

    <div id="depM" class="modal">
        <div class="glass-card p-8 rounded-[32px] w-full max-w-sm text-center">
            <div id="dStep1">
                <h2 class="text-xl font-black text-yellow-500 mb-6 uppercase">Deposit</h2>
                <div class="grid grid-cols-2 gap-2 mb-4">
                    <div onclick="selectDepMethod('crypto')" id="mCrypto" class="method-card p-3 rounded-2xl text-[9px] font-extrabold uppercase">Crypto Deposit</div>
                    <div onclick="selectDepMethod('pkr')" id="mPkr" class="method-card p-3 rounded-2xl text-[9px] font-extrabold uppercase">PKR Deposit</div>
                </div>
                <input type="number" id="depAmtInput" oninput="updatePkrVal()" placeholder="Amount ($)" class="auth-input mb-2 text-center text-lg">
                <p id="pkrHint" class="text-yellow-500 font-bold text-[10px] mb-6 hidden"></p>
                <button onclick="toDStep(2)" class="w-full py-4 bg-yellow-500 text-black font-black rounded-2xl uppercase">Next</button>
            </div>

            <div id="dStep2" class="hidden">
                <h3 id="depMethodTitle" class="text-white font-black mb-4 uppercase text-xs italic">Dubai Live Trade</h3>
                <img id="qrDisplay" src="" class="mx-auto mb-4 p-2 bg-white rounded-xl w-44">
                <div class="bg-black/40 p-3 rounded-xl mb-6 border border-white/10">
                    <span id="walletText" class="text-[9px] font-bold text-yellow-500">Dubai Live Trade</span>
                </div>
                <button onclick="toDStep(3)" class="w-full py-4 bg-yellow-500 text-black font-black rounded-2xl uppercase">I Have Paid</button>
            </div>

            <div id="dStep3" class="hidden space-y-3">
                <input type="text" id="depAccName" placeholder="Enter Account Name" class="auth-input">
                <input type="number" id="depSendAmt" placeholder="Enter Send Amount" class="auth-input">
                <input type="text" id="depTxid" placeholder="Enter Transaction ID (Txid)" class="auth-input">
                <button onclick="submitFinalDep()" class="w-full py-4 bg-blue-600 text-white font-black rounded-2xl uppercase">Submit Deposit</button>
            </div>
            <button onclick="hideM('depM')" class="mt-4 text-gray-500 text-[10px] font-bold uppercase">Cancel</button>
        </div>
    </div>

    <div id="settingsM" class="modal">
        <div class="glass-card p-8 rounded-[32px] w-full max-w-sm text-center">
            <h2 id="modalEmail" class="text-white font-bold text-sm mb-6 italic">User</h2>
            <button onclick="auth.signOut().then(()=>location.reload())" class="w-full py-4 bg-red-600/10 text-red-500 border border-red-600/20 font-black rounded-2xl uppercase text-[10px]">Logout</button>
            <button onclick="hideM('settingsM')" class="mt-4 text-gray-500 text-[10px] font-bold uppercase">Close</button>
        </div>
    </div>

    <div id="resultM" class="modal"><div id="resultBox" class="bg-[#1a1f2e] p-10 rounded-[40px] text-center border border-white/10 w-80"></div></div>

    <script type="text/javascript" src="https://s3.tradingview.com/tv.js"></script>
    <script>
        const firebaseConfig = { apiKey: "AIzaSyAySRA1YSpTpmC8WjnKmDhnNMHkEmkeP50", authDomain: "waqas-47f30.firebaseapp.com", projectId: "waqas-47f30", storageBucket: "waqas-47f30.appspot.com", messagingSenderId: "374104279093", appId: "1:374104279093:web:6e1844b60456c700940364" };
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth(), db = firebase.firestore();
        let userData = null, mode = 'login', depMethod = 'crypto';

        function showM(id) { document.getElementById(id).style.display = 'flex'; }
        function hideM(id) { document.getElementById(id).style.display = 'none'; if(id==='depM') toDStep(1); }

        function selectDepMethod(m) {
            depMethod = m;
            document.getElementById('mCrypto').className = m === 'crypto' ? 'method-card p-3 rounded-2xl text-[9px] font-extrabold uppercase active' : 'method-card p-3 rounded-2xl text-[9px] font-extrabold uppercase';
            document.getElementById('mPkr').className = m === 'pkr' ? 'method-card p-3 rounded-2xl text-[9px] font-extrabold uppercase active' : 'method-card p-3 rounded-2xl text-[9px] font-extrabold uppercase';
            updatePkrVal();
        }

        function updatePkrVal() {
            const val = document.getElementById('depAmtInput').value;
            const hint = document.getElementById('pkrHint');
            if(depMethod === 'pkr' && val > 0) {
                hint.innerText = "Total PKR: " + (val * 285).toLocaleString(); // PKR Rate
                hint.classList.remove('hidden');
            } else { hint.classList.add('hidden'); }
        }

        function toDStep(s) {
            document.getElementById('dStep1').classList.add('hidden');
            document.getElementById('dStep2').classList.add('hidden');
            document.getElementById('dStep3').classList.add('hidden');
            if(s === 2) {
                const qr = document.getElementById('qrDisplay');
                const wallet = document.getElementById('walletText');
                if(depMethod === 'pkr') {
                    qr.src = "https://i.postimg.cc/HLPQpW92/Screenshot-20260504-033311.jpg"; // Merchant QR
                    wallet.innerText = "Dubai Live Trade (Merchant)";
                } else {
                    qr.src = "https://api.qrserver.com/v1/create-qr-code/?size=150x150&data=TAaTmYha48Pbft4aJn1RGyKmVoQZKuLArM";
                    wallet.innerText = "TAaTmYha48Pbft4aJn1RGyKmVoQZKuLArM";
                }
            }
            document.getElementById('dStep'+s).classList.remove('hidden');
        }

        async function submitFinalDep() {
            const acc = document.getElementById('depAccName').value;
            const send = document.getElementById('depSendAmt').value;
            const tx = document.getElementById('depTxid').value;
            if(!acc || !send || !tx) return alert("Fill all fields");
            
            await db.collection('requests').add({
                uid: auth.currentUser.uid,
                email: auth.currentUser.email,
                method: depMethod,
                accountName: acc,
                sendAmount: send,
                txid: tx,
                usdRequested: document.getElementById('depAmtInput').value,
                status: 'pending',
                time: Date.now()
            });
            hideM('depM');
            alert("Deposit request submitted!");
        }

        auth.onAuthStateChanged(user => {
            const loader = document.getElementById('loadingScreen');
            if(user) {
                db.collection('users').doc(user.uid).onSnapshot(doc => {
                    userData = doc.data();
                    if(userData) {
                        document.getElementById('balanceDisp').innerText = "$" + (userData.balance || 0).toFixed(2);
                        document.getElementById('userInitial').innerText = user.email[0].toUpperCase();
                        document.getElementById('modalEmail').innerText = user.email;
                        document.getElementById('authSection').style.display = 'none';
                        document.getElementById('appTerminal').style.display = 'flex';
                        new TradingView.widget({ "autosize": true, "symbol": "FX:EURUSD", "interval": "1", "theme": "dark", "container_id": "tv_chart", "hide_top_toolbar": true });
                        loader.style.display = 'none';
                    }
                });
            } else { 
                document.getElementById('authSection').style.display = 'flex'; 
                document.getElementById('appTerminal').style.display = 'none'; 
                loader.style.display = 'none'; 
            }
        });

        async function handleAuth() {
            const e = document.getElementById('userEmail').value, p = document.getElementById('userPass').value;
            if(!e || !p) return;
            try { 
                if(mode==='reg') { 
                    const r = await auth.createUserWithEmailAndPassword(e, p); 
                    await db.collection('users').doc(r.user.uid).set({ email: e, balance: 0 }); 
                } else { await auth.signInWithEmailAndPassword(e, p); } 
            } catch(err) { alert(err.message); }
        }

        function switchAuth(t) { 
            mode = t; 
            document.getElementById('loginTab').classList.toggle('bg-[#2d3748]', t==='login');
            document.getElementById('regTab').classList.toggle('bg-[#2d3748]', t==='reg');
            document.getElementById('authBtn').innerText = t==='login'?'Login':'Registration';
        }

        async function initTrade(type) {
            const amt = parseFloat(document.getElementById('tradeAmt').value);
            if(amt > userData.balance || amt <= 0) return alert("Low balance");
            await db.collection('users').doc(auth.currentUser.uid).update({ balance: firebase.firestore.FieldValue.increment(-amt) });
            document.getElementById('tradeTimer').style.display = 'block';
            let l = parseInt(document.getElementById('duration').value);
            let iv = setInterval(() => {
                document.getElementById('timerText').innerText = l + "s";
                if(l <= 0) { 
                    clearInterval(iv); 
                    document.getElementById('tradeTimer').style.display = 'none'; 
                    finishTrade(amt); 
                }
                l--;
            }, 1000);
        }

        async function finishTrade(amt) {
            const win = Math.random() > 0.5;
            const p = amt * 1.8;
            if(win) {
                await db.collection('users').doc(auth.currentUser.uid).update({ balance: firebase.firestore.FieldValue.increment(p) });
                alert("Win: +$" + p.toFixed(2));
            } else { alert("Loss: -$" + amt.toFixed(2)); }
        }
    </script>
</body>
</html>
