<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ProTrade Global | Elite Terminal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-firestore-compat.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap');
        body { background: #05070a; color: #e2e8f0; font-family: 'Plus Jakarta Sans', sans-serif; overflow: hidden; height: 100dvh; margin: 0; }
        .glass-card { background: rgba(17, 24, 39, 0.8); backdrop-filter: blur(12px); border: 1px solid rgba(255,255,255,0.05); }
        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.95); z-index: 1000; align-items: center; justify-content: center; padding: 20px; overflow-y: auto; }
        .auth-input { background: #1a1f29; border: 1px solid #2d3748; padding: 14px; border-radius: 12px; width: 100%; color: white; outline: none; }
        #appTerminal { display: none; height: 100dvh; flex-direction: column; padding: 8px; }
        #authSection { display: none; } 
        .timer-badge { position: absolute; bottom: 10px; right: 10px; background: #eab308; color: black; padding: 5px 15px; border-radius: 50px; font-weight: 800; display: none; z-index: 100; font-size: 12px; }
        .btn-grad-green { background: linear-gradient(135deg, #22c55e 0%, #15803d 100%); }
        .btn-grad-red { background: linear-gradient(135deg, #ef4444 0%, #b91c1c 100%); }
        
        #loadingScreen { position: fixed; inset: 0; background: #05070a; z-index: 9999; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .loader-spin { width: 35px; height: 35px; border: 3px solid #1a1f29; border-top: 3px solid #eab308; border-radius: 50%; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        /* Styles from your provided final.html */
        .asset-card { width: 100%; max-width: 400px; background: #1e2329; border-radius: 20px; padding: 20px; border: 1px solid #363c4e; color: white; }
        .menu-btn { width: 100%; padding: 14px; margin-bottom: 12px; border-radius: 12px; border: none; font-size: 14px; font-weight: 600; cursor: pointer; color: white; text-align: center; }
        .btn-deposit { background: #2ebd85; }
        .btn-withdraw { background: #f6465d; }
        .btn-history { background: transparent; border: 1px solid #363c4e; }
        .opt-btn { width: 100%; padding: 12px; background: #2b3139; border: 1px solid #363c4e; border-radius: 10px; color: white; margin-bottom: 10px; display: flex; justify-content: space-between; align-items: center; }
        .hidden { display: none; }
        .qr-box { background: white; padding: 10px; border-radius: 12px; width: 180px; margin: 0 auto 10px; }
        .qr-box img { width: 100%; }
        .address-box { background: #161a1e; padding: 10px; border-radius: 8px; font-size: 10px; border: 1px dashed #848e9c; word-break: break-all; margin-bottom: 15px; }
        .history-item { background: #2b3139; border-radius: 10px; padding: 12px; margin-bottom: 8px; border-left: 4px solid #363c4e; }
    </style>
</head>
<body>

    <div id="loadingScreen">
        <div class="loader-spin"></div>
        <p class="mt-3 text-[9px] font-bold text-yellow-500 uppercase tracking-widest">Verifying Session...</p>
    </div>

    <div id="authSection" class="h-full flex items-center justify-center p-4">
        <div class="glass-card w-full max-sm p-8 rounded-[32px]">
            <h1 class="text-3xl font-black text-center mb-8 uppercase italic">ProTrade</h1>
            <div class="flex bg-black/40 p-1.5 rounded-2xl mb-8">
                <button onclick="switchAuth('login')" id="loginTab" class="flex-1 py-3 text-sm font-bold">Login</button>
                <button onclick="switchAuth('reg')" id="regTab" class="flex-1 py-3 text-sm font-bold bg-[#2d3748] rounded-xl">Registration</button>
            </div>
            <input type="email" id="userEmail" placeholder="Email" class="auth-input mb-4">
            <input type="password" id="userPass" placeholder="Password" class="auth-input mb-6">
            <button onclick="handleAuth()" id="authBtn" class="w-full py-4 bg-blue-600 text-white font-black rounded-2xl uppercase">Registration</button>
        </div>
    </div>

    <div id="appTerminal">
        <header class="flex justify-between items-center mb-2 px-1">
            <div class="flex items-center gap-2">
                <div onclick="showM('settingsM')" id="userInitial" class="w-8 h-8 rounded-full bg-yellow-500 flex items-center justify-center text-black font-extrabold cursor-pointer text-xs">?</div>
                <div><p class="text-[7px] text-gray-500 font-bold uppercase">Balance</p><h1 id="balanceDisp" class="text-lg font-black text-white">$0.00</h1></div>
            </div>
            <div class="flex gap-1.5">
                <button onclick="showM('assetM')" class="bg-yellow-500 text-black px-4 py-1.5 rounded-lg text-[9px] font-black uppercase tracking-tight">My Assets</button>
            </div>
        </header>

        <div class="mb-2">
            <select id="assetSelect" onchange="loadChart(this.value)" class="w-full bg-white/5 border border-white/10 rounded-xl p-2 text-yellow-500 font-bold text-[11px] outline-none">
                <optgroup label="FOREX MAJOR">
                    <option value="FX:EURUSD">EUR/USD</option><option value="FX:GBPUSD">GBP/USD</option>
                </optgroup>
            </select>
        </div>

        <main class="relative flex-grow rounded-[24px] overflow-hidden bg-black mb-2 border border-white/5">
            <div id="tv_chart" class="h-full w-full"></div>
            <div id="tradeTimer" class="timer-badge">⏱ <span id="timerText">00:00</span></div>
        </main>

        <footer class="glass-card p-3 rounded-[24px]">
            <div class="grid grid-cols-2 gap-3 mb-3">
                <div class="bg-black/40 p-2 rounded-xl border border-white/5">
                    <span class="text-[8px] text-gray-500 font-bold uppercase block ml-1">Amount</span>
                    <input id="tradeAmt" type="number" value="100" class="bg-transparent outline-none font-black text-white text-base w-full px-1">
                </div>
                <div class="bg-black/40 p-2 rounded-xl border border-white/5">
                    <span class="text-[8px] text-gray-500 font-bold uppercase block ml-1">Time</span>
                    <select id="duration" class="bg-transparent font-black text-white text-base w-full outline-none">
                        <option value="5">5s</option><option value="60">1m</option>
                    </select>
                </div>
            </div>
            <div class="grid grid-cols-2 gap-3">
                <button onclick="initTrade('UP')" class="btn-grad-green h-12 rounded-xl font-black text-white uppercase text-sm">Call</button>
                <button onclick="initTrade('DOWN')" class="btn-grad-red h-12 rounded-xl font-black text-white uppercase text-sm">Put</button>
            </div>
        </footer>
    </div>

    <div id="assetM" class="modal">
        <div class="asset-card relative">
            <button onclick="hideM('assetM')" class="absolute top-4 right-4 text-gray-400">&times;</button>
            <div id="asset-main">
                <h2 class="text-center text-yellow-500 font-bold text-xl mb-6 uppercase tracking-widest">Dubai Live Trade</h2>
                <button class="menu-btn btn-deposit" onclick="toggleAssetSec('dep-opt')">Deposit</button>
                <button class="menu-btn btn-withdraw" onclick="toggleAssetSec('wit-opt')">Withdraw</button>
                <button class="menu-btn btn-history" onclick="renderHistory()">History</button>
            </div>

            <div id="dep-opt" class="hidden">
                <button class="mb-4 text-xs text-gray-400" onclick="toggleAssetSec('main')">&larr; Back</button>
                <h3 class="mb-4 font-bold">Select Method</h3>
                <button class="opt-btn" onclick="setDepMode('crypto')"><span>🪙 Crypto (USDT)</span> <span>&gt;</span></button>
                <button class="opt-btn" onclick="setDepMode('pkr')"><span>🇵🇰 PKR (Easypaisa)</span> <span>&gt;</span></button>
            </div>

            <div id="dep-amt" class="hidden">
                <button class="mb-4 text-xs text-gray-400" onclick="toggleAssetSec('dep-opt')">&larr; Back</button>
                <h3 class="mb-4 font-bold">Enter Amount ($)</h3>
                <input type="number" id="user_amount" placeholder="0.00" class="auth-input mb-4 text-center">
                <div id="pkr-conv" class="text-yellow-500 text-sm font-bold mb-4 hidden"></div>
                <button class="menu-btn btn-deposit" onclick="handleDepNext()">Next</button>
            </div>

            <div id="dep-pay" class="hidden">
                <button class="mb-4 text-xs text-gray-400" onclick="toggleAssetSec('dep-amt')">&larr; Back</button>
                <div class="qr-box"><img id="display-qr" src="" alt="Scanner"></div>
                <div id="crypto-addr" class="address-box hidden">0x76ecfe8a3bd89297189e16cdcd275d743fb71a62</div>
                <button class="menu-btn btn-deposit" onclick="toggleAssetSec('dep-final')">I Have Paid</button>
            </div>

            <div id="dep-final" class="hidden">
                <button class="mb-4 text-xs text-gray-400" onclick="toggleAssetSec('dep-pay')">&larr; Back</button>
                <input type="email" id="dep_email" placeholder="Email" class="auth-input mb-3">
                <input type="text" id="dep_name" placeholder="Name" class="auth-input mb-3">
                <input type="number" id="dep_txid" placeholder="Transaction ID (Digits)" class="auth-input mb-4">
                <button class="menu-btn btn-deposit" onclick="submitDep()">Submit Now</button>
            </div>

            <div id="wit-opt" class="hidden">
                <button class="mb-4 text-xs text-gray-400" onclick="toggleAssetSec('main')">&larr; Back</button>
                <button class="opt-btn" onclick="toggleAssetSec('wit-crypto')"><span>🪙 Crypto</span> <span>&gt;</span></button>
                <button class="opt-btn" onclick="toggleAssetSec('wit-pkr')"><span>🇵🇰 PKR</span> <span>&gt;</span></button>
            </div>

            <div id="wit-crypto" class="hidden">
                <button class="mb-4 text-xs text-gray-400" onclick="toggleAssetSec('wit-opt')">&larr; Back</button>
                <select id="w_c_net" class="auth-input mb-3"><option>BEP20</option><option>TRC20</option></select>
                <input type="text" id="w_c_addr" placeholder="Wallet Address" class="auth-input mb-3">
                <input type="number" id="w_c_amt" placeholder="Amount ($)" class="auth-input mb-4">
                <button class="menu-btn btn-withdraw" onclick="submitWit('crypto')">Withdraw Now</button>
            </div>

            <div id="wit-pkr" class="hidden">
                <button class="mb-4 text-xs text-gray-400" onclick="toggleAssetSec('wit-opt')">&larr; Back</button>
                <select id="w_p_bank" class="auth-input mb-3"><option>EasyPaisa</option><option>JazzCash</option></select>
                <input type="number" id="w_p_num" placeholder="Account Number" class="auth-input mb-3">
                <input type="text" id="w_p_name" placeholder="Account Name" class="auth-input mb-3">
                <input type="number" id="w_p_amt" placeholder="Amount (PKR)" class="auth-input mb-4">
                <button class="menu-btn btn-withdraw" onclick="submitWit('pkr')">Withdraw Now</button>
            </div>

            <div id="history-sec" class="hidden">
                <button class="mb-4 text-xs text-gray-400" onclick="toggleAssetSec('main')">&larr; Back</button>
                <div id="history-list" class="max-h-60 overflow-y-auto"></div>
            </div>
        </div>
    </div>

    <div id="settingsM" class="modal">
        <div class="glass-card p-8 rounded-[32px] w-full max-w-sm text-center">
            <div class="flex justify-between items-center mb-6">
                <h2 class="text-[10px] font-black text-gray-500 uppercase tracking-widest">Account Details</h2>
                <button onclick="hideM('settingsM')" class="text-gray-500 text-2xl font-light">&times;</button>
            </div>
            <div class="mb-8">
                <div id="modalInitial" class="w-20 h-20 bg-yellow-500 rounded-full flex items-center justify-center mx-auto text-3xl font-black text-black mb-4">?</div>
                <h2 id="modalEmail" class="text-white font-bold text-sm mb-1 break-all italic">Loading...</h2>
                <span class="text-[8px] bg-green-500/10 text-green-500 px-3 py-1 rounded-full font-bold uppercase border border-green-500/20">Elite Verified</span>
            </div>
            <button onclick="auth.signOut().then(()=>location.reload())" class="w-full py-4 bg-red-600/10 text-red-500 border border-red-600/20 font-black rounded-2xl uppercase text-[10px] tracking-widest">Secure Logout</button>
        </div>
    </div>

    <div id="resultM" class="modal"><div id="resultBox" class="bg-[#1a1f2e] p-10 rounded-[40px] text-center border border-white/10 w-80"></div></div>

    <script type="text/javascript" src="https://s3.tradingview.com/tv.js"></script>
    <script>
        const firebaseConfig = { apiKey: "AIzaSyAySRA1YSpTpmC8WjnKmDhnNMHkEmkeP50", authDomain: "waqas-47f30.firebaseapp.com", projectId: "waqas-47f30", storageBucket: "waqas-47f30.appspot.com", messagingSenderId: "374104279093", appId: "1:374104279093:web:6e1844b60456c700940364" };
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth(), db = firebase.firestore();
        let userData = null, mode = 'reg', chartLoaded = false, currentDepMode = '';

        function showM(id) { document.getElementById(id).style.display = 'flex'; if(id==='assetM') toggleAssetSec('main'); }
        function hideM(id) { document.getElementById(id).style.display = 'none'; }

        // --- ASSETS LOGIC (from final.html) ---
        function toggleAssetSec(sec) {
            const sections = ['asset-main', 'dep-opt', 'dep-amt', 'dep-pay', 'dep-final', 'wit-opt', 'wit-crypto', 'wit-pkr', 'history-sec'];
            sections.forEach(s => document.getElementById(s).classList.add('hidden'));
            if(sec === 'main') document.getElementById('asset-main').classList.remove('hidden');
            else document.getElementById(sec).classList.remove('hidden');
        }

        function setDepMode(m) {
            currentDepMode = m;
            document.getElementById('pkr-conv').classList.toggle('hidden', m !== 'pkr');
            toggleAssetSec('dep-amt');
        }

        document.getElementById('user_amount').oninput = function() {
            if(currentDepMode === 'pkr') {
                const val = this.value * 280;
                document.getElementById('pkr-conv').innerText = `Pay: ${val.toLocaleString()} PKR`;
            }
        };

        function handleDepNext() {
            const amt = document.getElementById('user_amount').value;
            if(!amt || amt <= 0) return Swal.fire('Error', 'Enter valid amount', 'error');
            const qr = document.getElementById('display-qr');
            if(currentDepMode === 'crypto') {
                qr.src = "https://api.qrserver.com/v1/create-qr-code/?size=200x200&data=0x76ecfe8a3bd89297189e16cdcd275d743fb71a62";
                document.getElementById('crypto-addr').classList.remove('hidden');
            } else {
                qr.src = "https://i.postimg.cc/HLPQpW92/Screenshot-20260504-033311.jpg";
                document.getElementById('crypto-addr').classList.add('hidden');
            }
            toggleAssetSec('dep-pay');
        }

        async function submitDep() {
            const em = document.getElementById('dep_email').value, tx = document.getElementById('dep_txid').value;
            if(!em || !tx) return Swal.fire('Error', 'Fill all fields', 'error');
            Swal.showLoading();
            await db.collection('requests').add({ uid: auth.currentUser.uid, email: em, txid: tx, amount: document.getElementById('user_amount').value, type: 'Deposit', time: Date.now(), status: 'Processing' });
            Swal.fire('Success', 'Deposit Request Submitted!', 'success');
            hideM('assetM');
        }

        async function submitWit(type) {
            let amt = (type === 'crypto') ? document.getElementById('w_c_amt').value : document.getElementById('w_p_amt').value;
            if(!amt || amt <= 0) return Swal.fire('Error', 'Invalid Amount', 'error');
            if(type === 'crypto' && amt > userData.balance) return Swal.fire('Error', 'Low Balance', 'error');
            
            Swal.showLoading();
            if(type === 'crypto') await db.collection('users').doc(auth.currentUser.uid).update({ balance: firebase.firestore.FieldValue.increment(-amt) });
            
            await db.collection('requests').add({ uid: auth.currentUser.uid, amount: amt, type: 'Withdraw', method: type, time: Date.now(), status: 'Processing' });
            Swal.fire('Success', 'Withdrawal Request Sent!', 'success');
            hideM('assetM');
        }

        async function renderHistory() {
            const list = document.getElementById('history-list');
            list.innerHTML = '<p class="text-center text-gray-500 py-4">Loading...</p>';
            toggleAssetSec('history-sec');
            const snap = await db.collection('requests').where('uid', '==', auth.currentUser.uid).orderBy('time', 'desc').limit(10).get();
            list.innerHTML = snap.empty ? '<p class="text-center text-gray-500 py-4">No History Found</p>' : '';
            snap.forEach(doc => {
                const d = doc.data();
                list.innerHTML += `<div class="history-item ${d.type==='Deposit'?'border-l-green-500':'border-l-red-500'}">
                    <div class="flex justify-between text-xs font-bold"><span>${d.type}</span><span class="${d.type==='Deposit'?'text-green-500':'text-red-500'}">${d.type==='Deposit'?'$':''}${d.amount}</span></div>
                    <div class="flex justify-between text-[10px] text-gray-500 mt-1"><span>${new Date(d.time).toLocaleDateString()}</span><span class="text-yellow-500">${d.status}</span></div>
                </div>`;
            });
        }

        // --- TRADING & AUTH LOGIC ---
        auth.onAuthStateChanged(user => {
            if(user) {
                db.collection('users').doc(user.uid).onSnapshot(doc => {
                    userData = doc.data();
                    if(userData) {
                        document.getElementById('balanceDisp').innerText = "$" + (userData.balance || 0).toFixed(2);
                        document.getElementById('userInitial').innerText = user.email[0].toUpperCase();
                        document.getElementById('modalInitial').innerText = user.email[0].toUpperCase();
                        document.getElementById('modalEmail').innerText = user.email;
                        document.getElementById('authSection').style.display = 'none';
                        document.getElementById('appTerminal').style.display = 'flex';
                        if(!chartLoaded) { loadChart('FX:EURUSD'); chartLoaded = true; }
                        document.getElementById('loadingScreen').style.display = 'none';
                    }
                });
            } e
