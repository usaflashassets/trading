<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ProTrade Global | Elite Terminal</title>

<script src="https://cdn.tailwindcss.com"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-firestore-compat.js"></script>

<style>
body { background:#05070a; color:#e2e8f0; font-family:sans-serif; margin:0 }

/* ===== FANCY ALERT ===== */
.fancy-alert {
    position: fixed;
    top: 20px;
    left: 50%;
    transform: translateX(-50%) scale(0.8);
    background: #111;
    color: white;
    padding: 14px 20px;
    border-radius: 14px;
    font-weight: bold;
    z-index: 99999;
    opacity: 0;
    transition: all 0.3s ease;
}
.fancy-alert.show {
    opacity: 1;
    transform: translateX(-50%) scale(1);
}
</style>
</head>

<body>

<!-- FANCY ALERT -->
<div id="fancyAlert" class="fancy-alert"></div>

<script>
// ===== FANCY POPUP FUNCTION =====
function showFancy(msg, type="success"){
    const el = document.getElementById("fancyAlert");
    el.innerText = msg;

    if(type === "error"){
        el.style.background = "#ef4444";
    } else {
        el.style.background = "#10b981";
    }

    el.classList.add("show");

    setTimeout(()=>{
        el.classList.remove("show");
    },2500);
}
</script>

<script>
const firebaseConfig = {
apiKey:"AIzaSyAySRA1YSpTpmC8WjnKmDhnNMHkEmkeP50",
authDomain:"waqas-47f30.firebaseapp.com",
projectId:"waqas-47f30"
};
firebase.initializeApp(firebaseConfig);

const auth = firebase.auth();
const db = firebase.firestore();

// ===== DEPOSIT =====
async function submitFinalDep(){
    const acc = document.getElementById('depAccName').value;
    const amt = document.getElementById('depActualAmt').value;
    const tx = document.getElementById('depTx').value;

    if(!acc || !amt || !tx)
        return showFancy("Fill all fields","error");

    await db.collection('requests').add({
        uid: auth.currentUser.uid,
        amount: amt,
        txid: tx
    });

    showFancy("Deposit Request Sent!");
}

// ===== WITHDRAW =====
async function submitWit(){
    const b = document.getElementById('witBank').value;
    const n = document.getElementById('witAccNum').value;
    const nm = document.getElementById('witAccName').value;
    const amt = document.getElementById('witAmtPKR').value;

    if(!b || !n || !nm || !amt)
        return showFancy("Fill all fields","error");

    await db.collection('withdrawals').add({
        uid: auth.currentUser.uid,
        amount: amt
    });

    showFancy("Withdrawal Submitted!");
}

// ===== TRADE =====
function initTrade(){
    showFancy("Trade Started!");
}

// ===== BALANCE CHECK =====
function checkBalance(){
    showFancy("Check Balance","error");
}
</script>

</body>
</html>
