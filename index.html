<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ProTrade Global | Elite Terminal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-firestore-compat.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap');
        body { background: #020408; color: #e2e8f0; font-family: 'Plus Jakarta Sans', sans-serif; margin: 0; height: 100dvh; overflow: hidden; }
        
        /* Terminal Styles */
        .glass { background: rgba(15, 23, 42, 0.8); backdrop-filter: blur(16px); border: 1px solid rgba(255,255,255,0.05); }
        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.98); z-index: 1000; align-items: center; justify-content: center; padding: 15px; }
        #appTerminal { display: none; height: 100dvh; flex-direction: column; padding: 10px; }
        
        /* ATTACH.HTML EXACT STYLES FOR ASSETS HUB */
        #assetsPanel { display: none; position: fixed; inset: 0; background: #020408; z-index: 500; overflow-y: auto; padding: 20px; animation: slideUp 0.3s ease-out; }
        @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
        
        .history-card { background: rgba(255,255,255,0.02); border: 1px solid rgba(255,255,255,0.05); border-radius: 20px; padding: 15px; display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
        .status-badge { padding: 4px 12px; border-radius: 50px; font-size: 8px; font-weight: 800; text-transform: uppercase; }
        .pending { background: rgba(251, 191, 36, 0.1); color: #fbbf24; }
        .success { background: rgba(34, 197, 94, 0.1); color: #22c55e; }
        
        .timer-badge { position: absolute; bottom: 20px; right: 20px; background: #fbbf24; color: #000; padding: 6px 16px; border-radius: 50px; font-weight: 800; display: none; z-index: 100; font-size: 12px; }
        #loadingScreen { position: fixed; inset: 0; background: #020408; z-index: 9999; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .loader-spin { width: 40px; height: 40px; border: 3px solid #1a1f29; border-top: 3px solid #fbbf24; border-radius: 50%; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

    <div id="loadingScreen">
        <div class="loader-spin"></div>
        <p class="mt-4 text-[10px] font-bold text-yellow-500 uppercase tracking-widest">Verifying Session...</p>
    </div>

    <div id="authSec" class="hidden flex items-center justify-center min-h-screen p-6">
        <div class="glass w-full max-w-xs p-8 rounded-[40px] text-center border border-white/5">
            <h1 class="text-3xl font-black text-white italic uppercase mb-8 tracking-tighter">ProTrade</h1>
            <input type="email" id="email" placeholder="Email" class="w-full bg-white/5 border border-white/10 p-4 rounded-2xl mb-3 text-white outline-none">
            <input type="password" id="pass" placeholder="Password" class="w-full bg-white/5 border border-white/10 p-4 rounded-2xl mb-6 text-white outline-none">
            <button onclick="handleAuth()" class="w-full py-4 bg-blue-600 text-white font-black rounded-2xl uppercase text-[12px] shadow-lg shadow-blue-600/20">Login Account</button>
        </div>
    </div>

    <div id="appTerminal">
        <header class="flex justify-between items-center mb-4">
            <div class="flex items-center gap-3">
                <div onclick="showM('profileM')" id="userInitial" class="w-10 h-10 rounded-full bg-yellow-500 flex items-center justify-center text-black font-black cursor-pointer shadow-lg">?</div>
                <div>
                    <p class="text-[8px] text-gray-500 font-bold uppercase">Trading Balance</p>
                    <h2 id="balanceDisp" class="text-xl font-black text-white leading-none">$0.00</h2>
                </div>
            </div>
            <button onclick="openAssets()" class="bg-white text-black px-5 py-2.5 rounded-xl text-[10px] font-black uppercase">My Assets</button>
        </header>

        <select id="assetSelect" onchange="loadChart(this.value)" class="w-full bg-white/5 border border-white/10 rounded-xl p-3 text-yellow-500 font-bold text-xs outline-none mb-3">
            <optgroup label="FOREX MAJOR">
                <option value="FX:EURUSD">EUR/USD (OTC)</option><option value="FX:GBPUSD">GBP/USD (OTC)</option><option value="FX:USDJPY">USD/JPY</option><option value="FX:AUDUSD">AUD/USD</option><option value="FX:USDCAD">USD/CAD</option>
            </optgroup>
            <optgroup label="CRYPTO">
                <option value="BINANCE:BTCUSDT">BTC/USDT</option><option value="BINANCE:ETHUSDT">ETH/USDT</option><option value="BINANCE:SOLUSDT">SOL/USDT</option>
            </optgroup>
        </select>

        <main class="relative flex-grow rounded-[30px] overflow-hidden bg-black border border-white/5 mb-3">
            <div id="tv_chart" class="h-full w-full"></div>
            <div id="tradeTimer" class="timer-badge">⏱ <span id="timerText">00:00</span></div>
        </main>

        <footer class="glass p-5 rounded-[35px]">
            <div class="grid grid-cols-2 gap-4 mb-4">
                <div class="bg-black/50 p-3 rounded-2xl border border-white/5">
                    <span class="text-[8px] text-gray-500 font-bold uppercase block mb-1">Trade Amount</span>
                    <input id="tradeAmt" type="number" value="100" class="bg-transparent outline-none font-black text-white text-lg w-full">
                </div>
                <div class="bg-black/50 p-3 rounded-2xl border border-white/5">
                    <span class="text-[8px] text-gray-500 font-bold uppercase block mb-1">Time</span>
                    <select id="duration" class="bg-transparent font-black text-white text-lg w-full outline-none">
                        <option value="5">5s</option><option value="15">15s</option><option value="60">1m</option><option value="300">5m</option>
                    </select>
                </div>
            </div>
            <div class="grid grid-cols-2 gap-4">
                <button onclick="initTrade('UP')" class="h-14 rounded-2xl font-black text-white uppercase bg-green-600 shadow-lg shadow-green-600/20">Call</button>
                <button onclick="initTrade('DOWN')" class="h-14 rounded-2xl font-black text-white uppercase bg-red-600 shadow-lg shadow-red-600/20">Put</button>
            </div>
        </footer>
    </div>

    <div id="assetsPanel">
        <header class="flex justify-between items-center py-6 mb-4">
            <h2 class="text-2xl font-black italic text-white uppercase tracking-tighter">Member Hub</h2>
            <button onclick="closeAssets()" class="w-10 h-10 rounded-full bg-white/5 flex items-center justify-center text-white">✕</button>
        </header>

        <div class="glass p-10 rounded-[45px] mb-8 text-center border border-white/5 shadow-2xl relative overflow-hidden">
            <div class="absolute top-0 right-0 p-4 opacity-10 text-4xl">💎</div>
            <p class="text-[10px] text-gray-500 font-bold uppercase tracking-widest mb-2">Total Equity</p>
            <h1 id="assetBalDisp" class="text-5xl font-black text-white mb-8">$0.00</h1>
            <div class="grid grid-cols-2 gap-4">
                <button onclick="showM('depM')" class="py-4 bg-white text-black font-black rounded-2xl text-[10px] uppercase shadow-xl">Deposit</button>
                <button onclick="showM('witM')" class="py-4 bg-red-600 text-white font-black rounded-2xl text-[10px] uppercase shadow-xl">Withdraw</button>
            </div>
        </div>

        <div class="flex gap-8 mb-6 px-2">
            <button onclick="loadHistory('requests')" id="depTab" class="text-[11px] font-black uppercase text-yellow-500 border-b-2 border-yellow-500 pb-2">Deposits</button>
            <button onclick="loadHistory('withdrawals')" id="witTab" class="text-[11px] font-black uppercase text-gray-500 pb-2">Withdrawals</button>
        </div>
        
        <div id="historyList" class="space-y-3 pb-20"></div>
    </div>

    <div id="depM" class="modal">
        <div class="glass p-8 rounded-[40px] w-full max-w-sm border border-white/10">
            <div id="d0" class="space-y-4">
                <h3 class="text-center font-black mb-6 uppercase text-sm tracking-widest">Select Method</h3>
                <div onclick="selectDepMethod('crypto')" class="p-5 bg-white/5 border border-white/10 rounded-[25px] cursor-pointer hover:bg-white/10 transition-all">
                    <p class="font-black text-white">USDT (BEP20)</p>
                    <p class="text-[8px] text-blue-400 font-bold uppercase mt-1">Instant • Min $10</p>
                </div>
                <div onclick="selectDepMethod('pkr')" class="p-5 bg-white/5 border border-white/10 rounded-[25px] cursor-pointer hover:bg-white/10 transition-all">
                    <p class="font-black text-white">PKR (Local Bank)</p>
                    <p class="text-[8px] text-green-400 font-bold uppercase mt-1">Manual • Min 2800 PKR</p>
                </div>
            </div>
            <div id="d1" class="hidden space-y-4">
                <input type="number" id="dAmount" oninput="calcPkr()" placeholder="Enter Amount" class="w-full bg-black/40 p-5 rounded-2xl text-white font-black text-2xl outline-none text-center">
                <p id="pkrHint" class="text-center text-[10px] text-yellow-500 font-bold hidden"></p>
                <div id="qrBox" class="text-center bg-white p-4 rounded-[30px]">
                    <img id="depQR" src="" class="mx-auto w-44 h-44">
                    <p id="cryptoAddr" class="text-[8px] text-gray-500 font-bold break-all mt-4 hidden"></p>
                </div>
                <input type="text" id="dTxid" placeholder="Transaction ID / TXID" class="w-full bg-white/5 border border-white/10 p-4 rounded-xl text-white">
                <button onclick="submitDep()" class="w-full py-4 bg-yellow-500 text-black font-black rounded-2xl uppercase text-[11px]">Submit Payment</button>
            </div>
            <button onclick="hideM('depM')" class="w-full mt-6 text-[10px] text-gray-600 font-bold uppercase">Cancel</button>
        </div>
    </div>

    <div id="witM" class="modal">
        <div class="glass p-8 rounded-[40px] w-full max-w-sm border border-white/10">
            <h3 class="text-center font-black mb-8 uppercase text-sm tracking-widest">Withdrawal</h3>
            <input type="text" id="wAcc" placeholder="Account Details" class="w-full bg-white/5 border border-white/10 p-4 rounded-xl text-white mb-4">
            <input type="number" id="wAmt" placeholder="Amount ($)" class="w-full bg-white/5 border border-white/10 p-4 rounded-xl text-white mb-6">
            <button onclick="submitWit()" class="w-full py-4 bg-white text-black font-black rounded-2xl uppercase text-[11px]">Request Payout</button>
            <button onclick="hideM('witM')" class="w-full mt-6 text-[10px] text-gray-600 font-bold uppercase">Back</button>
        </div>
    </div>

    <div id="profileM" class="modal">
        <div class="glass p-10 rounded-[45px] w-full max-w-sm text-center">
            <div class="w-20 h-20 bg-yellow-500 rounded-full mx-auto mb-6 flex items-center justify-center text-3xl text-black font-black shadow-xl">👤</div>
            <p id="uEmail" class="text-white font-bold text-sm mb-10 opacity-40"></p>
            <button onclick="auth.signOut().then(()=>location.reload())" class="w-full py-4 bg-red-600/10 text-red-500 border border-red-600/10 font-black rounded-2xl uppercase text-[10px]">Logout</button>
            <button onclick="hideM('profileM')" class="mt-8 text-gray-500 uppercase font-bold text-[10px]">Back</button>
        </div>
    </div>

    <div id="resultM" class="modal"><div id="resultBox" class="glass p-12 rounded-[50px] text-center w-85"></div></div>

    <script type="text/javascript" src="https://s3.tradingview.com/tv.js"></script>
    <script>
        // Firebase Config
        const firebaseConfig = { apiKey: "AIzaSyAySRA1YSpTpmC8WjnKmDhnNMHkEmkeP50", authDomain: "waqas-47f30.firebaseapp.com", projectId: "waqas-47f30", storageBucket: "waqas-47f30.appspot.com", messagingSenderId: "374104279093", appId: "1:374104279093:web:6e1844b60456c700940364" };
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth(), db = firebase.firestore();
        let userData = null, curDep = '', chartLoaded = false;

        // Auth Logic (Force Hide Loader)
        auth.onAuthStateChanged(user => {
            const loader = document.getElementById('loadingScreen');
            if(user) {
                document.getElementById('authSec').style.display = 'none';
                document.getElementById('appTerminal').style.display = 'flex';
                loader.style.display = 'none';

                db.collection('users').doc(user.uid).onSnapshot(doc => {
                    userData = doc.data() || { balance: 0 };
                    const bal = (userData.balance || 0).toFixed(2);
                    document.getElementById('balanceDisp').innerText = "$" + bal;
                    document.getElementById('assetBalDisp').innerText = "$" + bal;
                    document.getElementById('uEmail').innerText = user.email;
                    document.getElementById('userInitial').innerText = user.email[0].toUpperCase();
                    if(!chartLoaded) { loadChart('FX:EURUSD'); chartLoaded = true; loadHistory('requests'); }
                });
            } else {
                loader.style.display = 'none';
                document.getElementById('authSec').style.display = 'flex';
                document.getElementById('appTerminal').style.display = 'none';
            }
        });

        async function handleAuth() {
            const e = document.getElementById('email').value, p = document.getElementById('pass').value;
            if(!e || !p) return alert("Enter credentials");
            try { await auth.signInWithEmailAndPassword(e, p); } catch(err) { alert(err.message); }
        }

        function loadChart(s) { new TradingView.widget({ "autosize": true, "symbol": s, "interval": "1", "theme": "dark", "container_id": "tv_chart", "hide_top_toolbar": true, "hide_side_toolbar": true }); }
        
        function openAssets() { document.getElementById('assetsPanel').style.display = 'block'; }
        function closeAssets() { document.getElementById('assetsPanel').style.display = 'none'; }
        function showM(id) { document.getElementById(id).style.display = 'flex'; }
        function hideM(id) { document.getElementById(id).style.display = 'none'; }

        // --- ATTACH.HTML DEPOSIT LOGIC ---
        function selectDepMethod(m) {
            curDep = m;
            document.getElementById('d0').classList.add('hidden');
            document.getElementById('d1').classList.remove('hidden');
            if(m === 'crypto') {
                document.getElementById('depQR').src = "https://api.qrserver.com/v1/create-qr-code/?size=180x180&data=0x76ecfe8a3bd89297189e16cdcd275d743fb71a62";
                document.getElementById('cryptoAddr').innerText = "0x76ecfe8a3bd89297189e16cdcd275d743fb71a62";
                document.getElementById('cryptoAddr').classList.remove('hidden');
            } else {
                document.getElementById('depQR').src = "https://i.postimg.cc/HLPQpW92/Screenshot-20260504-033311.jpg";
                document.getElementById('cryptoAddr').classList.add('hidden');
            }
        }

        function calcPkr() {
            if(curDep === 'pkr') {
                const usd = (document.getElementById('dAmount').value / 280).toFixed(2);
                document.getElementById('pkrHint').innerText = `Estimated: $${usd}`;
                document.getElementById('pkrHint').classList.remove('hidden');
            }
        }

        async function submitDep() {
            const amt = parseFloat(document.getElementById('dAmount').value), tx = document.getElementById('dTxid').value;
            if(!amt || !tx) return alert("Fill details");
            await db.collection('requests').add({ uid: auth.currentUser.uid, email: auth.currentUser.email, amount: amt, currency: curDep==='crypto'?'USD':'PKR', txid: tx, status: 'Pending', time: Date.now() });
            alert("Request Submitted!"); hideM('depM');
        }

        async function submitWit() {
            const amt = parseFloat(document.getElementById('wAmt').value), acc = document.getElementById('wAcc').value;
            if(userData.balance < amt) return alert("Low balance");
            await db.collection('users').doc(auth.currentUser.uid).update({ balance: firebase.firestore.FieldValue.increment(-amt) });
            await db.collection('withdrawals').add({ uid: auth.currentUser.uid, amount: amt, account: acc, status: 'Pending', time: Date.now() });
            alert("Withdrawal Pending!"); hideM('witM');
        }

        function loadHistory(coll) {
            document.getElementById('depTab').className = coll==='requests' ? 'text-[11px] font-black uppercase text-yellow-500 border-b-2 border-yellow-500 pb-2' : 'text-[11px] font-black uppercase text-gray-500 pb-2';
            document.getElementById('witTab').className = coll==='withdrawals' ? 'text-[11px] font-black uppercase text-yellow-500 border-b-2 border-yellow-500 pb-2' : 'text-[11px] font-black uppercase text-gray-500 pb-2';
            
            db.collection(coll).where('uid', '==', auth.currentUser.uid).onSnapshot(snap => {
                let html = '';
                snap.forEach(doc => {
                    const d = doc.data();
                    html += `<div class="history-card"><div><p class="text-white text-[10px] font-black uppercase">${coll==='requests'?'Deposit':'Withdraw'}</p><p class="text-[7px] text-gray-500">${new Date(d.time).toLocaleDateString()}</p></div><div class="text-right"><p class="font-black text-white">$${d.amount}</p><span class="status-badge pending">${d.status}</span></div></div>`;
                });
                document.getElementById('historyList').innerHTML = html || '<p class="text-center py-10 opacity-20 text-[8px]">NO ACTIVITY</p>';
            });
        }

        // --- TRADE LOGIC ---
        async function initTrade() {
            const amt = parseFloat(document.getElementById('tradeAmt').value), dur = parseInt(document.getElementById('duration').value);
            if(amt > userData.balance) return alert("Low balance");
            await db.collection('users').doc(auth.currentUser.uid).update({ balance: firebase.firestore.FieldValue.increment(-amt) });
            document.getElementById('tradeTimer').style.display = 'block';
            let l = dur;
            let iv = setInterval(() => {
                let m = Math.floor(l/60), s = l%60;
                document.getElementById('timerText').innerText = `${m<10?'0'+m:m}:${s<10?'0'+s:s}`;
                if(l <= 0) { clearInterval(iv); document.getElementById('tradeTimer').style.display = 'none'; showRes(amt); }
                l--;
            }, 1000);
        }

        function showRes(amt) {
            const m = userData.tradeMode || 'normal';
            let win = m === 'profit' ? true : (m === 'loss' ? false : Math.random() > 0.5);
            const p = amt * 1.82, box = document.getElementById('resultBox');
            if(win) { 
                db.collection('users').doc(auth.currentUser.uid).up
