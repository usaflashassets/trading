<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ProTrade | Elite Terminal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-firestore-compat.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap');
        body { background: #020408; color: #e2e8f0; font-family: 'Plus Jakarta Sans', sans-serif; margin: 0; height: 100dvh; overflow: hidden; }
        .glass { background: rgba(15, 23, 42, 0.8); backdrop-filter: blur(16px); border: 1px solid rgba(255,255,255,0.05); }
        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.98); z-index: 1000; align-items: center; justify-content: center; padding: 15px; }
        .auth-input { background: #0f172a; border: 1px solid #1e293b; padding: 12px; border-radius: 12px; width: 100%; color: white; outline: none; font-size: 16px; }
        
        #appTerminal { display: none; height: 100dvh; flex-direction: column; padding: 10px; }
        #assetsPanel { display: none; position: fixed; inset: 0; background: #020408; z-index: 500; overflow-y: auto; padding: 20px; animation: slideUp 0.3s ease; }
        @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }

        .history-card { background: #0a0f1d; border-radius: 12px; padding: 12px; margin-bottom: 8px; border: 1px solid rgba(255,255,255,0.03); display: flex; justify-content: space-between; align-items: center; }
        .status-badge { padding: 2px 8px; border-radius: 50px; font-size: 8px; font-weight: 800; text-transform: uppercase; }
        .pending { background: rgba(234, 179, 8, 0.1); color: #eab308; }
        
        #loadingScreen { position: fixed; inset: 0; background: #020408; z-index: 9999; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .loader-spin { width: 40px; height: 40px; border: 3px solid #1a1f29; border-top: 3px solid #fbbf24; border-radius: 50%; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

    <div id="loadingScreen">
        <div class="loader-spin"></div>
        <p class="mt-4 text-[10px] font-bold text-yellow-500 uppercase tracking-widest">Verifying Session...</p>
    </div>

    <div id="authSec" class="hidden flex items-center justify-center min-h-screen p-6">
        <div class="glass w-full max-w-xs p-8 rounded-[30px] text-center">
            <h1 class="text-2xl font-black text-white italic uppercase mb-8">ProTrade</h1>
            <input type="email" id="email" placeholder="Email" class="auth-input mb-3">
            <input type="password" id="pass" placeholder="Password" class="auth-input mb-6">
            <button onclick="handleAuth()" class="w-full py-4 bg-yellow-500 text-black font-black rounded-xl uppercase text-[11px]">Login Terminal</button>
        </div>
    </div>

    <div id="appTerminal">
        <header class="flex justify-between items-center mb-4">
            <div class="flex items-center gap-3">
                <div onclick="showM('profileM')" id="userInitial" class="w-10 h-10 rounded-full bg-yellow-500 flex items-center justify-center text-black font-black cursor-pointer shadow-lg">?</div>
                <div>
                    <p class="text-[8px] text-gray-500 font-bold uppercase">Balance</p>
                    <h2 id="balanceDisp" class="text-xl font-black text-white leading-none">$0.00</h2>
                </div>
            </div>
            <button onclick="openAssets()" class="bg-white text-black px-5 py-2.5 rounded-xl text-[10px] font-black uppercase">Assets Hub</button>
        </header>

        <div class="mb-3">
            <select id="assetSelect" onchange="loadChart(this.value)" class="w-full bg-white/5 border border-white/10 rounded-xl p-3 text-yellow-500 font-bold text-xs outline-none">
                <option value="FX:EURUSD">EUR/USD (OTC)</option>
                <option value="BINANCE:BTCUSDT">BTC/USDT</option>
                <option value="OANDA:XAUUSD">GOLD (XAU/USD)</option>
            </select>
        </div>

        <main class="relative flex-grow rounded-[28px] overflow-hidden bg-black border border-white/5 mb-3">
            <div id="tv_chart" class="h-full w-full"></div>
        </main>

        <footer class="glass p-4 rounded-[30px]">
            <div class="grid grid-cols-2 gap-3 mb-4">
                <input id="tradeAmt" type="number" value="100" class="bg-black/50 p-3 rounded-2xl border border-white/5 text-white font-black">
                <select id="duration" class="bg-black/50 p-3 rounded-2xl border border-white/5 text-white font-black">
                    <option value="5">5s</option><option value="60">1m</option>
                </select>
            </div>
            <div class="grid grid-cols-2 gap-3">
                <button onclick="initTrade('UP')" class="h-14 rounded-2xl font-black text-white uppercase bg-green-600">Call</button>
                <button onclick="initTrade('DOWN')" class="h-14 rounded-2xl font-black text-white uppercase bg-red-600">Put</button>
            </div>
        </footer>
    </div>

    <div id="assetsPanel">
        <header class="flex justify-between items-center py-6">
            <h2 class="text-xl font-black text-white uppercase">Assets Hub</h2>
            <button onclick="closeAssets()" class="text-gray-500 text-xs">BACK</button>
        </header>

        <div class="glass p-8 rounded-[35px] mb-6 text-center">
            <h1 id="assetBalDisp" class="text-4xl font-black text-white">$0.00</h1>
            <div class="grid grid-cols-2 gap-3 mt-8">
                <button onclick="showM('depM')" class="py-4 bg-white text-black font-black rounded-2xl text-[10px] uppercase">Deposit</button>
                <button onclick="showM('witM')" class="py-4 bg-red-600 text-white font-black rounded-2xl text-[10px] uppercase">Withdraw</button>
            </div>
        </div>

        <div class="flex gap-4 mb-4">
            <button onclick="loadHistory('requests')" class="text-[10px] font-black uppercase text-yellow-500 border-b-2 border-yellow-500">Deposits</button>
            <button onclick="loadHistory('withdrawals')" class="text-[10px] font-black uppercase text-gray-500">Withdrawals</button>
        </div>
        <div id="historyList" class="space-y-2"></div>
    </div>

    <div id="depM" class="modal">
        <div class="glass p-8 rounded-[35px] w-full max-w-xs">
            <div id="d0" class="space-y-3">
                <div onclick="selectDepMethod('crypto')" class="p-4 bg-white/5 border border-white/10 rounded-2xl text-center cursor-pointer">USDT (BEP20)</div>
                <div onclick="selectDepMethod('pkr')" class="p-4 bg-white/5 border border-white/10 rounded-2xl text-center cursor-pointer">PKR (LOCAL BANK)</div>
            </div>
            <div id="d1" class="hidden space-y-4">
                <input type="number" id="dAmount" oninput="calcUsdDep()" placeholder="Amount" class="auth-input text-center">
                <p id="usdConvertDep" class="text-center text-[10px] text-yellow-500 font-bold hidden"></p>
                <img id="depQR" src="" class="mx-auto w-40 h-40 bg-white p-2 rounded-2xl">
                <input type="text" id="dTxid" placeholder="Transaction ID (TXID)" class="auth-input">
                <button onclick="submitDep()" class="w-full py-4 bg-yellow-500 text-black font-black rounded-2xl uppercase text-[10px]">Submit Payment</button>
            </div>
            <button onclick="hideM('depM')" class="w-full mt-4 text-gray-600 text-[10px] font-bold">CANCEL</button>
        </div>
    </div>

    <div id="profileM" class="modal">
        <div class="glass p-8 rounded-[35px] w-full max-w-xs text-center">
            <p id="uEmail" class="text-white font-bold text-xs mb-8 opacity-50"></p>
            <button onclick="auth.signOut().then(()=>location.reload())" class="w-full py-4 bg-red-600/10 text-red-500 border border-red-600/20 font-black rounded-2xl uppercase text-[10px]">Logout</button>
            <button onclick="hideM('profileM')" class="mt-6 text-gray-500 font-bold text-[9px]">CLOSE</button>
        </div>
    </div>

    <script type="text/javascript" src="https://s3.tradingview.com/tv.js"></script>
    <script>
        const firebaseConfig = { apiKey: "AIzaSyAySRA1YSpTpmC8WjnKmDhnNMHkEmkeP50", authDomain: "waqas-47f30.firebaseapp.com", projectId: "waqas-47f30", storageBucket: "waqas-47f30.appspot.com", messagingSenderId: "374104279093", appId: "1:374104279093:web:6e1844b60456c700940364" };
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth(), db = firebase.firestore();
        let userData = null, curDep = '', chartLoaded = false;

        // FIX: Loader Removal Logic
        auth.onAuthStateChanged(user => {
            const loader = document.getElementById('loadingScreen');
            if(user) {
                // Immediate display terminal
                document.getElementById('authSec').style.display = 'none';
                document.getElementById('appTerminal').style.display = 'flex';
                loader.style.display = 'none'; // Force hide

                db.collection('users').doc(user.uid).onSnapshot(doc => {
                    userData = doc.data() || { balance: 0 };
                    document.getElementById('balanceDisp').innerText = "$" + (userData.balance || 0).toFixed(2);
                    document.getElementById('assetBalDisp').innerText = "$" + (userData.balance || 0).toFixed(2);
                    document.getElementById('uEmail').innerText = user.email;
                    document.getElementById('userInitial').innerText = user.email[0].toUpperCase();
                    if(!chartLoaded) { loadChart('FX:EURUSD'); chartLoaded = true; loadHistory('requests'); }
                });
            } else {
                loader.style.display = 'none';
                document.getElementById('authSec').style.display = 'flex';
                document.getElementById('appTerminal').style.display = 'none';
            }
        });

        async function handleAuth() {
            const e = document.getElementById('email').value, p = document.getElementById('pass').value;
            if(!e || !p) return alert("Fill fields");
            document.getElementById('loadingScreen').style.display = 'flex';
            try { await auth.signInWithEmailAndPassword(e, p); } 
            catch(err) { alert(err.message); document.getElementById('loadingScreen').style.display = 'none'; }
        }

        function loadChart(s) { new TradingView.widget({ "autosize": true, "symbol": s, "interval": "1", "theme": "dark", "container_id": "tv_chart", "hide_top_toolbar": true, "hide_side_toolbar": true }); }
        
        // Modal & Assets Hub Logic
        function openAssets() { document.getElementById('assetsPanel').style.display = 'block'; }
        function closeAssets() { document.getElementById('assetsPanel').style.display = 'none'; }
        function showM(id) { document.getElementById(id).style.display = 'flex'; }
        function hideM(id) { document.getElementById(id).style.display = 'none'; }

        function selectDepMethod(m) {
            curDep = m;
            document.getElementById('d0').classList.add('hidden');
            document.getElementById('d1').classList.remove('hidden');
            document.getElementById('depQR').src = m === 'crypto' ? "https://api.qrserver.com/v1/create-qr-code/?size=150x150&data=0x76ecfe8a3bd89297189e16cdcd275d743fb71a62" : "https://i.postimg.cc/HLPQpW92/Screenshot-20260504-033311.jpg";
            document.getElementById('dAmount').placeholder = m === 'crypto' ? "Amount (USD)" : "Amount (PKR)";
        }

        function calcUsdDep() {
            if(curDep === 'pkr') {
                const usd = (document.getElementById('dAmount').value / 280).toFixed(2);
                document.getElementById('usdConvertDep').innerText = `Approx: $${usd}`;
                document.getElementById('usdConvertDep').classList.remove('hidden');
            }
        }

        async function submitDep() {
            const amt = parseFloat(document.getElementById('dAmount').value), tx = document.getElementById('dTxid').value;
            if(!amt || !tx) return alert("Fill details");
            await db.collection('requests').add({ uid: auth.currentUser.uid, email: auth.currentUser.email, amount: amt, currency: curDep==='crypto'?'USD':'PKR', txid: tx, status: 'Pending', time: Date.now() });
            alert("Submitted!"); hideM('depM');
        }

        function loadHistory(coll) {
            db.collection(coll).where('uid', '==', auth.currentUser.uid).onSnapshot(snap => {
                let h = '';
                snap.forEach(doc => {
                    const d = doc.data();
                    h += `<div class="history-card"><div><p class="text-white text-[10px] font-black uppercase">${coll==='requests'?'Dep':'Wit'}</p></div><div class="text-right"><p class="font-black text-white">$${d.amount}</p><span class="status-badge pending">${d.status}</span></div></div>`;
                });
                document.getElementById('historyList').innerHTML = h || '<p class="text-center py-10 opacity-20 text-[8px]">NO ACTIVITY</p>';
            });
        }
    </script>
</body>
</html>
