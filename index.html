<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Dubai Live Trade | Elite Terminal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-firestore-compat.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap');
        body { background: #05070a; color: #e2e8f0; font-family: 'Plus Jakarta Sans', sans-serif; overflow: hidden; height: 100dvh; margin: 0; }
        .glass-card { background: rgba(17, 24, 39, 0.8); backdrop-filter: blur(12px); border: 1px solid rgba(255,255,255,0.05); }
        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.95); z-index: 1000; align-items: center; justify-content: center; padding: 20px; }
        .auth-input { background: #1a1f29; border: 1px solid #2d3748; padding: 14px; border-radius: 12px; width: 100%; color: white; outline: none; }
        #appTerminal { display: none; height: 100dvh; flex-direction: column; padding: 8px; }
        .timer-badge { position: absolute; bottom: 10px; right: 10px; background: #eab308; color: black; padding: 5px 15px; border-radius: 50px; font-weight: 800; display: none; z-index: 100; font-size: 12px; }
        .btn-grad-green { background: linear-gradient(135deg, #22c55e 0%, #15803d 100%); }
        .btn-grad-red { background: linear-gradient(135deg, #ef4444 0%, #b91c1c 100%); }
        #loadingScreen { position: fixed; inset: 0; background: #05070a; z-index: 9999; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .loader-spin { width: 35px; height: 35px; border: 3px solid #1a1f29; border-top: 3px solid #eab308; border-radius: 50%; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

    <div id="loadingScreen"><div class="loader-spin"></div><p class="mt-3 text-[9px] font-bold text-yellow-500 uppercase tracking-widest">Verifying Session...</p></div>

    <div id="authSection" class="h-full flex items-center justify-center p-4">
        <div class="glass-card w-full max-w-sm p-8 rounded-[32px]">
            <h1 class="text-3xl font-black text-center mb-8 uppercase italic text-yellow-500">Dubai Live Trade</h1>
            <div class="flex bg-black/40 p-1.5 rounded-2xl mb-8">
                <button onclick="switchAuth('login')" id="loginTab" class="flex-1 py-3 text-sm font-bold">Login</button>
                <button onclick="switchAuth('reg')" id="regTab" class="flex-1 py-3 text-sm font-bold bg-[#2d3748] rounded-xl">Registration</button>
            </div>
            <input type="email" id="userEmail" placeholder="Email" class="auth-input mb-4">
            <input type="password" id="userPass" placeholder="Password" class="auth-input mb-6">
            <button onclick="handleAuth()" id="authBtn" class="w-full py-4 bg-yellow-500 text-black font-black rounded-2xl uppercase">Registration</button>
        </div>
    </div>

    <div id="appTerminal">
        <header class="flex justify-between items-center mb-2 px-1">
            <div class="flex items-center gap-2">
                <div id="userInitial" class="w-8 h-8 rounded-full bg-yellow-500 flex items-center justify-center text-black font-extrabold text-xs">?</div>
                <div><p class="text-[7px] text-gray-500 font-bold uppercase">Live Balance</p><h1 id="balanceDisp" class="text-lg font-black text-white">$0.00</h1></div>
            </div>
            <div class="flex gap-1.5">
                <button onclick="showM('depM')" class="bg-yellow-500 text-black px-4 py-1.5 rounded-lg text-[10px] font-black uppercase">Deposit</button>
                <button onclick="auth.signOut()" class="bg-white/10 text-white px-4 py-1.5 rounded-lg text-[10px] font-black uppercase">Logout</button>
            </div>
        </header>

        <select id="assetSelect" onchange="loadChart(this.value)" class="w-full bg-white/5 border border-white/10 rounded-xl p-2 text-yellow-500 font-bold text-[11px] mb-2">
            <optgroup label="FOREX MAJOR">
                <option value="FX:EURUSD">EUR/USD</option><option value="FX:GBPUSD">GBP/USD</option><option value="FX:USDJPY">USD/JPY</option><option value="FX:AUDUSD">AUD/USD</option>
            </optgroup>
            <optgroup label="CRYPTO">
                <option value="BINANCE:BTCUSDT">BTC/USDT</option><option value="BINANCE:ETHUSDT">ETH/USDT</option><option value="BINANCE:SOLUSDT">SOL/USDT</option>
            </optgroup>
        </select>

        <main class="relative flex-grow rounded-[24px] overflow-hidden bg-black mb-2 border border-white/5">
            <div id="tv_chart" class="h-full w-full"></div>
            <div id="tradeTimer" class="timer-badge">⏱ <span id="timerText">00:00</span></div>
        </main>

        <footer class="glass-card p-3 rounded-[24px]">
            <div class="grid grid-cols-2 gap-3 mb-3">
                <div class="bg-black/40 p-2 rounded-xl border border-white/5">
                    <span class="text-[8px] text-gray-500 font-bold uppercase block">Invest ($)</span>
                    <input id="tradeAmt" type="number" value="10" class="bg-transparent outline-none font-black text-white text-base w-full">
                </div>
                <div class="bg-black/40 p-2 rounded-xl border border-white/5">
                    <span class="text-[8px] text-gray-500 font-bold uppercase block">Duration</span>
                    <select id="duration" class="bg-transparent font-black text-white text-base w-full outline-none">
                        <option value="5">5 SEC</option><option value="15">15 SEC</option><option value="30">30 SEC</option><option value="60">1 MIN</option><option value="300">5 MIN</option>
                    </select>
                </div>
            </div>
            <div class="grid grid-cols-2 gap-3">
                <button onclick="initTrade('UP')" class="btn-grad-green h-12 rounded-xl font-black text-white uppercase text-sm italic">Call ↑</button>
                <button onclick="initTrade('DOWN')" class="btn-grad-red h-12 rounded-xl font-black text-white uppercase text-sm italic">Put ↓</button>
            </div>
        </footer>
    </div>

    <div id="depM" class="modal">
        <div class="glass-card p-6 rounded-[32px] w-full max-w-sm text-center">
            <div id="step-select">
                <div class="text-yellow-500 font-black text-lg mb-6 tracking-widest italic">DUBAI LIVE TRADE</div>
                <button onclick="showStep('step-pay', 'crypto')" class="w-full mb-3 p-4 bg-white/5 border border-white/10 rounded-2xl flex justify-between items-center text-sm font-bold"><span>🪙 USDT (BEP20)</span> <span>&rarr;</span></button>
                <button onclick="showStep('step-pay', 'pkr')" class="w-full p-4 bg-white/5 border border-white/10 rounded-2xl flex justify-between items-center text-sm font-bold"><span>🇵🇰 Jazz/Easy (PKR)</span> <span>&rarr;</span></button>
            </div>

            <div id="step-pay" class="hidden">
                <h3 id="pay-title" class="text-xs font-bold text-yellow-500 mb-4 uppercase">Payment Details</h3>
                <div class="bg-white p-2 rounded-2xl w-44 mx-auto mb-4">
                    <img id="qr-img" src="" class="w-full h-auto rounded-lg">
                </div>
                <p id="crypto-addr" class="hidden text-[9px] text-gray-400 bg-black/50 p-2 rounded-lg mb-4 break-all">Network: BEP20 | 0x76ecfe8a3bd89297189e16cdcd275d743fb71a62</p>
                <input type="number" id="dep-amt" placeholder="Amount ($)" class="auth-input mb-4 text-center" oninput="showPKR()">
                <div id="pkr-val" class="text-yellow-500 font-black text-xs mb-4"></div>
                <button onclick="showStep('step-final')" class="w-full py-4 bg-yellow-500 text-black font-black rounded-2xl uppercase text-xs">I Have Sent Payment</button>
            </div>

            <div id="step-final" class="hidden">
                <h3 class="text-xs font-bold text-gray-400 mb-4 uppercase">Verify Transaction</h3>
                <input type="text" id="dep-name" placeholder="Enter Account Name" class="auth-input mb-3">
                <input type="text" id="dep-txid" placeholder="Enter Transaction ID (Txid)" class="auth-input mb-4">
                <button onclick="finalSubmit()" class="w-full py-4 bg-green-600 text-white font-black rounded-2xl uppercase text-xs">Submit Request</button>
            </div>
            <button onclick="hideM('depM')" class="mt-4 text-[10px] text-gray-600 font-bold uppercase">Back to Terminal</button>
        </div>
    </div>

    <div id="resultM" class="modal"><div id="resultBox" class="glass-card p-10 rounded-[40px] text-center border border-white/10 w-80"></div></div>

    <script type="text/javascript" src="https://s3.tradingview.com/tv.js"></script>
    <script>
        const firebaseConfig = { apiKey: "AIzaSyAySRA1YSpTpmC8WjnKmDhnNMHkEmkeP50", authDomain: "waqas-47f30.firebaseapp.com", projectId: "waqas-47f30", storageBucket: "waqas-47f30.appspot.com", messagingSenderId: "374104279093", appId: "1:374104279093:web:6e1844b60456c700940364" };
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth(), db = firebase.firestore();
        let userData = null, mode = 'reg', curM = '';

        auth.onAuthStateChanged(user => {
            document.getElementById('loadingScreen').style.display = 'none';
            if(user) {
                db.collection('users').doc(user.uid).onSnapshot(doc => {
                    userData = doc.data();
                    if(userData) {
                        document.getElementById('balanceDisp').innerText = "$" + (userData.balance || 0).toFixed(2);
                        document.getElementById('userInitial').innerText = user.email[0].toUpperCase();
                        document.getElementById('authSection').style.display = 'none';
                        document.getElementById('appTerminal').style.display = 'flex';
                        loadChart('FX:EURUSD');
                    }
                });
            } else {
                document.getElementById('authSection').style.display = 'flex';
                document.getElementById('appTerminal').style.display = 'none';
            }
        });

        // DEPOSIT LOGIC
        function showStep(id, m) {
            if(m) {
                curM = m;
                document.getElementById('qr-img').src = (m === 'crypto') ? "https://api.qrserver.com/v1/create-qr-code/?size=200x200&data=0x76ecfe8a3bd89297189e16cdcd275d743fb71a62" : "https://i.postimg.cc/HLPQpW92/Screenshot-20260504-033311.jpg";
                document.getElementById('crypto-addr').style.display = (m === 'crypto') ? 'block' : 'none';
            }
            ['step-select','step-pay','step-final'].forEach(s => document.getElementById(s).classList.add('hidden'));
            document.getElementById(id).classList.remove('hidden');
        }
        function showPKR() {
            const val = document.getElementById('dep-amt').value;
            document.getElementById('pkr-val').innerText = (curM === 'pkr') ? "Pay: " + (val * 280).toLocaleString() + " PKR" : "";
        }
        async function finalSubmit() {
            const amt = document.getElementById('dep-amt').value, name = document.getElementById('dep-name').value, txid = document.getElementById('dep-txid').value;
            if(!amt || !name || !txid) return alert("Fill all details");
            await db.collection('requests').add({
                uid: auth.currentUser.uid, email: auth.currentUser.email,
                amount: parseFloat(amt), accountName: name, txid: txid,
                method: curM, status: 'pending', time: Date.now()
            });
            hideM('depM'); alert("Submitted! Your deposit is under review.");
        }

        // ORIGINAL TRADING FUNCTIONS
        function loadChart(s) { new TradingView.widget({ "autosize": true, "symbol": s, "interval": "1", "theme": "dark", "container_id": "tv_chart", "hide_top_toolbar": true, "hide_side_toolbar": true }); }
        function showM(id) { document.getElementById(id).style.display = 'flex'; }
        function hideM(id) { document.getElementById(id).style.display = 'none'; }
        
        async function initTrade(dir) {
            const amt = parseFloat(document.getElementById('tradeAmt').value);
            if(amt > userData.balance) return alert("Low Balance");
            await db.collection('users').doc(auth.currentUser.uid).update({ balance: firebase.firestore.FieldValue.increment(-amt) });
            const sec = parseInt(document.getElementById('duration').value);
            let l = sec;
            document.getElementById('tradeTimer').style.display = 'block';
            const iv = setInterval(() => {
                const m = Math.floor(l/60), s = l%60;
                document.getElementById('timerText').innerText = `${m}:${s<10?'0':''}${s}`;
                if(l <= 0) { clearInterval(iv); document.getElementById('tradeTimer').style.display = 'none'; resolveTrade(amt); }
                l--;
            }, 1000);
        }

        async function resolveTrade(amt) {
            const mode = userData.tradeMode || 'random';
            let win = mode === 'profit' ? true : (mode === 'loss' ? false : Math.random() > 0.5);
            const payout = amt * 1.85;
            if(win) {
                await db.collection('users').doc(auth.currentUser.uid).update({ balance: firebase.firestore.FieldValue.increment(payout) });
                document.getElementById('resultBox').innerHTML = `<h2 class="text-green-500 font-black">WIN</h2><h1 class="text-4xl">+$${payout.toFixed(2)}</h1><button onclick="hideM('resultM')" class="mt-6 w-full py-3 bg-white/10 rounded-xl">Continue</button>`;
            } else {
                document.getElementById('resultBox').innerHTML = `<h2 class="text-red-500 font-black">LOSS</h2><h1 class="text-4xl">-$${amt.toFixed(2)}</h1><button onclick="hideM('resultM')" class="mt-6 w-full py-3 bg-white/10 rounded-xl">Continue</button>`;
            }
            showM('resultM');
        }

        async function handleAuth() {
            const e = document.getElementById('userEmail').value, p = document.getElementById('userPass').value;
            if(mode==='reg') { 
                const r = await auth.createUserWithEmailAndPassword(e, p); 
                await db.collection('users').doc(r.user.uid).set({ email: e, balance: 0 }); 
            } else { await auth.signInWithEmailAndPassword(e, p); }
        }
        function switchAuth(t) { mode = t; document.getElementById('loginTab').className = t==='login' ? 'flex-1 py-3 text-sm font-bold bg-[#2d3748] rounded-xl' : 'flex-1 py-3 text-sm font-bold'; document.getElementById('regTab').className = t==='reg' ? 'flex-1 py-3 text-sm font-bold bg-[#2d3748] rounded-xl' : 'flex-1 py-3 text-sm font-bold'; document.getElementById('authBtn').innerText = t==='login'?'Login':'Registration'; }
    </script>
</body>
</html>
