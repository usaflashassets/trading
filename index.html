<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ProTrade Global | Elite Terminal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-firestore-compat.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap');
        body { background: #05070a; color: #e2e8f0; font-family: 'Plus Jakarta Sans', sans-serif; overflow: hidden; height: 100dvh; margin: 0; }
        .glass-card { background: rgba(17, 24, 39, 0.8); backdrop-filter: blur(12px); border: 1px solid rgba(255,255,255,0.05); }
        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.95); z-index: 1000; align-items: center; justify-content: center; padding: 20px; }
        .auth-input { background: #1a1f29; border: 1px solid #2d3748; padding: 14px; border-radius: 12px; width: 100%; color: white; outline: none; }
        #appTerminal { display: none; height: 100dvh; flex-direction: column; padding: 10px; }
        .timer-badge { position: absolute; bottom: 20px; right: 20px; background: #eab308; color: black; padding: 10px 20px; border-radius: 50px; font-weight: 800; display: none; z-index: 100; box-shadow: 0 0 15px rgba(234,179,8,0.4); }
        .btn-grad-green { background: linear-gradient(135deg, #22c55e 0%, #15803d 100%); }
        .btn-grad-red { background: linear-gradient(135deg, #ef4444 0%, #b91c1c 100%); }
        
        /* Member Hub Integrated Styles */
        .hub-modal { display: none; position: fixed; inset: 0; background: #020408; z-index: 2000; overflow-y: auto; }
        .glass-hub { background: rgba(15, 23, 42, 0.8); backdrop-filter: blur(16px); border: 1px solid rgba(255,255,255,0.05); }
        #fancyToast { display: none; position: fixed; top: 20px; left: 50%; transform: translateX(-50%); z-index: 3000; padding: 15px 25px; border-radius: 20px; text-align: center; border: 1px solid; animation: slideDown 0.5s ease forwards; width: 80%; max-width: 300px; }
        @keyframes slideDown { from { top: -100px; opacity: 0; } to { top: 20px; opacity: 1; } }
        .history-card { background: #0a0f1d; border-radius: 12px; padding: 10px; margin-bottom: 8px; border: 1px solid rgba(255,255,255,0.03); display: flex; justify-content: space-between; align-items: center; }
        .status-badge { padding: 2px 8px; border-radius: 50px; font-size: 8px; font-weight: 800; text-transform: uppercase; }
        .pending { background: rgba(234, 179, 8, 0.1); color: #eab308; }
        .success { background: rgba(34, 197, 94, 0.1); color: #22c55e; }
        .option-card { background: rgba(255,255,255,0.02); border: 1px solid rgba(255,255,255,0.08); padding: 12px; border-radius: 12px; cursor: pointer; transition: 0.2s; margin-bottom: 8px; }
        .btn-small { padding: 12px; border-radius: 10px; font-size: 10px; font-weight: 800; text-transform: uppercase; letter-spacing: 0.5px; }
    </style>
</head>
<body>

            <h1 class="text-3xl font-black text-center mb-8 uppercase italic tracking-tighter">ProTrade</h1>
            <div class="flex bg-black/40 p-1.5 rounded-2xl mb-8">
                <button onclick="switchAuth('login')" id="loginTab" class="flex-1 py-3 text-sm font-bold bg-[#2d3748] rounded-xl shadow-lg">Login</button>
                <button onclick="switchAuth('reg')" id="regTab" class="flex-1 py-3 text-sm font-bold">Registration</button>
            </div>
            <div class="space-y-4">
                <input type="email" id="userEmail" placeholder="Email" class="auth-input">
                <input type="password" id="userPass" placeholder="Password" class="auth-input">
                <button onclick="handleAuth()" id="authBtn" class="w-full py-4 bg-blue-600 text-white font-black rounded-2xl text-sm uppercase">Login</button>
            </div>
        </div>

                    <option value="FX:EURUSD">EUR/USD</option>
                    <option value="FX:GBPUSD">GBP/USD</option>
                    <option value="FX:USDJPY">USD/JPY</option>
                    <option value="FX:AUDUSD">AUD/USD</option>
                    <option value="FX:USDCAD">USD/CAD</option>
                    <option value="FX:USDCHF">USD/CHF</option>
                    <option value="FX:NZDUSD">NZD/USD</option>
                    <option value="FX:EURJPY">EUR/JPY</option>
                    <option value="FX:GBPJPY">GBP/JPY</option>
                    <option value="FX:EURGBP">EUR/GBP</option>
                    <option value="FX:AUDJPY">AUD/JPY</option>
                    <option value="FX:EURAUD">EUR/AUD</option>
                    <option value="FX:GBPAUD">GBP/AUD</option>
                    <option value="FX:CADJPY">CAD/JPY</option>
                </optgroup>

                    <option value="OANDA:XAUUSD">GOLD (XAU/USD)</option>
                    <option value="OANDA:XAGUSD">SILVER (XAG/USD)</option>
                    <option value="NASDAQ:AAPL">APPLE</option>
                    <option value="NASDAQ:TSLA">TESLA</option>
                    <option value="NASDAQ:NVDA">NVIDIA</option>

        </div>

        <main class="relative flex-grow rounded-[32px] overflow-hidden border border-gray-800 bg-black mb-3">
            <div id="tv_chart" class="h-full w-full"></div>
            <div id="tradeTimer" class="timer-badge">⏱ <span id="timerText">00:00</span></div>
        </main>

        <footer class="glass-card p-4 rounded-[32px]">
            <div class="grid grid-cols-2 gap-4 mb-4">
                <div class="bg-black/40 px-5 py-3 rounded-2xl border border-white/5">
                    <span class="text-[9px] text-gray-500 font-bold uppercase block mb-1">Amount</span>
                    <input id="tradeAmt" type="number" value="100" class="bg-transparent outline-none font-black text-white text-lg w-full">
                </div>
                <div class="bg-black/40 px-5 py-3 rounded-2xl border border-white/5">
                    <span class="text-[9px] text-gray-500 font-bold uppercase block mb-1">Time</span>
                    <select id="duration" class="bg-transparent font-black text-white text-lg w-full outline-none">
                        <option value="5">5 Sec</option>
                        <option value="15">15 Sec</option>

                        <option value="60">1 Min</option>

                <button onclick="initTrade('DOWN')" class="btn-grad-red h-16 rounded-[24px] font-black text-white text-base uppercase">Put</button>
            </div>
        </footer>

    <div id="assetsHub" class="hub-modal">

            <div id="toastMsg" class="text-xs font-black uppercase tracking-widest text-white"></div>

                    <div>
                        <p class="text-[8px] text-gray-500 font-bold uppercase leading-none mb-1">Total Balance</p>

                <div class="text-right">
                    <div class="flex items-center gap-1 justify-end">

                <button onclick="hideM('profileM')" class="mt-4 text-[9px] text-gray-600 font-bold uppercase">Close</button>
            </div>
        </div>
