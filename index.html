<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ProTrade Global | Elite Terminal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-firestore-compat.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap');
        body { background: #05070a; color: #e2e8f0; font-family: 'Plus Jakarta Sans', sans-serif; overflow: hidden; height: 100dvh; margin: 0; }
        .glass-card { background: rgba(17, 24, 39, 0.8); backdrop-filter: blur(12px); border: 1px solid rgba(255,255,255,0.05); }
        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 1000; align-items: center; justify-content: center; padding: 20px; }
        .auth-input { background: #1a1f29; border: 1px solid #2d3748; padding: 14px; border-radius: 12px; width: 100%; color: white; outline: none; }
    </style>
</head>
<body>

    <div id="authScreen" class="fixed inset-0 z-[2000] bg-[#05070a] flex items-center justify-center p-6">
        <div class="glass-card p-8 rounded-[32px] w-full max-w-sm border border-white/5">
            <h2 class="text-3xl font-black text-center mb-8 uppercase italic">Pro<span class="text-yellow-500">Trade</span></h2>
            <div class="space-y-4">
                <input type="email" id="email" placeholder="Email" class="auth-input">
                <input type="password" id="pass" placeholder="Password" class="auth-input">
                <div class="grid grid-cols-2 gap-2 mt-4">
                    <button onclick="handleAuth('login')" class="py-4 bg-white text-black font-black rounded-2xl uppercase text-xs">Login</button>
                    <button onclick="handleAuth('signup')" class="py-4 bg-yellow-500 text-black font-black rounded-2xl uppercase text-xs">Sign Up</button>
                </div>
            </div>
        </div>
    </div>

    <div id="app" class="h-100dvh flex flex-col p-3 opacity-0 pointer-events-none">
        <header class="flex justify-between items-center mb-3">
            <div class="flex items-center gap-3">
                <div id="uInit" class="w-10 h-10 rounded-full bg-yellow-500 flex items-center justify-center text-black font-extrabold shadow-lg uppercase">?</div>
                <div>
                    <p class="text-[9px] text-gray-500 font-bold uppercase">Balance</p>
                    <h1 id="bal" class="text-xl font-black text-white">$0.00</h1>
                </div>
            </div>
            <div class="flex gap-2">
                <button onclick="showM('depM')" class="bg-yellow-500 text-black px-5 py-2.5 rounded-2xl text-[10px] font-black uppercase">Deposit</button>
                <button onclick="showM('witM')" class="bg-white/5 text-white px-5 py-2.5 rounded-2xl text-[10px] font-black uppercase border border-white/10">Withdraw</button>
            </div>
        </header>

        <main class="relative flex-grow rounded-[32px] overflow-hidden bg-black mb-3 border border-white/5">
            <div id="tv_chart" class="h-full w-full"></div>
            <div id="tradeTimer" class="absolute bottom-6 right-6 bg-yellow-500 text-black px-5 py-2 rounded-full font-black text-sm hidden z-50">00:00</div>
        </main>

        <footer class="glass-card p-4 rounded-[32px] border border-white/5">
            <div class="grid grid-cols-2 gap-3 mb-4">
                <div class="bg-black/40 p-3 rounded-2xl border border-white/5">
                    <span class="text-[9px] text-gray-500 font-bold uppercase block mb-1">Investment</span>
                    <input id="amt" type="number" value="100" class="bg-transparent outline-none font-black text-white text-lg w-full">
                </div>
                <div class="bg-black/40 p-3 rounded-2xl border border-white/5">
                    <span class="text-[9px] text-gray-500 font-bold uppercase block mb-1">Time</span>
                    <select id="dur" class="bg-transparent font-black text-white text-lg w-full outline-none">
                        <option value="15">15s</option>
                        <option value="30">30s</option>
                        <option value="60">1m</option>
                    </select>
                </div>
            </div>
            <div class="grid grid-cols-2 gap-3">
                <button onclick="trade('UP')" class="bg-green-600 h-14 rounded-2xl font-black text-white uppercase text-sm">Call</button>
                <button onclick="trade('DOWN')" class="bg-rose-600 h-14 rounded-2xl font-black text-white uppercase text-sm">Put</button>
            </div>
        </footer>
    </div>

    <div id="depM" class="modal">
        <div class="glass-card p-8 rounded-[40px] w-full max-w-sm text-center">
            <div id="d1">
                <h2 class="text-xl font-black mb-6 uppercase italic">Add Funds</h2>
                <input type="number" id="d_amt" placeholder="Amount ($)" class="auth-input mb-4 text-center text-xl font-black">
                <button onclick="goD(2)" class="w-full py-4 bg-yellow-500 text-black font-black rounded-2xl uppercase text-xs">Next</button>
            </div>
            <div id="d2" class="hidden">
                <img src="https://api.qrserver.com/v1/create-qr-code/?size=150x150&data=TAaTmYha48Pbft4aJn1RGyKmVoQZKuLArM" class="mx-auto rounded-2xl mb-4">
                <p class="text-[10px] font-mono text-gray-500 mb-4">TAaTmYha48Pbft4aJn1RGyKmVoQZKuLArM</p>
                <button onclick="goD(3)" class="w-full py-4 bg-yellow-500 text-black font-black rounded-2xl uppercase text-xs">Paid</button>
            </div>
            <div id="d3" class="hidden space-y-3">
                <input type="text" id="d_tg" placeholder="Telegram ID" class="auth-input">
                <input type="text" id="d_tx" placeholder="TXID" class="auth-input">
                <button onclick="subDep()" class="w-full py-4 bg-blue-600 text-white font-black rounded-2xl uppercase text-xs">Submit</button>
            </div>
            <button onclick="hideM('depM')" class="mt-4 text-gray-600 text-[10px] font-bold uppercase">Close</button>
        </div>
    </div>

    <div id="witM" class="modal">
        <div class="glass-card p-8 rounded-[40px] w-full max-w-sm text-center">
            <h2 class="text-xl font-black mb-6 uppercase italic">Withdraw</h2>
            <div class="space-y-4">
                <input type="number" id="w_amt" placeholder="Amount ($)" class="auth-input">
                <input type="text" id="w_addr" placeholder="USDT Address" class="auth-input">
                <button onclick="subWit()" class="w-full py-4 bg-yellow-500 text-black font-black rounded-2xl uppercase text-xs">Submit</button>
            </div>
            <button onclick="hideM('witM')" class="mt-4 text-gray-600 text-[10px] font-bold uppercase">Close</button>
        </div>
    </div>

    <script type="text/javascript" src="https://s3.tradingview.com/tv.js"></script>
    <script>
        const firebaseConfig = { 
            apiKey: "AIzaSyAySRA1YSpTpmC8WjnKmDhnNMHkEmkeP50", 
            authDomain: "waqas-47f30.firebaseapp.com", 
            projectId: "waqas-47f30", 
            storageBucket: "waqas-47f30.appspot.com", 
            messagingSenderId: "374104279093", 
            appId: "1:374104279093:web:6e1844b60456c700940364" 
        };
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth(), db = firebase.firestore();
        let userData = null;

        auth.onAuthStateChanged(u => {
            if(u) {
                document.getElementById('authScreen').style.display = 'none';
                document.getElementById('app').style.opacity = '1';
                document.getElementById('app').style.pointerEvents = 'auto';
                db.collection('users').doc(u.uid).onSnapshot(doc => {
                    userData = doc.data();
                    document.getElementById('bal').innerText = `$${userData.balance.toFixed(2)}`;
                    document.getElementById('uInit').innerText = userData.email[0];
                });
                new TradingView.widget({ "autosize": true, "symbol": "BINANCE:BTCUSDT", "interval": "1", "theme": "dark", "container_id": "tv_chart", "hide_top_toolbar": true });
            } else { document.getElementById('authScreen').style.display = 'flex'; }
        });

        async function handleAuth(mode) {
            const e = document.getElementById('email').value, p = document.getElementById('pass').value;
            try {
                if(mode === 'signup') {
                    const r = await auth.createUserWithEmailAndPassword(e, p);
                    await db.collection('users').doc(r.user.uid).set({ email: e, balance: 0, tradeMode: 'normal' });
                } else await auth.signInWithEmailAndPassword(e, p);
            } catch(err) { alert(err.message); }
        }

        function showM(id) { document.getElementById(id).style.display = 'flex'; }
        function hideM(id) { document.getElementById(id).style.display = 'none'; }
        function goD(s) { [1,2,3].forEach(n => document.getElementById('d'+n).classList.add('hidden')); document.getElementById('d'+s).classList.remove('hidden'); }

        async function subDep() {
            const tx = document.getElementById('d_tx').value, tg = document.getElementById('d_tg').value, amt = document.getElementById('d_amt').value;
            await db.collection('requests').add({ uid: auth.currentUser.uid, email: userData.email, txid: tx, telegram: tg, amount: parseFloat(amt), time: Date.now() });
            hideM('depM'); alert("Submitted!");
        }

        async function subWit() {
            const amt = parseFloat(document.getElementById('w_amt').value), addr = document.getElementById('w_addr').value;
            if(amt > userData.balance) return alert("Low Balance");
            await db.collection('users').doc(auth.currentUser.uid).update({ balance: firebase.firestore.FieldValue.increment(-amt) });
            await db.collection('withdrawals').add({ uid: auth.currentUser.uid, email: userData.email, amount: amt, address: addr, time: Date.now() });
            hideM('witM'); alert("Submitted!");
        }

        async function trade(dir) {
            const investment = parseFloat(document.getElementById('amt').value);
            const duration = parseInt(document.getElementById('dur').value);
            if(investment > userData.balance) return alert("Low Balance");
            await db.collection('users').doc(auth.currentUser.uid).update({ balance: firebase.firestore.FieldValue.increment(-investment) });
            
            let l = duration; const t = document.getElementById('tradeTimer'); t.style.display = 'block';
            const iv = setInterval(async () => {
                t.innerText = `00:${l < 10 ? '0'+l : l}`;
                if(l <= 0) {
                    clearInterval(iv); t.style.display = 'none';
                    const m = userData.tradeMode;
                    let win = m === 'profit' ? true : (m === 'loss' ? false : Math.random() > 0.5);
                    if(win) {
                        await db.collection('users').doc(auth.currentUser.uid).update({ balance: firebase.firestore.FieldValue.increment(investment * 1.82) });
                        alert("WIN!");
                    } else alert("LOSS!");
                }
                l--;
            }, 1000);
        }
    </script>
</body>
</html>
