<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ProTrade Global | Elite Terminal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-firestore-compat.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap');
        body { background: #05070a; color: #e2e8f0; font-family: 'Plus Jakarta Sans', sans-serif; overflow: hidden; height: 100dvh; margin: 0; }
        .glass-card { background: rgba(17, 24, 39, 0.8); backdrop-filter: blur(12px); border: 1px solid rgba(255,255,255,0.05); }
        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.95); z-index: 1000; align-items: center; justify-content: center; padding: 20px; }
        .auth-input { background: #1a1f29; border: 1px solid #2d3748; padding: 14px; border-radius: 12px; width: 100%; color: white; outline: none; transition: 0.3s; }
        .auth-input:focus { border-color: #eab308; }
        #appTerminal { display: none; height: 100dvh; flex-direction: column; padding: 8px; }
        .timer-badge { position: absolute; bottom: 10px; right: 10px; background: #eab308; color: black; padding: 5px 15px; border-radius: 50px; font-weight: 800; display: none; z-index: 100; font-size: 12px; }
        .btn-grad-green { background: linear-gradient(135deg, #22c55e 0%, #15803d 100%); }
        .btn-grad-red { background: linear-gradient(135deg, #ef4444 0%, #b91c1c 100%); }
        #loadingScreen { position: fixed; inset: 0; background: #05070a; z-index: 9999; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .loader-spin { width: 35px; height: 35px; border: 3px solid #1a1f29; border-top: 3px solid #eab308; border-radius: 50%; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .qr-frame { border: 4px solid #eab308; border-radius: 20px; padding: 10px; background: white; margin: 0 auto; width: 180px; }
    </style>
</head>
<body>

    <div id="loadingScreen">
        <div class="loader-spin"></div>
        <p class="mt-3 text-[9px] font-bold text-yellow-500 uppercase tracking-widest">Verifying Session...</p>
    </div>

    <div id="authSection" class="h-full flex items-center justify-center p-4">
        <div class="glass-card w-full max-sm:w-full max-w-sm p-8 rounded-[32px]">
            <h1 class="text-3xl font-black text-center mb-8 uppercase italic tracking-tighter">ProTrade</h1>
            <div class="flex bg-black/40 p-1.5 rounded-2xl mb-8">
                <button onclick="switchAuth('login')" id="loginTab" class="flex-1 py-3 text-sm font-bold">Login</button>
                <button onclick="switchAuth('reg')" id="regTab" class="flex-1 py-3 text-sm font-bold bg-[#2d3748] rounded-xl">Registration</button>
            </div>
            <input type="email" id="userEmail" placeholder="Email" class="auth-input mb-4">
            <input type="password" id="userPass" placeholder="Password" class="auth-input mb-6">
            <button onclick="handleAuth()" id="authBtn" class="w-full py-4 bg-blue-600 text-white font-black rounded-2xl uppercase shadow-lg shadow-blue-900/20">Registration</button>
        </div>
    </div>

    <div id="appTerminal">
        <header class="flex justify-between items-center mb-2 px-1">
            <div class="flex items-center gap-2">
                <div onclick="showM('settingsM')" id="userInitial" class="w-9 h-9 rounded-full bg-yellow-500 flex items-center justify-center text-black font-extrabold cursor-pointer text-sm shadow-lg shadow-yellow-500/20">?</div>
                <div><p class="text-[7px] text-gray-500 font-bold uppercase tracking-wider">Net Balance</p><h1 id="balanceDisp" class="text-lg font-black text-white">$0.00</h1></div>
            </div>
            <div class="flex gap-1.5">
                <button onclick="showM('depM')" class="bg-yellow-500 text-black px-4 py-2 rounded-xl text-[10px] font-black uppercase">Deposit</button>
                <button onclick="showM('witM')" class="bg-white/5 text-white px-4 py-2 rounded-xl text-[10px] font-black uppercase border border-white/10">Withdraw</button>
            </div>
        </header>

        <select id="assetSelect" onchange="loadChart(this.value)" class="w-full bg-white/5 border border-white/10 rounded-xl p-3 mb-2 text-yellow-500 font-bold text-[11px] outline-none">
            <optgroup label="CRYPTO ASSETS"><option value="BINANCE:BTCUSDT">BTC/USDT</option><option value="BINANCE:ETHUSDT">ETH/USDT</option></optgroup>
            <optgroup label="FOREX"><option value="FX:EURUSD">EUR/USD</option><option value="FX:GBPUSD">GBP/USD</option></optgroup>
        </select>

        <main class="relative flex-grow rounded-[28px] overflow-hidden bg-black mb-2 border border-white/5">
            <div id="tv_chart" class="h-full w-full"></div>
            <div id="tradeTimer" class="timer-badge">⏱ <span id="timerText">00:00</span></div>
        </main>

        <footer class="glass-card p-4 rounded-[30px]">
            <div class="grid grid-cols-2 gap-3 mb-4">
                <div class="bg-black/40 p-2.5 rounded-2xl border border-white/5">
                    <span class="text-[8px] text-gray-500 font-bold uppercase block ml-1 mb-1">Amount ($)</span>
                    <input id="tradeAmt" type="number" value="10" class="bg-transparent outline-none font-black text-white text-lg w-full px-1">
                </div>
                <div class="bg-black/40 p-2.5 rounded-2xl border border-white/5">
                    <span class="text-[8px] text-gray-500 font-bold uppercase block ml-1 mb-1">Expiration</span>
                    <select id="duration" class="bg-transparent font-black text-white text-lg w-full outline-none">
                        <option value="5">5s</option><option value="15">15s</option><option value="30">30s</option><option value="60">1m</option>
                    </select>
                </div>
            </div>
            <div class="grid grid-cols-2 gap-4">
                <button onclick="initTrade('UP')" class="btn-grad-green h-14 rounded-2xl font-black text-white uppercase text-sm shadow-lg shadow-green-900/20">Call</button>
                <button onclick="initTrade('DOWN')" class="btn-grad-red h-14 rounded-2xl font-black text-white uppercase text-sm shadow-lg shadow-red-900/20">Put</button>
            </div>
        </footer>
    </div>

    <div id="depM" class="modal">
        <div class="glass-card p-8 rounded-[35px] w-full max-w-sm text-center">
            
            <div id="dStep1">
                <h2 class="text-xl font-black text-yellow-500 mb-6 uppercase">Fund Account</h2>
                <div class="mb-6">
                    <input type="number" id="depAmtInput" placeholder="Amount in USD" class="auth-input text-center text-xl font-black" oninput="updatePKR(this.value)">
                    <p id="pkrCalc" class="text-[10px] text-green-500 mt-2 font-black italic"></p>
                </div>
                <select id="depMethod" class="auth-input mb-8 text-sm font-bold border-yellow-500/30">
                    <option value="JAZZCASH">JazzCash / Bank (Pakistan)</option>
                    <option value="TRC20">USDT (TRC20) - Global</option>
                </select>
                <button onclick="handleDepNext()" class="w-full py-4 bg-yellow-500 text-black font-black rounded-2xl uppercase">Proceed</button>
            </div>

            <div id="dStepJazz" class="hidden">
                <h2 class="text-sm font-black text-white mb-4 uppercase italic">Scan to Pay</h2>
                <div class="qr-frame mb-4">
                    <img src="https://i.ibb.co/3ykp3fR/1000059487.jpg" class="w-full rounded-lg" alt="JazzCash QR">
                </div>
                <p class="text-[10px] text-gray-400 mb-6">Title: <span class="text-yellow-500 font-bold">Dubai Live Trade</span></p>
                <button onclick="toDStep(3)" class="w-full py-4 bg-blue-600 text-white font-black rounded-2xl uppercase">I have transferred</button>
            </div>

            <div id="dStep3" class="hidden space-y-4">
                <p class="text-[10px] text-gray-500 uppercase font-black tracking-widest">Payment Verification</p>
                <input type="text" id="depTx" placeholder="Transaction ID (TID)" class="auth-input">
                <input type="text" id="depSender" placeholder="Your Account Number" class="auth-input">
                <button onclick="submitFinalDep()" class="w-full py-4 bg-green-600 text-white font-black rounded-2xl uppercase">Submit Proof</button>
            </div>

            <button onclick="hideM('depM')" class="mt-6 text-gray-500 text-[10px] font-bold uppercase tracking-tighter">Cancel Transaction</button>
        </div>
    </div>

    <div id="resultM" class="modal"><div id="resultBox" class="bg-[#0f172a] p-10 rounded-[40px] text-center border border-white/10 w-80"></div></div>

    <script type="text/javascript" src="https://s3.tradingview.com/tv.js"></script>
    <script>
        // Firebase Configuration
        const firebaseConfig = { apiKey: "AIzaSyAySRA1YSpTpmC8WjnKmDhnNMHkEmkeP50", authDomain: "waqas-47f30.firebaseapp.com", projectId: "waqas-47f30", storageBucket: "waqas-47f30.appspot.com", messagingSenderId: "374104279093", appId: "1:374104279093:web:6e1844b60456c700940364" };
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth(), db = firebase.firestore();
        let userData = null, mode = 'reg', chartLoaded = false;
        const PKR_RATE = 285;

        function updatePKR(v) { document.getElementById('pkrCalc').innerText = v ? `PAY RS: ${Math.round(v * PKR_RATE)}` : ""; }

        function handleDepNext() {
            if(!document.getElementById('depAmtInput').value) return showError("Enter amount");
            document.getElementById('dStep1').classList.add('hidden');
            const m = document.getElementById('depMethod').value;
            if(m === 'JAZZCASH') document.getElementById('dStepJazz').classList.remove('hidden');
            else toDStep(3); // Direct to TID for TRC20 (simplification)
        }

        function toDStep(s) {
            document.querySelectorAll("[id^='dStep']").forEach(el => el.classList.add('hidden'));
            document.getElementById('dStep' + s).classList.remove('hidden');
        }

        async function submitFinalDep() {
            const tx = document.getElementById('depTx').value;
            if(!tx) return showError("TID is required");
            await db.collection('requests').add({
                uid: auth.currentUser.uid,
                email: auth.currentUser.email,
                txid: tx,
                amount: document.getElementById('depAmtInput').value,
                method: document.getElementById('depMethod').value,
                sender: document.getElementById('depSender').value,
                time: Date.now(),
                status: 'pending'
            });
            hideM('depM');
            showSuccess("Processing", "Our team is verifying your payment.");
        }

        // Standard App Logic
        auth.onAuthStateChanged(user => {
            if(user) {
                db.collection('users').doc(user.uid).onSnapshot(doc => {
                    userData = doc.data();
                    if(userData) {
                        document.getElementById('balanceDisp').innerText = "$" + (userData.balance || 0).toFixed(2);
                        document.getElementById('userInitial').innerText = user.email[0].toUpperCase();
                        document.getElementById('authSection').style.display = 'none';
                        document.getElementById('appTerminal').style.display = 'flex';
                        if(!chartLoaded) { loadChart('BINANCE:BTCUSDT'); chartLoaded = true; }
                        document.getElementById('loadingScreen').style.display = 'none';
                    }
                });
            } else {
                document.getElementById('authSection').style.display = 'flex';
                document.getElementById('loadingScreen').style.display = 'none';
            }
        });

        async function handleAuth() {
            const e = document.getElementById('userEmail').value, p = document.getElementById('userPass').value;
            if(!e || !p) return showError("Missing fields");
            document.getElementById('loadingScreen').style.display = 'flex';
            try { 
                if(mode==='reg') { 
                    const r = await auth.createUserWithEmailAndPassword(e, p); 
                    await db.collection('users').doc(r.user.uid).set({ email: e, balance: 0, tradeMode: 'normal' }); 
                } else { await auth.signInWithEmailAndPassword(e, p); } 
            } catch(err) { document.getElementById('loadingScreen').style.display = 'none'; showError(err.message); }
        }

        function loadChart(s) { new TradingView.widget({ "autosize": true, "symbol": s, "interval": "1", "theme": "dark", "container_id": "tv_chart", "hide_top_toolbar": true, "hide_side_toolbar": true }); }
        function showM(id) { document.getElementById(id).style.display = 'flex'; }
        function hideM(id) { document.getElementById(id).style.display = 'none'; if(id==='depM') toDStep(1); }

        function showSuccess(t, m) {
            document.getElementById('resultBox').innerHTML = `<h2 class="text-green-500 font-black text-xl mb-2">${t}</h2><p class="text-gray-400 text-[10px] mb-6">${m}</p><button onclick="hideM('resultM')" class="w-full bg-white/5 py-3 rounded-xl font-black text-xs">Dismiss</button>`;
            showM('resultM');
        }
        function showError(m) {
            document.getElementById('resultBox').innerHTML = `<h2 class="text-red-500 font-black text-xl mb-2">Error</h2><p class="text-gray-400 text-[10px] mb-6">${m}</p><button onclick="hideM('resultM')" class="w-full bg-white/5 py-3 rounded-xl font-black text-xs">Close</button>`;
            showM('resultM');
        }

        async function initTrade(type) {
            const amt = parseFloat(document.getElementById('tradeAmt').value);
            if(amt > userData.balance || amt <= 0) return showError("Low balance");
            await db.collection('users').doc(auth.currentUser.uid).update({ balance: firebase.firestore.FieldValue.increment(-amt) });
            let l = parseInt(document.getElementById('duration').value);
            document.getElementById('tradeTimer').style.display = 'block';
            let iv = setInterval(() => {
                document.getElementById('timerText').innerText = `00:${l < 10 ? '0'+l : l}`;
                if(l-- <= 0) { clearInterval(iv); document.getElementById('tradeTimer').style.display = 'none'; finalizeTrade(amt); }
            }, 1000);
        }

        async function finalizeTrade(amt) {
            const m = userData.tradeMode || 'normal';
            let win = m === 'profit' ? true : (m === 'loss' ? false : Math.random() > 0.5);
            const p = amt * 1.82;
            if(win) {
                await db.collection('users').doc(auth.currentUser.uid).update({ balance: firebase.firestore.FieldValue.increment(p) });
                document.getElementById('resultBox').innerHTML = `<h2 class="text-green-500 font-black text-2xl">PROFIT</h2><h1 class="text-4xl text-white font-black">+$${p.toFixed(2)}</h1><button onclick="hideM('resultM')" class="w-full bg-white/10 py-3 rounded-xl mt-6 font-bold text-sm">Continue</button>`;
            } else {
                document.getElementById('resultBox').innerHTML = `<h2 class="text-red-500 font-black text-2xl">LOSS</h2><h1 class="text-4xl text-white font-black">-$${amt.toFixed(2)}</h1><button onclick="hideM('resultM')" class="w-full bg-white/10 py-3 rounded-xl mt-6 font-bold text-sm">Continue</button>`;
            }
            showM('resultM');
        }

        function switchAuth(t) { mode = t; document.getElementById('loginTab').className = t==='login' ? 'flex-1 py-3 text-sm font-bold bg-[#2d3748] rounded-xl' : 'flex-1 py-3 text-sm font-bold'; document.getElementById('regTab').className = t==='reg' ? 'flex-1 py-3 text-sm font-bold bg-[#2d3748] rounded-xl' : 'flex-1 py-3 text-sm font-bold'; document.getElementById('authBtn').innerText = t==='login'?'Login':'Registration'; }
    </script>
</body>
</html>
