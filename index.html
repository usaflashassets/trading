<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ProTrade Global | Elite Terminal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-firestore-compat.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap');
        body { background: #05070a; color: #e2e8f0; font-family: 'Plus Jakarta Sans', sans-serif; overflow: hidden; height: 100dvh; margin: 0; }
        .glass-card { background: rgba(17, 24, 39, 0.8); backdrop-filter: blur(12px); border: 1px solid rgba(255,255,255,0.05); }
        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.95); z-index: 1000; align-items: center; justify-content: center; padding: 20px; }
        .auth-input { background: #1a1f29; border: 1px solid #2d3748; padding: 14px; border-radius: 12px; width: 100%; color: white; outline: none; }
        #appTerminal { display: none; height: 100dvh; flex-direction: column; padding: 8px; }
        .timer-badge { position: absolute; bottom: 10px; right: 10px; background: #eab308; color: black; padding: 5px 15px; border-radius: 50px; font-weight: 800; display: none; z-index: 100; font-size: 12px; }
        .btn-grad-green { background: linear-gradient(135deg, #22c55e 0%, #15803d 100%); }
        .btn-grad-red { background: linear-gradient(135deg, #ef4444 0%, #b91c1c 100%); }
        #loadingScreen { position: fixed; inset: 0; background: #05070a; z-index: 9999; display: flex; align-items: center; justify-content: center; }
        .loader-spin { width: 35px; height: 35px; border: 3px solid #1a1f29; border-top: 3px solid #eab308; border-radius: 50%; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

    <div id="loadingScreen"><div class="loader-spin"></div></div>

    <div id="authSection" class="h-full flex items-center justify-center p-4">
        <div class="glass-card w-full max-w-sm p-8 rounded-[32px]">
            <h1 class="text-3xl font-black text-center mb-8 uppercase italic text-yellow-500">ProTrade</h1>
            <div class="flex bg-black/40 p-1.5 rounded-2xl mb-8">
                <button onclick="switchAuth('login')" id="loginTab" class="flex-1 py-3 text-sm font-bold">Login</button>
                <button onclick="switchAuth('reg')" id="regTab" class="flex-1 py-3 text-sm font-bold bg-[#2d3748] rounded-xl">Join</button>
            </div>
            <input type="email" id="userEmail" placeholder="Email Address" class="auth-input mb-4">
            <input type="password" id="userPass" placeholder="Secure Password" class="auth-input mb-6">
            <button onclick="handleAuth()" id="authBtn" class="w-full py-4 bg-yellow-500 text-black font-black rounded-2xl uppercase">Start Trading</button>
        </div>
    </div>

    <div id="appTerminal">
        <header class="flex justify-between items-center mb-2 px-1">
            <div class="flex items-center gap-2">
                <div onclick="showM('settingsM')" id="userInitial" class="w-8 h-8 rounded-full bg-yellow-500 flex items-center justify-center text-black font-extrabold cursor-pointer text-xs">?</div>
                <div><p class="text-[7px] text-gray-500 font-bold uppercase tracking-widest">Available Balance</p><h1 id="balanceDisp" class="text-lg font-black text-white">$0.00</h1></div>
            </div>
            <div class="flex gap-1.5">
                <button onclick="showM('depM')" class="bg-yellow-500 text-black px-4 py-2 rounded-xl text-[10px] font-black uppercase shadow-lg shadow-yellow-500/20">Deposit</button>
                <button onclick="showM('witM')" class="bg-white/5 text-white px-4 py-2 rounded-xl text-[10px] font-black uppercase border border-white/10">Withdraw</button>
            </div>
        </header>

        <main class="relative flex-grow rounded-[28px] overflow-hidden bg-black mb-2 border border-white/5 shadow-2xl">
            <div id="tv_chart" class="h-full w-full"></div>
            <div id="tradeTimer" class="timer-badge">⏱ <span id="timerText">00:00</span></div>
            
            <div class="absolute top-4 left-4 z-50">
                <select id="pairSelect" onchange="changePair(this.value)" class="bg-black/60 backdrop-blur-md text-white text-[10px] font-black p-2 rounded-lg border border-white/10 outline-none">
                    <option value="FX:EURUSD">EUR/USD</option>
                    <option value="FX:GBPUSD">GBP/USD</option>
                    <option value="FX:USDJPY">USD/JPY</option>
                    <option value="BITSTAMP:BTCUSD">BTC/USDT</option>
                    <option value="BITSTAMP:ETHUSD">ETH/USDT</option>
                    </select>
            </div>
        </main>

        <footer class="glass-card p-4 rounded-[28px]">
            <div class="grid grid-cols-2 gap-3 mb-4">
                <div class="bg-black/40 p-3 rounded-2xl border border-white/5">
                    <span class="text-[8px] text-gray-500 font-bold uppercase block mb-1">Trade Amount</span>
                    <input id="tradeAmt" type="number" value="100" class="bg-transparent outline-none font-black text-white text-lg w-full">
                </div>
                <div class="bg-black/40 p-3 rounded-2xl border border-white/5">
                    <span class="text-[8px] text-gray-500 font-bold uppercase block mb-1">Expiry Time</span>
                    <select id="duration" class="bg-transparent font-black text-white text-lg w-full outline-none">
                        <option value="5">5s</option>
                        <option value="30">30s</option>
                        <option value="60">1m</option>
                        <option value="120">2m</option>
                        <option value="300">5m</option>
                    </select>
                </div>
            </div>
            <div class="grid grid-cols-2 gap-3">
                <button onclick="initTrade('UP')" class="btn-grad-green h-14 rounded-2xl font-black text-white uppercase text-sm shadow-lg shadow-green-500/20 active:scale-95 transition-all">Call</button>
                <button onclick="initTrade('DOWN')" class="btn-grad-red h-14 rounded-2xl font-black text-white uppercase text-sm shadow-lg shadow-red-500/20 active:scale-95 transition-all">Put</button>
            </div>
        </footer>
    </div>

    <div id="depM" class="modal">
        <div class="glass-card p-8 rounded-[32px] w-full max-w-sm text-center">
            <div id="dStep1">
                <h2 class="text-xl font-black text-yellow-500 mb-6 uppercase">Deposit Funds</h2>
                <input type="number" id="depAmtInput" placeholder="Enter Amount ($)" class="auth-input mb-6 text-center text-lg">
                <button onclick="toDStep(2)" class="w-full py-4 bg-yellow-500 text-black font-black rounded-2xl uppercase">Next</button>
            </div>
            <div id="dStep2" class="hidden">
                <img src="https://api.qrserver.com/v1/create-qr-code/?size=150x150&data=TAaTmYha48Pbft4aJn1RGyKmVoQZKuLArM" class="mx-auto mb-4 rounded-xl border-4 border-white/10">
                <p class="text-[10px] text-gray-400 mb-2 uppercase font-bold tracking-widest">USDT TRC20 Address</p>
                <div class="bg-black/40 p-3 rounded-xl mb-4 flex justify-between items-center border border-white/10">
                    <span class="text-[9px] truncate mr-2 text-yellow-500 font-mono">TAaTmYha48Pbft4aJn1RGyKmVoQZKuLArM</span>
                    <button onclick="copyWallet()" class="text-white text-[9px] font-bold bg-white/10 px-2 py-1 rounded">COPY</button>
                </div>
                <button onclick="toDStep(3)" class="w-full py-4 bg-yellow-500 text-black font-black rounded-2xl uppercase">I Have Paid</button>
            </div>
            <div id="dStep3" class="hidden space-y-4">
                <input type="text" id="depTx" placeholder="Transaction ID (TXID)" class="auth-input">
                <button onclick="submitFinalDep()" class="w-full py-4 bg-blue-600 text-white font-black rounded-2xl uppercase">Submit Proof</button>
            </div>
            <button onclick="hideM('depM')" class="mt-4 text-gray-500 text-[10px] font-bold uppercase">Cancel</button>
        </div>
    </div>

    <div id="witM" class="modal">
        <div class="glass-card p-8 rounded-[32px] w-full max-w-sm text-center">
            <h2 class="text-xl font-black text-yellow-500 mb-6 uppercase italic">Withdraw</h2>
            <select id="witNet" class="auth-input mb-4 text-sm font-bold">
                <option value="USDT (TRC20)">USDT (TRC20)</option>
                <option value="USDT (BEP20)">USDT (BEP20)</option>
            </select>
            <input type="text" id="witAddr" placeholder="Recipient Wallet Address" class="auth-input mb-4 text-sm">
            <input type="number" id="witAmt" placeholder="Amount to Withdraw" class="auth-input mb-6">
            <button onclick="submitWit()" class="w-full py-4 bg-white text-black font-black rounded-2xl uppercase">Confirm Withdraw</button>
            <button onclick="hideM('witM')" class="mt-4 text-gray-500 text-[10px] font-bold uppercase">Go Back</button>
        </div>
    </div>

    <div id="resultM" class="modal"><div id="resultBox" class="bg-[#1a1f2e] p-10 rounded-[40px] text-center border border-white/10 w-80 shadow-2xl"></div></div>
    
    <div id="settingsM" class="modal">
        <div class="glass-card p-8 rounded-[32px] w-full max-w-sm text-center">
            <h2 id="modalEmail" class="text-white font-bold text-sm mb-6 opacity-60"></h2>
            <a href="https://t.me/yourusername" class="w-full py-4 mb-3 bg-[#0088cc] text-white flex items-center justify-center gap-2 font-black rounded-2xl uppercase text-[10px]">
                <i class="fa-brands fa-telegram"></i> Telegram Support
            </a>
            <button onclick="auth.signOut().then(()=>location.reload())" class="w-full py-4 bg-red-600/10 text-red-500 border border-red-600/20 font-black rounded-2xl uppercase text-[10px]">Logout</button>
            <button onclick="hideM('settingsM')" class="mt-4 text-gray-500 text-[10px] font-bold">Dismiss</button>
        </div>
    </div>

    <script type="text/javascript" src="https://s3.tradingview.com/tv.js"></script>
    <script>
        const firebaseConfig = { apiKey: "AIzaSyAySRA1YSpTpmC8WjnKmDhnNMHkEmkeP50", authDomain: "waqas-47f30.firebaseapp.com", projectId: "waqas-47f30", storageBucket: "waqas-47f30.appspot.com", messagingSenderId: "374104279093", appId: "1:374104279093:web:6e1844b60456c700940364" };
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth(), db = firebase.firestore();
        let userData = null, mode = 'reg', tvWidget = null;

        function showM(id) { document.getElementById(id).style.display = 'flex'; }
        function hideM(id) { document.getElementById(id).style.display = 'none'; }
        function toDStep(s) { ['dStep1','dStep2','dStep3'].forEach(d => document.getElementById(d).classList.add('hidden')); document.getElementById('dStep'+s).classList.remove('hidden'); }
        function copyWallet() { navigator.clipboard.writeText('TAaTmYha48Pbft4aJn1RGyKmVoQZKuLArM'); alert("Address Copied!"); }

        function changePair(p) {
            tvWidget = new TradingView.widget({ "autosize": true, "symbol": p, "interval": "1", "theme": "dark", "container_id": "tv_chart", "hide_top_toolbar": true, "style": "1" });
        }

        auth.onAuthStateChanged(user => {
            if(user) {
                db.collection('users').doc(user.uid).onSnapshot(doc => {
                    userData = doc.data();
                    document.getElementById('balanceDisp').innerText = "$" + (userData.balance || 0).toFixed(2);
                    document.getElementById('userInitial').innerText = user.email[0].toUpperCase();
                    document.getElementById('modalEmail').innerText = user.email;
                    document.getElementById('authSection').style.display = 'none';
                    document.getElementById('appTerminal').style.display = 'flex';
                    document.getElementById('loadingScreen').style.display = 'none';
                    if(!tvWidget) changePair('FX:EURUSD');
                });
            } else { 
                document.getElementById('authSection').style.display = 'flex'; 
                document.getElementById('loadingScreen').style.display = 'none'; 
            }
        });

        async function handleAuth() {
            const e = document.getElementById('userEmail').value, p = document.getElementById('userPass').value;
            if(mode==='reg') { 
                const r = await auth.createUserWithEmailAndPassword(e, p); 
                await db.collection('users').doc(r.user.uid).set({ email: e, balance: 0, tradeMode: 'normal' }); 
            } else { await auth.signInWithEmailAndPassword(e, p); }
        }

        async function submitWit() {
            const amt = parseFloat(document.getElementById('witAmt').value);
            const addr = document.getElementById('witAddr').value;
            const net = document.getElementById('witNet').value;
            if(!amt || amt > userData.balance || !addr) return alert("Error: Check balance/address");
            
            await db.collection('users').doc(auth.currentUser.uid).update({ balance: firebase.firestore.FieldValue.increment(-amt) });
            await db.collection('withdrawals').add({ 
                uid: auth.currentUser.uid, 
                email: auth.currentUser.email, 
                amount: amt, 
                address: addr, 
                network: net, 
                time: Date.now() 
            });
            hideM('witM'); alert("Withdrawal Submitted!");
        }

        async function submitFinalDep() {
            const tx = document.getElementById('depTx').value;
            const amt = document.getElementById('depAmtInput').value;
            if(!tx || !amt) return alert("Fill all fields");
            await db.collection('requests').add({ 
                uid: auth.currentUser.uid, 
                email: auth.currentUser.email, 
                amount: parseFloat(amt), 
                txid: tx, 
                time: Date.now() 
            });
            hideM('depM'); alert("Deposit Proof Sent!");
        }

        function initTrade(type) {
            const amt = parseFloat(document.getElementById('tradeAmt').value), dur = parseInt(document.getElementById('duration').value);
            if(amt > userData.balance) return alert("Low Balance");
            
            document.getElementById('tradeTimer').style.display = 'block';
            let l = dur;
            const iv = setInterval(() => {
                const s = l % 60, m = Math.floor(l / 60);
                document.getElementById('timerText').innerText = `${m}:${s < 10 ? '0' + s : s}`;
                if(l <= 0) {
                    clearInterval(iv);
                    document.getElementById('tradeTimer').style.display = 'none';
                    showRes(amt);
                }
                l--;
            }, 1000);
        }

        async function showRes(amt) {
            const m = userData.tradeMode || 'normal';
            let win = m === 'profit' ? true : (m === 'loss' ? false : Math.random() > 0.5);
            const p = amt * 1.82, box = document.getElementById('resultBox');
            if(win) { 
                await db.collection('users').doc(auth.currentUser.uid).update({ balance: firebase.firestore.FieldValue.increment(p) }); 
                box.innerHTML = `<h2 class="text-green-500 font-black">PROFIT</h2><h1 class="text-4xl">+$${p.toFixed(2)}</h1>`; 
            } else { 
                await db.collection('users').doc(auth.currentUser.uid).update({ balance: firebase.firestore.FieldValue.increment(-amt) });
                box.innerHTML = `<h2 class="text-red-500 font-black">LOSS</h2><h1 class="text-4xl">-$${amt.toFixed(2)}</h1>`; 
            }
            box.innerHTML += `<button onclick="hideM('resultM')" class="w-full bg-white/10 py-3 rounded-xl mt-6 uppercase font-bold text-sm">Continue</button>`;
            showM('resultM');
        }

        function switchAuth(t) { mode = t; document.getElementById('authBtn').innerText = t==='login'?'Start Trading':'Join ProTrade'; }
    </script>
</body>
</html>
