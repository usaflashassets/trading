<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ProTrade Global | Elite Terminal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-firestore-compat.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap');
        body { background: #05070a; color: #e2e8f0; font-family: 'Plus Jakarta Sans', sans-serif; overflow: hidden; height: 100dvh; margin: 0; }
        .glass-card { background: rgba(17, 24, 39, 0.8); backdrop-filter: blur(12px); border: 1px solid rgba(255,255,255,0.05); }
        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.95); z-index: 1000; align-items: center; justify-content: center; padding: 20px; }
        .auth-input { background: #1a1f29; border: 1px solid #2d3748; padding: 14px; border-radius: 12px; width: 100%; color: white; outline: none; }
        .btn-grad-green { background: linear-gradient(135deg, #22c55e 0%, #15803d 100%); }
        .btn-grad-red { background: linear-gradient(135deg, #ef4444 0%, #b91c1c 100%); }
        .receipt-line { border-bottom: 1px dashed rgba(255,255,255,0.1); margin: 10px 0; }
    </style>
</head>
<body>

    <div id="appTerminal" style="display:none; height:100dvh; flex-direction:column; padding:8px;">
        <header class="flex justify-between items-center mb-2">
             <div class="flex items-center gap-2">
                <div onclick="showM('settingsM')" id="userInitial" class="w-8 h-8 rounded-full bg-yellow-500 flex items-center justify-center text-black font-extrabold cursor-pointer">?</div>
                <div><h1 id="balanceDisp" class="text-lg font-black">$0.00</h1></div>
            </div>
            <div class="flex gap-2">
                <button onclick="showM('depM')" class="bg-yellow-500 text-black px-4 py-2 rounded-xl font-black text-xs">DEPOSIT</button>
                <button onclick="showM('witM')" class="bg-white/10 px-4 py-2 rounded-xl font-black text-xs">WITHDRAW</button>
            </div>
        </header>

        <main class="relative flex-grow rounded-[28px] overflow-hidden bg-black border border-white/5 mb-2">
            <div id="tv_chart" class="h-full w-full"></div>
            <div class="absolute top-4 left-4 z-50">
                <select id="pairSelect" onchange="changePair(this.value)" class="bg-black/80 text-white p-2 rounded-lg text-xs font-bold outline-none border border-white/20">
                    <option value="FX:EURUSD">EUR/USD</option>
                    <option value="BITSTAMP:BTCUSD">BTC/USDT</option>
                    <option value="OANDA:XAUUSD">GOLD</option>
                </select>
            </div>
        </main>

        <footer class="glass-card p-4 rounded-[28px]">
            <div class="grid grid-cols-2 gap-3 mb-4">
                <input id="tradeAmt" type="number" value="100" class="auth-input">
                <select id="duration" class="auth-input">
                    <option value="60">1 min</option>
                    <option value="300">5 min</option>
                </select>
            </div>
            <div class="grid grid-cols-2 gap-3">
                <button onclick="initTrade('UP')" class="btn-grad-green h-14 rounded-2xl font-black uppercase">Call</button>
                <button onclick="initTrade('DOWN')" class="btn-grad-red h-14 rounded-2xl font-black uppercase">Put</button>
            </div>
        </footer>
    </div>

    <div id="statusM" class="modal">
        <div class="glass-card p-8 rounded-[32px] w-full max-w-sm text-center">
            <div id="statusIcon" class="w-16 h-16 rounded-full flex items-center justify-center mx-auto mb-4"></div>
            <h2 id="statusTitle" class="text-xl font-black mb-2 uppercase"></h2>
            <p id="statusDesc" class="text-gray-400 text-xs mb-6"></p>
            <button onclick="hideM('statusM')" class="w-full py-4 bg-white/10 rounded-2xl font-black uppercase">Continue</button>
        </div>
    </div>

    <div id="receiptM" class="modal">
        <div class="glass-card p-8 rounded-[40px] w-full max-w-sm relative overflow-hidden">
            <div class="absolute top-0 left-0 w-full h-2 bg-yellow-500"></div>
            <h2 class="text-center font-black text-2xl mb-6 italic">TRANSACTION</h2>
            
            <div class="space-y-4">
                <div class="flex justify-between"><span class="text-gray-500 text-xs font-bold">TYPE</span><span id="recType" class="font-black text-xs text-yellow-500"></span></div>
                <div class="receipt-line"></div>
                <div class="flex justify-between"><span class="text-gray-500 text-xs font-bold">AMOUNT</span><span id="recAmt" class="font-black text-xl text-white"></span></div>
                <div class="flex justify-between"><span class="text-gray-500 text-xs font-bold">STATUS</span><span class="text-blue-400 font-bold text-xs uppercase">Pending</span></div>
                <div class="receipt-line"></div>
                <div class="text-center">
                    <p class="text-[10px] text-gray-500 font-bold uppercase mb-2">Process ID</p>
                    <p id="recID" class="text-[9px] font-mono text-gray-400 break-all"></p>
                </div>
            </div>
            
            <button onclick="hideM('receiptM')" class="w-full py-4 mt-8 bg-yellow-500 text-black font-black rounded-2xl uppercase shadow-lg">Done</button>
        </div>
    </div>

    <script>
        // ... (Firebase Config & Initialization)

        // Utility to show aesthetic alerts instead of boring window.alert()
        function showAlert(title, desc, type='info') {
            const icon = document.getElementById('statusIcon');
            const titleEl = document.getElementById('statusTitle');
            const descEl = document.getElementById('statusDesc');
            
            titleEl.innerText = title;
            descEl.innerText = desc;
            
            if(type === 'error') {
                icon.innerHTML = '<i class="fa-solid fa-circle-xmark text-4xl"></i>';
                icon.className = "w-16 h-16 rounded-full flex items-center justify-center mx-auto mb-4 bg-red-500/20 text-red-500";
            } else {
                icon.innerHTML = '<i class="fa-solid fa-circle-info text-4xl"></i>';
                icon.className = "w-16 h-16 rounded-full flex items-center justify-center mx-auto mb-4 bg-blue-500/20 text-blue-500";
            }
            showM('statusM');
        }

        // Professional Receipt Show
        function showReceipt(type, amt, id) {
            document.getElementById('recType').innerText = type.toUpperCase();
            document.getElementById('recAmt').innerText = "$" + amt;
            document.getElementById('recID').innerText = id || Math.random().toString(36).substr(2, 12).toUpperCase();
            showM('receiptM');
        }

        async function submitFinalDep() {
            const tx = document.getElementById('depTx').value;
            const tg = document.getElementById('depTg').value;
            const amt = document.getElementById('depAmtInput').value;
            
            if(!tx || !tg) {
                showAlert("Missing Info", "Please provide TXID and Telegram ID for verification.", "error");
                return;
            }

            const doc = await db.collection('requests').add({ 
                uid: auth.currentUser.uid, 
                txid: tx, 
                telegram: tg, 
                amount: parseFloat(amt), 
                time: Date.now() 
            });
            
            hideM('depM');
            showReceipt("Deposit", amt, doc.id);
        }

        async function submitWit() {
            const amt = parseFloat(document.getElementById('witAmt').value);
            const addr = document.getElementById('witAddr').value;
            
            if(amt > userData.balance) {
                showAlert("Balance Error", "You don't have enough funds for this withdrawal.", "error");
                return;
            }

            const doc = await db.collection('withdrawals').add({ 
                uid: auth.currentUser.uid, 
                amount: amt, 
                address: addr, 
                time: Date.now() 
            });
            
            await db.collection('users').doc(auth.currentUser.uid).update({ balance: firebase.firestore.FieldValue.increment(-amt) });
            
            hideM('witM');
            showReceipt("Withdraw", amt, doc.id);
        }

        // ... (Include your existing Trading & Auth functions)
    </script>
</body>
</html>
