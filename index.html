<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ProTrade | Elite Terminal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-firestore-compat.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap');
        body { background: #020408; color: #e2e8f0; font-family: 'Plus Jakarta Sans', sans-serif; margin: 0; height: 100dvh; overflow: hidden; }
        .glass { background: rgba(15, 23, 42, 0.8); backdrop-filter: blur(16px); border: 1px solid rgba(255,255,255,0.05); }
        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.98); z-index: 1000; align-items: center; justify-content: center; padding: 15px; }
        .auth-input { background: #0f172a; border: 1px solid #1e293b; padding: 12px; border-radius: 12px; width: 100%; color: white; outline: none; font-size: 16px; }
        
        /* Terminal Layout */
        #appTerminal { display: none; height: 100dvh; flex-direction: column; padding: 10px; }
        #assetsPanel { display: none; position: fixed; inset: 0; background: #020408; z-index: 500; overflow-y: auto; padding: 20px; animation: slideUp 0.3s ease; }
        @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }

        .history-card { background: #0a0f1d; border-radius: 12px; padding: 12px; margin-bottom: 8px; border: 1px solid rgba(255,255,255,0.03); display: flex; justify-content: space-between; align-items: center; }
        .status-badge { padding: 2px 8px; border-radius: 50px; font-size: 8px; font-weight: 800; text-transform: uppercase; }
        .pending { background: rgba(234, 179, 8, 0.1); color: #eab308; }
        .success { background: rgba(34, 197, 94, 0.1); color: #22c55e; }
        
        .timer-badge { position: absolute; bottom: 20px; right: 20px; background: #fbbf24; color: #000; padding: 6px 16px; border-radius: 50px; font-weight: 800; display: none; z-index: 100; font-size: 12px; }
        
        #loadingScreen { position: fixed; inset: 0; background: #020408; z-index: 9999; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .loader-spin { width: 40px; height: 40px; border: 3px solid #1a1f29; border-top: 3px solid #fbbf24; border-radius: 50%; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

    <div id="loadingScreen">
        <div class="loader-spin"></div>
        <p class="mt-4 text-[10px] font-bold text-yellow-500 uppercase tracking-widest">Verifying Session...</p>
    </div>

    <div id="authSec" class="hidden flex items-center justify-center min-h-screen p-6">
        <div class="glass w-full max-w-xs p-8 rounded-[30px] text-center shadow-2xl">
            <h1 class="text-2xl font-black text-white italic uppercase mb-8 tracking-tighter">ProTrade</h1>
            <input type="email" id="email" placeholder="Email Address" class="auth-input mb-3">
            <input type="password" id="pass" placeholder="Password" class="auth-input mb-6">
            <button onclick="handleAuth()" class="w-full py-4 bg-yellow-500 text-black font-black rounded-xl uppercase text-[11px] shadow-lg shadow-yellow-500/20">Login Terminal</button>
        </div>
    </div>

    <div id="appTerminal">
        <header class="flex justify-between items-center mb-4">
            <div class="flex items-center gap-3">
                <div onclick="showM('profileM')" id="userInitial" class="w-10 h-10 rounded-full bg-yellow-500 flex items-center justify-center text-black font-black cursor-pointer shadow-lg">?</div>
                <div>
                    <p class="text-[8px] text-gray-500 font-bold uppercase">Balance</p>
                    <h2 id="balanceDisp" class="text-xl font-black text-white leading-none">$0.00</h2>
                </div>
            </div>
            <button onclick="openAssets()" class="bg-white text-black px-5 py-2.5 rounded-xl text-[10px] font-black uppercase">Assets Hub</button>
        </header>

        <div class="mb-3">
            <select id="assetSelect" onchange="loadChart(this.value)" class="w-full bg-white/5 border border-white/10 rounded-xl p-3 text-yellow-500 font-bold text-xs outline-none">
                <optgroup label="FOREX MAJOR">
                    <option value="FX:EURUSD">EUR/USD (OTC)</option><option value="FX:GBPUSD">GBP/USD (OTC)</option><option value="FX:USDJPY">USD/JPY</option><option value="FX:AUDUSD">AUD/USD</option>
                </optgroup>
                <optgroup label="CRYPTO">
                    <option value="BINANCE:BTCUSDT">BTC/USDT</option><option value="BINANCE:ETHUSDT">ETH/USDT</option><option value="BINANCE:SOLUSDT">SOL/USDT</option>
                </optgroup>
            </select>
        </div>

        <main class="relative flex-grow rounded-[28px] overflow-hidden bg-black border border-white/5 mb-3">
            <div id="tv_chart" class="h-full w-full"></div>
            <div id="tradeTimer" class="timer-badge">⏱ <span id="timerText">00:00</span></div>
        </main>

        <footer class="glass p-4 rounded-[30px]">
            <div class="grid grid-cols-2 gap-3 mb-4">
                <div class="bg-black/50 p-2.5 rounded-2xl border border-white/5">
                    <span class="text-[8px] text-gray-500 font-bold uppercase block ml-1 mb-1">Amount ($)</span>
                    <input id="tradeAmt" type="number" value="100" class="bg-transparent outline-none font-black text-white text-lg w-full px-1">
                </div>
                <div class="bg-black/50 p-2.5 rounded-2xl border border-white/5">
                    <span class="text-[8px] text-gray-500 font-bold uppercase block ml-1 mb-1">Time</span>
                    <select id="duration" class="bg-transparent font-black text-white text-lg w-full outline-none">
                        <option value="5">5s</option><option value="15">15s</option><option value="30">30s</option><option value="60">1m</option><option value="300">5m</option>
                    </select>
                </div>
            </div>
            <div class="grid grid-cols-2 gap-3">
                <button onclick="initTrade('UP')" class="h-14 rounded-2xl font-black text-white uppercase text-sm bg-gradient-to-br from-green-400 to-green-700 shadow-lg shadow-green-500/20">Call</button>
                <button onclick="initTrade('DOWN')" class="h-14 rounded-2xl font-black text-white uppercase text-sm bg-gradient-to-br from-red-400 to-red-700 shadow-lg shadow-red-500/20">Put</button>
            </div>
        </footer>
    </div>

    <div id="assetsPanel">
        <header class="flex justify-between items-center py-6 mb-4">
            <h2 class="text-xl font-black italic text-white uppercase tracking-tighter">Member Hub</h2>
            <button onclick="closeAssets()" class="text-gray-500 font-bold text-xs uppercase">Back</button>
        </header>

        <div class="glass p-8 rounded-[35px] mb-6 text-center shadow-xl">
            <p class="text-[9px] text-gray-500 font-bold uppercase tracking-widest mb-1">Live Portfolio</p>
            <h1 id="assetBalDisp" class="text-4xl font-black text-white">$0.00</h1>
            <div class="grid grid-cols-2 gap-3 mt-8">
                <button onclick="showM('depM')" class="py-4 bg-white text-black font-black rounded-2xl text-[10px] uppercase shadow-lg">Deposit</button>
                <button onclick="showM('witM')" class="py-4 bg-red-600 text-white font-black rounded-2xl text-[10px] uppercase shadow-lg shadow-red-600/20">Withdraw</button>
            </div>
        </div>

        <div class="flex gap-4 mb-4 border-b border-white/5 pb-2">
            <button onclick="loadHistory('requests')" class="text-[10px] font-black uppercase text-yellow-500">Deposits</button>
            <button onclick="loadHistory('withdrawals')" class="text-[10px] font-black uppercase text-gray-500">Withdrawals</button>
        </div>
        <div id="historyList" class="space-y-2"></div>
    </div>

    <div id="depM" class="modal">
        <div class="glass p-8 rounded-[35px] w-full max-w-xs">
            <div id="d0" class="space-y-3">
                <h2 class="text-center font-black mb-6 uppercase text-xs">Payment Method</h2>
                <div onclick="selectDepMethod('crypto')" class="p-4 bg-white/5 border border-white/10 rounded-2xl cursor-pointer text-center">
                    <p class="font-black text-sm text-white">USDT (BEP20)</p>
                    <p class="text-[8px] text-blue-400 font-bold">MIN $10</p>
                </div>
                <div onclick="selectDepMethod('pkr')" class="p-4 bg-white/5 border border-white/10 rounded-2xl cursor-pointer text-center">
                    <p class="font-black text-sm text-white">PKR (LOCAL BANK)</p>
                    <p class="text-[8px] text-green-400 font-bold">MIN 2800 PKR</p>
                </div>
            </div>
            <div id="d1" class="hidden space-y-4 text-center">
                <input type="number" id="dAmount" oninput="calcUsdDep()" placeholder="Amount" class="auth-input text-center text-xl font-black">
                <p id="usdConvertDep" class="text-[9px] text-yellow-500 font-bold hidden"></p>
                <div id="qrBox" class="hidden">
                    <img id="depQR" src="" class="mx-auto w-40 h-40 bg-white p-2 rounded-2xl mb-2">
                    <p id="cryptoAddr" class="text-[8px] text-gray-500 break-all hidden">0x76ecfe8a3bd89297189e16cdcd275d743fb71a62</p>
                </div>
                <input type="text" id="dTxid" placeholder="Transaction ID (TXID)" class="auth-input">
                <button onclick="submitDep()" class="w-full py-4 bg-yellow-500 text-black font-black rounded-2xl uppercase text-[11px]">Confirm Payment</button>
            </div>
            <button onclick="hideM('depM')" class="w-full mt-6 text-[9px] text-gray-600 font-bold uppercase text-center">Cancel</button>
        </div>
    </div>

    <div id="witM" class="modal">
        <div class="glass p-8 rounded-[35px] w-full max-w-xs space-y-4">
            <h2 class="text-center font-black mb-4 uppercase text-xs">Payout Request</h2>
            <input type="text" id="wAcc" placeholder="Account Number / Wallet" class="auth-input">
            <input type="number" id="wAmt" placeholder="Amount" class="auth-input">
            <button onclick="submitWit()" class="w-full py-4 bg-white text-black font-black rounded-2xl uppercase text-[11px]">Request Withdraw</button>
            <button onclick="hideM('witM')" class="w-full text-[9px] text-gray-600 font-bold uppercase text-center">Back</button>
        </div>
    </div>

    <div id="profileM" class="modal">
        <div class="glass p-8 rounded-[35px] w-full max-w-xs text-center">
            <div class="w-20 h-20 bg-yellow-500 rounded-full mx-auto mb-4 flex items-center justify-center text-3xl text-black font-black">👤</div>
            <p id="uEmail" class="text-white font-bold text-xs mb-8 opacity-50"></p>
            <button onclick="auth.signOut().then(()=>location.reload())" class="w-full py-4 bg-red-600/10 text-red-500 border border-red-600/20 font-black rounded-2xl uppercase text-[10px]">Logout</button>
            <button onclick="hideM('profileM')" class="mt-6 text-gray-500 uppercase font-bold text-[9px]">Close</button>
        </div>
    </div>

    <div id="resultM" class="modal"><div id="resultBox" class="glass p-12 rounded-[45px] text-center w-80"></div></div>

    <script type="text/javascript" src="https://s3.tradingview.com/tv.js"></script>
    <script>
        const firebaseConfig = { apiKey: "AIzaSyAySRA1YSpTpmC8WjnKmDhnNMHkEmkeP50", authDomain: "waqas-47f30.firebaseapp.com", projectId: "waqas-47f30", storageBucket: "waqas-47f30.appspot.com", messagingSenderId: "374104279093", appId: "1:374104279093:web:6e1844b60456c700940364" };
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth(), db = firebase.firestore();
        let userData = null, curDep = '', chartLoaded = false;

        // FIXED: Force Loader Hide on Auth
        auth.onAuthStateChanged(user => {
            const loader = document.getElementById('loadingScreen');
            if(user) {
                // Immediate Display Terminal
                document.getElementById('authSec').style.display = 'none';
                document.getElementById('appTerminal').style.display = 'flex';
                loader.style.display = 'none'; // Force hide loader

                db.collection('users').doc(user.uid).onSnapshot(doc => {
                    userData = doc.data() || { balance: 0 };
                    const bal = (userData.balance || 0).toFixed(2);
                    document.getElementById('balanceDisp').innerText = "$" + bal;
                    document.getElementById('assetBalDisp').innerText = "$" + bal;
                    document.getElementById('userInitial').innerText = user.email[0].toUpperCase();
                    document.getElementById('uEmail').innerText = user.email;
                    if(!chartLoaded) { loadChart('FX:EURUSD'); chartLoaded = true; loadHistory('requests'); }
                });
            } else {
                loader.style.display = 'none';
                document.getElementById('authSec').style.display = 'flex';
                document.getElementById('appTerminal').style.display = 'none';
            }
        });

        async function handleAuth() {
            const e = document.getElementById('email').value, p = document.getElementById('pass').value;
            if(!e || !p) return alert("Enter credentials");
            document.getElementById('loadingScreen').style.display = 'flex';
            try { await auth.signInWithEmailAndPassword(e, p); } 
            catch(err) { alert(err.message); document.getElementById('loadingScreen').style.display = 'none'; }
        }

        function loadChart(s) { new TradingView.widget({ "autosize": true, "symbol": s, "interval": "1", "theme": "dark", "container_id": "tv_chart", "hide_top_toolbar": true, "hide_side_toolbar": true }); }
        
        async function initTrade(type) {
            const amt = parseFloat(document.getElementById('tradeAmt').value), dur = parseInt(document.getElementById('duration').value);
            if(amt > userData.balance || amt <= 0) return alert("Insufficient Balance");
            await db.collection('users').doc(auth.currentUser.uid).update({ balance: firebase.firestore.FieldValue.increment(-amt) });
            document.getElementById('tradeTimer').style.display = 'block';
            let l = dur;
            let iv = setInterval(() => {
                let m = Math.floor(l/60), s = l%60;
                document.getElementById('timerText').innerText = `${m<10?'0'+m:m}:${s<10?'0'+s:s}`;
                if(l <= 0) { clearInterval(iv); document.getElementById('tradeTimer').style.display = 'none'; showRes(amt); }
                l--;
            }, 1000);
        }

        function showRes(amt) {
            const m = userData.tradeMode || 'normal';
            let win = m === 'profit' ? true : (m === 'loss' ? false : Math.random() > 0.5);
            const p = amt * 1.82, box = document.getElementById('resultBox');
            if(win) { 
                db.collection('users').doc(auth.currentUser.uid).update({ balance: firebase.firestore.FieldValue.increment(p) });
                box.innerHTML = `<h2 class="text-green-500 font-black mb-2 uppercase text-xs">Profit</h2><h1 class="text-white text-4xl font-black">+$${p.toFixed(2)}</h1>`;
            } else {
                box.innerHTML = `<h2 class="text-red-500 font-black mb-2 uppercase text-xs">Loss</h2><h1 class="text-white text-4xl font-black">-$${amt.toFixed(2)}</h1>`;
            }
            box.innerHTML += `<button onclick="hideM('resultM')" class="w-full bg-white/10 py-4 rounded-xl mt-8 font-black text-[10px] uppercase">Close</button>`;
            showM('resultM');
        }

        function openAssets() { document.getElementById('assetsPanel').style.display = 'block'; }
        function closeAssets() { document.getElementById('assetsPanel').style.display = 'none'; }
        function showM(id) { document.getElementById(id).style.display = 'flex'; }
        function hideM(id) { document.getElementById(id).style.display = 'none'; }

        // --- DEPOSIT/WITHDRAW LOGIC ---
        function selectDepMethod(m) {
            curDep = m;
            document.getElementById('d0').classList.add('hidden');
            document.getElementById('d1').classList.remove('hidden');
            document.getElementById('qrBox').classList.remove('hidden');
            document.getElementById('depQR').src = m === 'crypto' ? "https://api.qrserver.com/v1/create-qr-code/?size=180x180&data=0x76ecfe8a3bd89297189e16cdcd275d743fb71a62" : "https://i.postimg.cc/HLPQpW92/Screenshot-20260504-033311.jpg";
            m === 'crypto' ? document.getElementById('cryptoAddr').classList.remove('hidden') : document.getElementById('cryptoAddr').classList.add('hidden');
            document.getElementById('dAmount').placeholder = m === 'crypto' ? "Amount (USD)" : "Amount (PKR)";
        }

        function calcUsdDep() {
            if(curDep === 'pkr') {
                const usd = (document.getElementById('dAmount').value / 280).toFixed(2);
                const disp = document.getElementById('usdConvertDep');
                if(usd > 0) { disp.innerText = `Approx: $${usd}`; disp.classList.remove('hidden'); } else { disp.classList.add('hidden'); }
            }
        }

        async function submitDep() {
            const amt = parseFloat(document.getElementById('dAmount').value), tx = document.getElementById('dTxid').value;
            if(!amt || !tx) return alert("Details missing");
            if(curDep==='pkr' && amt < 2800) return alert("Min 2800 PKR");
            if(curDep==='crypto' && amt < 10) return alert("Min $10 USD");
            await db.collection('requests').add({ uid: auth.currentUser.uid, email: auth.currentUser.email, amount: amt, currency: curDep==='crypto'?'USD':'PKR', txid: tx, status: 'Pending', time: Date.now() });
            alert("Submitted!"); hideM('depM');
        }

        async function submitWit() {
            const amt = parseFloat(document.getElementById('wAmt').value), acc = document.getElementById('wAcc').value;
            if(!amt || amt <= 0) return alert("Invalid amount");
            if(userData.balance < amt) return alert("Low balance");
            await db.collection('users').doc(auth.currentUser.uid).update({ balance: firebase.firestore.FieldValue.increment(-amt) });
            await db.collection('withdrawals').add({ uid: auth.currentUser.uid, amount: amt, account: acc, status: 'Pending', time: Date.now() });
            alert("Withdrawal Pending!"); hideM('witM');
        }

        function loadHistory(coll) {
            db.collection(coll).where('uid', '==', auth.currentUser.uid).onSnapshot(snap => {
                let h = '';
                snap.forEach(doc => {
                    const d = doc.data();
                    h += `<div class="history-card"><div><p class="text-white text-[10px] font-black uppercase">${coll==='requests'?'Dep':'Wit'}</p><p class="text-[7px] text-gray-500">${new Date(d.time).toLocaleDateString()}</p></div><div class="text-right"><p class="font-black text-white">$${d.amount}</p><span class="status-badge pending">${d.status}</span></div></div>`;
                });
                document.getElement
