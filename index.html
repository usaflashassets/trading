<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ProTrade Global | Elite Terminal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-firestore-compat.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap');
        body { background: #05070a; color: #e2e8f0; font-family: 'Plus Jakarta Sans', sans-serif; overflow: hidden; height: 100dvh; margin: 0; }
        .glass-card { background: rgba(17, 24, 39, 0.8); backdrop-filter: blur(12px); border: 1px solid rgba(255,255,255,0.05); }
        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.95); z-index: 1000; align-items: center; justify-content: center; padding: 20px; }
        .auth-input { background: #1a1f29; border: 1px solid #2d3748; padding: 14px; border-radius: 12px; width: 100%; color: white; outline: none; }
        #appTerminal { display: none; height: 100dvh; flex-direction: column; padding: 8px; }
        #authSection { display: none; } 
        .timer-badge { position: absolute; bottom: 10px; right: 10px; background: #eab308; color: black; padding: 5px 15px; border-radius: 50px; font-weight: 800; display: none; z-index: 100; font-size: 12px; }
        .btn-grad-green { background: linear-gradient(135deg, #22c55e 0%, #15803d 100%); }
        .btn-grad-red { background: linear-gradient(135deg, #ef4444 0%, #b91c1c 100%); }
        #loadingScreen { position: fixed; inset: 0; background: #05070a; z-index: 9999; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .loader-spin { width: 35px; height: 35px; border: 3px solid #1a1f29; border-top: 3px solid #eab308; border-radius: 50%; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        
        /* Assets Styles from attach.html */
        .history-card { background: #0a0f1d; border-radius: 12px; padding: 10px; margin-bottom: 8px; border: 1px solid rgba(255,255,255,0.03); display: flex; justify-content: space-between; align-items: center; }
        .status-badge { padding: 2px 8px; border-radius: 50px; font-size: 8px; font-weight: 800; text-transform: uppercase; }
        .pending { background: rgba(234, 179, 8, 0.1); color: #eab308; }
        .success { background: rgba(34, 197, 94, 0.1); color: #22c55e; }
        .failed { background: rgba(239, 68, 68, 0.1); color: #ef4444; }
        .option-card { background: rgba(255,255,255,0.02); border: 1px solid rgba(255,255,255,0.08); padding: 12px; border-radius: 12px; cursor: pointer; transition: 0.2s; margin-bottom: 8px; }
        .btn-small { padding: 12px; border-radius: 10px; font-size: 10px; font-weight: 800; text-transform: uppercase; letter-spacing: 0.5px; }
    </style>
</head>
<body>

    <div id="loadingScreen">
        <div class="loader-spin"></div>
        <p class="mt-3 text-[9px] font-bold text-yellow-500 uppercase tracking-widest">Verifying Session...</p>
    </div>

    <div id="authSection" class="h-full flex items-center justify-center p-4">
        <div class="glass-card w-full max-w-sm p-8 rounded-[32px]">
            <h1 class="text-3xl font-black text-center mb-8 uppercase italic">ProTrade</h1>
            <div class="flex bg-black/40 p-1.5 rounded-2xl mb-8">
                <button onclick="switchAuth('login')" id="loginTab" class="flex-1 py-3 text-sm font-bold">Login</button>
                <button onclick="switchAuth('reg')" id="regTab" class="flex-1 py-3 text-sm font-bold bg-[#2d3748] rounded-xl">Registration</button>
            </div>
            <input type="email" id="userEmail" placeholder="Email" class="auth-input mb-4">
            <input type="password" id="userPass" placeholder="Password" class="auth-input mb-6">
            <button onclick="handleAuth()" id="authBtn" class="w-full py-4 bg-blue-600 text-white font-black rounded-2xl uppercase">Registration</button>
        </div>
    </div>

    <div id="appTerminal">
        <header class="flex justify-between items-center mb-2 px-1">
            <div class="flex items-center gap-2">
                <div onclick="showM('settingsM')" id="userInitial" class="w-8 h-8 rounded-full bg-yellow-500 flex items-center justify-center text-black font-extrabold cursor-pointer text-xs">?</div>
                <div><p class="text-[7px] text-gray-500 font-bold uppercase">Balance</p><h1 id="balanceDisp" class="text-lg font-black text-white">$0.00</h1></div>
            </div>
            <button onclick="showM('assetsM')" class="bg-yellow-500 text-black px-4 py-2 rounded-xl text-[10px] font-black uppercase shadow-lg shadow-yellow-500/20">My Assets</button>
        </header>

        <div class="mb-2">
            <select id="assetSelect" onchange="loadChart(this.value)" class="w-full bg-white/5 border border-white/10 rounded-xl p-2 text-yellow-500 font-bold text-[11px] outline-none">
                <optgroup label="FOREX MAJOR">
                    <option value="FX:EURUSD">EUR/USD</option><option value="FX:GBPUSD">GBP/USD</option><option value="FX:USDJPY">USD/JPY</option>
                </optgroup>
                <optgroup label="CRYPTO">
                    <option value="BINANCE:BTCUSDT">BTC/USDT</option><option value="BINANCE:ETHUSDT">ETH/USDT</option>
                </optgroup>
            </select>
        </div>

        <main class="relative flex-grow rounded-[24px] overflow-hidden bg-black mb-2 border border-white/5">
            <div id="tv_chart" class="h-full w-full"></div>
            <div id="tradeTimer" class="timer-badge">⏱ <span id="timerText">00:00</span></div>
        </main>

        <footer class="glass-card p-3 rounded-[24px]">
            <div class="grid grid-cols-2 gap-3 mb-3">
                <div class="bg-black/40 p-2 rounded-xl border border-white/5">
                    <span class="text-[8px] text-gray-500 font-bold uppercase block ml-1">Amount</span>
                    <input id="tradeAmt" type="number" value="100" class="bg-transparent outline-none font-black text-white text-base w-full px-1">
                </div>
                <div class="bg-black/40 p-2 rounded-xl border border-white/5">
                    <span class="text-[8px] text-gray-500 font-bold uppercase block ml-1">Time</span>
                    <select id="duration" class="bg-transparent font-black text-white text-base w-full outline-none">
                        <option value="5">5s</option><option value="15">15s</option><option value="30">30s</option><option value="60">1m</option>
                    </select>
                </div>
            </div>
            <div class="grid grid-cols-2 gap-3">
                <button onclick="initTrade('UP')" class="btn-grad-green h-12 rounded-xl font-black text-white uppercase text-sm">Call</button>
                <button onclick="initTrade('DOWN')" class="btn-grad-red h-12 rounded-xl font-black text-white uppercase text-sm">Put</button>
            </div>
        </footer>
    </div>

    <div id="assetsM" class="modal">
        <div class="glass-card p-6 rounded-[32px] w-full max-w-sm h-[85vh] overflow-y-auto relative">
            <button onclick="hideM('assetsM')" class="absolute top-4 right-6 text-gray-500 text-2xl">&times;</button>
            
            <div id="assetDashboard">
                <div class="text-center mb-6 pt-4">
                    <p class="text-[8px] text-gray-500 font-bold uppercase">Total Balance</p>
                    <h2 id="assetBalance" class="text-3xl font-black text-white">$0.00</h2>
                </div>

                <div class="grid grid-cols-2 gap-3 mb-4">
                    <button onclick="openDep()" class="btn-small bg-white text-black">Deposit</button>
                    <button onclick="openWit()" class="btn-small bg-red-600 text-white">Withdraw</button>
                </div>
                <button onclick="showM('histM')" class="w-full btn-small border border-white/10 bg-white/5 text-gray-400 mb-6">Transaction History</button>
            </div>

            <div id="depView" class="hidden">
                <div id="d0" class="space-y-2">
                    <h2 class="text-[10px] font-black text-center mb-4 uppercase italic">Select Method</h2>
                    <div onclick="selectDepMethod('crypto')" class="option-card text-center"><p class="text-white text-[11px] font-bold">Crypto (BEP20)</p></div>
                    <div onclick="selectDepMethod('pkr')" class="option-card text-center"><p class="text-white text-[11px] font-bold">PKR (Local Bank)</p></div>
                </div>
                <div id="d1" class="hidden">
                    <input type="number" id="dAmount" oninput="calcUsdDep()" placeholder="Enter Amount" class="auth-input mb-4 text-center">
                    <button onclick="toStepDep(2)" class="w-full btn-small bg-yellow-500 text-black">Next Step</button>
                </div>
                <div id="d2" class="hidden text-center">
                    <img id="depQR" src="" class="mx-auto mb-3 rounded-lg w-36 h-36 object-contain bg-white p-2">
                    <button onclick="toStepDep(3)" class="w-full btn-small bg-yellow-500 text-black">I Have Paid</button>
                </div>
                <div id="d3" class="hidden space-y-3">
                    <input type="text" id="dTxid" placeholder="Transaction ID / TXID" class="auth-input">
                    <button onclick="submitDep()" class="w-full btn-small bg-green-600 text-white">Submit Proof</button>
                </div>
                <button onclick="resetAssetView()" class="w-full mt-4 text-[9px] font-bold text-gray-600 uppercase">Back to Dashboard</button>
            </div>

            <div id="witView" class="hidden">
                <div id="w0" class="space-y-2">
                    <h2 class="text-[10px] font-black text-center mb-4 uppercase italic">Withdraw Method</h2>
                    <div onclick="selectWitMethod('crypto')" class="option-card text-center"><p class="text-white text-[11px] font-bold">Crypto Wallet</p></div>
                    <div onclick="selectWitMethod('pkr')" class="option-card text-center"><p class="text-white text-[11px] font-bold">PKR Bank/JazzCash</p></div>
                </div>
                <div id="wC" class="hidden space-y-3">
                    <input type="text" id="wcWallet" placeholder="Wallet Address" class="auth-input">
                    <input type="number" id="wcAmt" placeholder="Amount ($)" class="auth-input">
                    <button onclick="submitWitCrypto()" class="w-full btn-small bg-white text-black">Confirm</button>
                </div>
                <div id="wP" class="hidden space-y-3">
                    <input type="text" id="wAccNum" placeholder="Account Number" class="auth-input">
                    <input type="number" id="wAmt" placeholder="Amount (PKR)" class="auth-input">
                    <button onclick="submitWitPkr()" class="w-full btn-small bg-white text-black">Confirm</button>
                </div>
                <button onclick="resetAssetView()" class="w-full mt-4 text-[9px] font-bold text-gray-600 uppercase">Back</button>
            </div>
        </div>
    </div>

    <div id="histM" class="modal">
        <div class="glass-card p-5 rounded-[25px] w-full max-w-sm h-[70vh] flex flex-col">
            <h2 class="text-[10px] font-black text-center mb-4 uppercase italic text-gray-400">Activity Logs</h2>
            <div class="flex gap-2 mb-4">
                <button onclick="loadHistory('requests')" class="flex-1 py-2 bg-green-500/10 text-green-500 rounded-lg text-[8px] font-black uppercase">Deposits</button>
                <button onclick="loadHistory('withdrawals')" class="flex-1 py-2 bg-red-500/10 text-red-500 rounded-lg text-[8px] font-black uppercase">Withdraws</button>
            </div>
            <div id="historyList" class="flex-grow overflow-y-auto text-[9px]"></div>
            <button onclick="hideM('histM')" class="w-full mt-4 py-3 border border-white/10 text-[9px] font-bold text-gray-500 uppercase rounded-xl">Close</button>
        </div>
    </div>

    <div id="settingsM" class="modal">
        <div class="glass-card p-8 rounded-[32px] w-full max-w-sm text-center">
            <h2 id="modalEmail" class="text-white font-bold text-sm mb-4 break-all">User</h2>
            <button onclick="auth.signOut().then(()=>location.reload())" class="w-full py-4 bg-red-600/10 text-red-500 border border-red-600/20 font-black rounded-2xl uppercase text-[10px]">Logout</button>
            <button onclick="hideM('settingsM')" class="mt-4 text-gray-500 text-[10px] font-bold uppercase">Close</button>
        </div>
    </div>

    <div id="resultM" class="modal"><div id="resultBox" class="bg-[#1a1f2e] p-10 rounded-[40px] text-center border border-white/10 w-80"></div></div>

    <script type="text/javascript" src="https://s3.tradingview.com/tv.js"></script>
    <script>
        const firebaseConfig = { apiKey: "AIzaSyAySRA1YSpTpmC8WjnKmDhnNMHkEmkeP50", authDomain: "waqas-47f30.firebaseapp.com", projectId: "waqas-47f30", storageBucket: "waqas-47f30.appspot.com", messagingSenderId: "374104279093", appId: "1:374104279093:web:6e1844b60456c700940364" };
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth(), db = firebase.firestore();
        let userData = null, mode = 'reg', chartLoaded = false, currentDepMethod = '';

        auth.onAuthStateChanged(user => {
            const loader = document.getElementById('loadingScreen');
            if(user) {
                db.collection('users').doc(user.uid).onSnapshot(doc => {
                    userData = doc.data();
                    if(userData) {
                        const bal = (userData.balance || 0).toFixed(2);
                        document.getElementById('balanceDisp').innerText = "$" + bal;
                        document.getElementById('assetBalance').innerText = "$" + bal;
                        document.getElementById('userInitial').innerText = user.email[0].toUpperCase();
                        document.getElementById('modalEmail').innerText = user.email;
                        document.getElementById('authSection').style.display = 'none';
                        document.getElementById('appTerminal').style.display = 'flex';
                        if(!chartLoaded) { loadChart('FX:EURUSD'); chartLoaded = true; }
                        loader.style.display = 'none';
                    }
                });
            } else { 
                document.getElementById('authSection').style.display = 'flex'; 
                document.getElementById('appTerminal').style.display = 'none'; 
                loader.style.display = 'none'; 
            }
        });

        async function handleAuth() {
            const e = document.getElementById('userEmail').value, p = document.getElementById('userPass').value;
            if(!e || !p) return alert("Fill all fields");
            document.getElementById('loadingScreen').style.display = 'flex';
            try { 
                if(mode==='reg') { 
                    const r = await auth.createUserWithEmailAndPassword(e, p); 
                    await db.collection('users').doc(r.user.uid).set({ email: e, balance: 0, tradeMode: 'normal' }); 
                } else { await auth.signInWithEmailAndPassword(e, p); } 
            } catch(err) { alert(err.message); document.getElementById('loadingScreen').style.display = 'none'; }
        }

        function showM(id) { document.getElementById(id).style.display = 'flex'; }
        function hideM(id) { document.getElementById(id).style.display = 'none'; }
        function loadChart(s) { new TradingView.widget({ "autosize": true, "symbol": s, "interval": "1", "theme": "dark", "container_id": "tv_chart", "hide_top_toolbar": true, "hide_side_toolbar": true }); }

        /* ASSETS FUNCTIONS */
        function resetAssetView() {
            document.getElementById('assetDashboard').classList.remove('hidden');
            document.getElementById('depView').classList.add('hidden');
            document.getElementById('witView').classList.add('hidden');
        }
        function openDep() { 
            document.getElementById('assetDashboard').classList.add('hidden');
            document.getElementById('depView').classList.remove('hidden');
            toStepDep(0);
        }
        function openWit() {
            document.getElementById('assetDashboard').classList.add('hidden');
            document.getElementById('witView').classList.remove('hidden');
            document.getElementById('w0').classList.remove('hidden');
            document.getElementById('wC').classList.add('hidden');
            document.getElementById('wP').classList.add('hidden');
        }
        function toStepDep(s) {
            ['d0','d1','d2','d3'].forEach(d => document.getElementById(d).classList.add('hidden'));
            document.getElementById('d'+s).classList.remove('hidden');
        }
        function selectDepMethod(m) {
            currentDepMethod = m;
            document.getElementById('depQR').src = m === 'crypto' ? "https://api.qrserver.com/v1/create-qr-code/?size=150x150&data=0x76ecfe8a3bd89297189e16cdcd275d743fb71a62" : "https://i.postimg.cc/HLPQpW92/Screenshot-20260504-033311.jpg";
            toStepDep(1);
        }
        async function submitDep() {
            const tx = document.getElementById('dTxid').value;
            if(!tx) return alert("Enter TXID");
            await db.collection('requests').add({ uid: auth.currentUser.uid, email: auth.currentUser.email, amount: document.getElementById('dAmount').value, currency: currentDepMethod==='crypto'?'USD':'PKR', txid: tx, status: 'Pending', time: Date.now() });
            alert("Submitted!"); resetAssetView();
        }
        function selectWitMethod(m) { document.getElementById('w0').classList.add('hidden'); if(m==='crypto') document.getElementById('wC').classList.remove('hidden'); else document.getElementById('wP').classList.remove('hidden'); }
        async function submitWitCrypto() {
            const amt = parseFloat(document.getElementById('wcAmt').value);
            if(amt > userData.balance) return alert("Low Balance");
            await db.collection('users').doc(auth.currentUser.uid).update({ balance: firebase.firestore.FieldValue.increment(-amt) });
            await db.collection('withdrawals').add({ uid: auth.currentUser.uid, email: auth.currentUser.email, amount: amt, currency: 'USD', status: 'Pending', time: Date.now(), accountNumber: document.getElementById('wcWallet').value });
            alert("Requested!"); resetAssetView();
        }

        async function loadHistory(coll) {
            const list = document.getElementById('historyList');
            list.innerHTML = '<p class="text-center py-4 opacity-30 text-[8px]">Loading...</p>';
            db.collection(coll).where('uid', '==', auth.currentUser.uid).onSnapshot(snap => {
                let html = '';
                snap.forEach(doc => {
                    const d = doc.data();
                    html += `<div class="history-card">
                        <div><p class="text-white text-[9px] uppercase font-bold">${coll==='requests'?'Dep':'Wit'}</p><p class="text-[7px] text-gray-500">${new Date(d.time).toLocaleDateString()}</p></div>
                        <div class="text-right"><p class="font-black text-[10px]">${d.currency==='USD'?'$':''}${d.amount}</p><span class="status-badge pending">${d.status || 'Pending'}</span></div>
                    <
