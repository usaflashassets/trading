<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ProTrade Global | Elite Terminal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-firestore-compat.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap');
        body { background: #05070a; color: #e2e8f0; font-family: 'Plus Jakarta Sans', sans-serif; overflow: hidden; height: 100dvh; margin: 0; }
        .glass-card { background: rgba(17, 24, 39, 0.8); backdrop-filter: blur(12px); border: 1px solid rgba(255,255,255,0.05); }
        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.95); z-index: 1000; align-items: center; justify-content: center; padding: 20px; }
        .auth-input { background: #1a1f29; border: 1px solid #2d3748; padding: 14px; border-radius: 12px; width: 100%; color: white; outline: none; }
        #appTerminal { display: none; height: 100dvh; flex-direction: column; padding: 8px; }
        .timer-badge { position: absolute; bottom: 10px; right: 10px; background: #eab308; color: black; padding: 5px 15px; border-radius: 50px; font-weight: 800; display: none; z-index: 100; font-size: 12px; }
        .btn-grad-green { background: linear-gradient(135deg, #22c55e 0%, #15803d 100%); }
        .btn-grad-red { background: linear-gradient(135deg, #ef4444 0%, #b91c1c 100%); }
        #loadingScreen { position: fixed; inset: 0; background: #05070a; z-index: 9999; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .loader-spin { width: 35px; height: 35px; border: 3px solid #1a1f29; border-top: 3px solid #eab308; border-radius: 50%; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

    <div id="loadingScreen">
        <div class="loader-spin"></div>
        <p class="mt-3 text-[9px] font-bold text-yellow-500 uppercase tracking-widest">Verifying Session...</p>
    </div>

    <div id="authSection" class="h-full flex items-center justify-center p-4">
        <div class="glass-card w-full max-w-sm p-8 rounded-[32px]">
            <h1 class="text-3xl font-black text-center mb-8 uppercase italic text-yellow-500">ProTrade</h1>
            <div class="flex bg-black/40 p-1.5 rounded-2xl mb-8">
                <button onclick="switchAuth('login')" id="loginTab" class="flex-1 py-3 text-sm font-bold">Login</button>
                <button onclick="switchAuth('reg')" id="regTab" class="flex-1 py-3 text-sm font-bold bg-[#2d3748] rounded-xl">Registration</button>
            </div>
            <input type="email" id="userEmail" placeholder="Email" class="auth-input mb-4">
            <input type="password" id="userPass" placeholder="Password" class="auth-input mb-6">
            <button onclick="handleAuth()" id="authBtn" class="w-full py-4 bg-yellow-500 text-black font-black rounded-2xl uppercase">Registration</button>
        </div>
    </div>

    <div id="appTerminal">
        <header class="flex justify-between items-center mb-2 px-1">
            <div class="flex items-center gap-2">
                <div onclick="showM('settingsM')" id="userInitial" class="w-8 h-8 rounded-full bg-yellow-500 flex items-center justify-center text-black font-extrabold cursor-pointer text-xs">?</div>
                <div><p class="text-[7px] text-gray-500 font-bold uppercase">Balance</p><h1 id="balanceDisp" class="text-lg font-black text-white">$0.00</h1></div>
            </div>
            <div class="flex gap-1.5">
                <button onclick="showM('depM')" class="bg-yellow-500 text-black px-3 py-1.5 rounded-lg text-[9px] font-black uppercase">Deposit</button>
                <button onclick="showM('witM')" class="bg-white/10 text-white px-3 py-1.5 rounded-lg text-[9px] font-black uppercase border border-white/10">Withdraw</button>
            </div>
        </header>

        <div class="mb-2">
            <select id="assetSelect" onchange="loadChart(this.value)" class="w-full bg-white/5 border border-white/10 rounded-xl p-2 text-yellow-500 font-bold text-[11px] outline-none">
                <optgroup label="FOREX MAJOR">
                    <option value="FX:EURUSD">EUR/USD</option><option value="FX:GBPUSD">GBP/USD</option>
                </optgroup>
                <optgroup label="CRYPTO">
                    <option value="BINANCE:BTCUSDT">BTC/USDT</option>
                </optgroup>
            </select>
        </div>

        <main class="relative flex-grow rounded-[24px] overflow-hidden bg-black mb-2 border border-white/5">
            <div id="tv_chart" class="h-full w-full"></div>
            <div id="tradeTimer" class="timer-badge">⏱ <span id="timerText">00:00</span></div>
        </main>

        <footer class="glass-card p-3 rounded-[24px]">
            <div class="grid grid-cols-2 gap-3 mb-3">
                <div class="bg-black/40 p-2 rounded-xl border border-white/5">
                    <span class="text-[8px] text-gray-500 font-bold uppercase block ml-1">Amount</span>
                    <input id="tradeAmt" type="number" value="100" class="bg-transparent outline-none font-black text-white text-base w-full px-1">
                </div>
                <div class="bg-black/40 p-2 rounded-xl border border-white/5">
                    <span class="text-[8px] text-gray-500 font-bold uppercase block ml-1">Time</span>
                    <select id="duration" class="bg-transparent font-black text-white text-base w-full outline-none">
                        <option value="5">5s</option><option value="60">1m</option>
                    </select>
                </div>
            </div>
            <div class="grid grid-cols-2 gap-3">
                <button onclick="initTrade('UP')" class="btn-grad-green h-12 rounded-xl font-black text-white uppercase text-sm">Call</button>
                <button onclick="initTrade('DOWN')" class="btn-grad-red h-12 rounded-xl font-black text-white uppercase text-sm">Put</button>
            </div>
        </footer>
    </div>

    <div id="depM" class="modal">
        <div class="glass-card p-8 rounded-[32px] w-full max-w-sm text-center">
            
            <div id="dStepChoice">
                <h2 class="text-xl font-black text-yellow-500 mb-6 uppercase">Deposit Method</h2>
                <button onclick="showDepPath('crypto')" class="w-full py-4 mb-4 bg-yellow-500 text-black font-black rounded-2xl uppercase">Crypto Deposit</button>
                <button onclick="showDepPath('pkr')" class="w-full py-4 bg-white text-black font-black rounded-2xl uppercase">PKR Deposit</button>
            </div>

            <div id="cryptoPath" class="hidden">
                <div id="cStep1">
                    <h2 class="text-xl font-black text-yellow-500 mb-6 uppercase">Amount ($)</h2>
                    <input type="number" id="depAmtInput" placeholder="Enter USD" class="auth-input mb-6 text-center text-lg">
                    <button onclick="toCStep(2)" class="w-full py-4 bg-yellow-500 text-black font-black rounded-2xl uppercase">Next</button>
                </div>
                <div id="cStep2" class="hidden">
                    <img src="https://api.qrserver.com/v1/create-qr-code/?size=150x150&data=TAaTmYha48Pbft4aJn1RGyKmVoQZKuLArM" class="mx-auto mb-4 p-2 bg-white rounded-xl">
                    <p class="text-[9px] text-gray-400 mb-4 break-all px-4">TAaTmYha48Pbft4aJn1RGyKmVoQZKuLArM</p>
                    <button onclick="toCStep(3)" class="w-full py-4 bg-yellow-500 text-black font-black rounded-2xl uppercase">I Have Paid</button>
                </div>
                <div id="cStep3" class="hidden space-y-3 text-left">
                    <input type="email" id="depEmail" placeholder="Email" class="auth-input">
                    <input type="text" id="depTx" placeholder="TXID" class="auth-input">
                    <button onclick="submitFinalDep('Crypto')" class="w-full py-4 bg-yellow-500 text-black font-black rounded-2xl uppercase">Submit</button>
                </div>
            </div>

            <div id="pkrPath" class="hidden">
                <div id="pStep1">
                    <h2 class="text-xl font-black text-yellow-500 mb-6 uppercase">PKR Amount</h2>
                    <input type="number" id="pkrAmtInput" placeholder="Amount (PKR)" class="auth-input mb-6 text-center text-lg">
                    <button onclick="toPStep(2)" class="w-full py-4 bg-yellow-500 text-black font-black rounded-2xl uppercase">Next</button>
                </div>
                <div id="pStep2" class="hidden">
                    <div class="bg-yellow-500 p-2 rounded-2xl mb-4">
                        <img src="scanner.jpg" alt="Dubai Live Trade Scanner" class="w-full h-auto rounded-xl">
                    </div>
                    <p class="text-[10px] text-gray-400 mb-4">Scan using Easypaisa, JazzCash or any Bank App</p>
                    <button onclick="toPStep(3)" class="w-full py-4 bg-yellow-500 text-black font-black rounded-2xl uppercase">Done Payment</button>
                </div>
                <div id="pStep3" class="hidden space-y-3 text-left">
                    <input type="text" id="pkrName" placeholder="Enter your name" class="auth-input">
                    <input type="number" id="pkrPaidAmt" placeholder="Enter your send amount" class="auth-input">
                    <input type="text" id="pkrTx" placeholder="Enter your Txid" class="auth-input">
                    <button onclick="submitFinalDep('PKR')" class="w-full py-4 bg-yellow-500 text-black font-black rounded-2xl uppercase">Submit</button>
                </div>
            </div>

            <button onclick="resetDepM()" class="mt-4 text-gray-500 text-[10px] font-bold uppercase tracking-widest">Back / Cancel</button>
        </div>
    </div>

    <div id="resultM" class="modal"><div id="resultBox" class="bg-[#1a1f2e] p-8 rounded-[32px] text-center border border-white/10 w-80"></div></div>

    <script type="text/javascript" src="https://s3.tradingview.com/tv.js"></script>
    <script>
        const firebaseConfig = { apiKey: "AIzaSyAySRA1YSpTpmC8WjnKmDhnNMHkEmkeP50", authDomain: "waqas-47f30.firebaseapp.com", projectId: "waqas-47f30", storageBucket: "waqas-47f30.appspot.com", messagingSenderId: "374104279093", appId: "1:374104279093:web:6e1844b60456c700940364" };
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth(), db = firebase.firestore();
        let userData = null, mode = 'reg', chartLoaded = false;

        function showM(id) { document.getElementById(id).style.display = 'flex'; }
        function hideM(id) { document.getElementById(id).style.display = 'none'; }

        function resetDepM() {
            ['dStepChoice','cryptoPath','pkrPath','cStep1','cStep2','cStep3','pStep1','pStep2','pStep3'].forEach(id => document.getElementById(id).classList.add('hidden'));
            document.getElementById('dStepChoice').classList.remove('hidden');
            hideM('depM');
        }

        function showDepPath(type) {
            document.getElementById('dStepChoice').classList.add('hidden');
            type === 'crypto' ? (document.getElementById('cryptoPath').classList.remove('hidden'), toCStep(1)) : (document.getElementById('pkrPath').classList.remove('hidden'), toPStep(1));
        }

        function toCStep(s) { ['cStep1','cStep2','cStep3'].forEach((id, i) => document.getElementById(id).classList.toggle('hidden', i !== s-1)); }
        function toPStep(s) { ['pStep1','pStep2','pStep3'].forEach((id, i) => document.getElementById(id).classList.toggle('hidden', i !== s-1)); }

        async function submitFinalDep(method) {
            let data = { uid: auth.currentUser.uid, method: method, time: Date.now(), status: 'pending' };
            if(method === 'Crypto') {
                data.txid = document.getElementById('depTx').value;
                data.amount = document.getElementById('depAmtInput').value;
                data.email = document.getElementById('depEmail').value;
            } else {
                data.name = document.getElementById('pkrName').value;
                data.amount = document.getElementById('pkrPaidAmt').value;
                data.txid = document.getElementById('pkrTx').value;
            }
            if(!data.txid || !data.amount) return showError("Please fill all details");
            await db.collection('requests').add(data);
            resetDepM();
            showSuccess("Request Received", "Deposit will be verified within 30 minutes.");
        }

        auth.onAuthStateChanged(user => {
            if(user) {
                db.collection('users').doc(user.uid).onSnapshot(doc => {
                    userData = doc.data();
                    if(userData) {
                        document.getElementById('balanceDisp').innerText = "$" + (userData.balance || 0).toFixed(2);
                        document.getElementById('userInitial').innerText = user.email[0].toUpperCase();
                        document.getElementById('authSection').style.display = 'none';
                        document.getElementById('appTerminal').style.display = 'flex';
                        if(!chartLoaded) { loadChart('FX:EURUSD'); chartLoaded = true; }
                        document.getElementById('loadingScreen').style.display = 'none';
                    }
                });
            } else {
                document.getElementById('authSection').style.display = 'flex';
                document.getElementById('loadingScreen').style.display = 'none';
            }
        });

        async function handleAuth() {
            const e = document.getElementById('userEmail').value, p = document.getElementById('userPass').value;
            try {
                if(mode==='reg') {
                    const r = await auth.createUserWithEmailAndPassword(e, p);
                    await db.collection('users').doc(r.user.uid).set({ email: e, balance: 0, tradeMode: 'normal' });
                } else { await auth.signInWithEmailAndPassword(e, p); }
            } catch(err) { showError(err.message); }
        }

        function loadChart(s) { new TradingView.widget({ "autosize": true, "symbol": s, "interval": "1", "theme": "dark", "container_id": "tv_chart", "hide_top_toolbar": true, "hide_side_toolbar": true }); }
        
        async function initTrade(type) {
            const amt = parseFloat(document.getElementById('tradeAmt').value), dur = parseInt(document.getElementById('duration').value);
            if(amt > userData.balance || amt <= 0) return showError("Low balance");
            await db.collection('users').doc(auth.currentUser.uid).update({ balance: firebase.firestore.FieldValue.increment(-amt) });
            document.getElementById('tradeTimer').style.display = 'block';
            let l = dur;
            let iv = setInterval(() => {
                let m = Math.floor(l/60), s = l%60;
                document.getElementById('timerText').innerText = `${m<10?'0'+m:m}:${s<10?'0'+s:s}`;
                if(l <= 0) { clearInterval(iv); document.getElementById('tradeTimer').style.display = 'none'; showRes(amt); }
                l--;
            }, 1000);
        }

        async function showRes(amt) {
            const m = userData.tradeMode || 'normal';
            let win = m === 'profit' ? true : (m === 'loss' ? false : Math.random() > 0.5);
            const p = amt * 1.82;
            const box = document.getElementById('resultBox');
            if(win) { 
                await db.collection('users').doc(auth.currentUser.uid).update({ balance: firebase.firestore.FieldValue.increment(p) }); 
                box.innerHTML = `<h2 class="text-green-500 font-black">PROFIT</h2><h1 class="text-4xl text-white">+$${p.toFixed(2)}</h1>`;
            } else { 
                box.innerHTML = `<h2 class="text-red-500 font-black">LOSS</h2><h1 class="text-4xl text-white">-$${amt.toFixed(2)}</h1>`;
            }
            box.innerHTML += `<button onclick="hideM('resultM')" class="w-full bg-yellow-500 text-black py-3 rounded-xl mt-6 font-bold">Continue</button>`;
            showM('resultM');
        }

        function switchAuth(t) { mode = t; document.getElementById('loginTab').className = t==='login' ? 'flex-1 py-3 text-sm font-bold bg-[#2d3748] rounded-xl' : 'flex-1 py-3 text-sm font-bold'; document.getElementById('regTab').className = t==='reg' ? 'flex-1 py-3 text-sm font-bold bg-[#2d3748] rounded-xl' : 'flex-1 py-3 text-sm font-bold'; document.getElementById('authBtn').innerText = t==='login'?'Login':'Registration'; }
        function showSuccess(t, m) { const box = document.getElementById('resultBox'); box.innerHTML = `<h2 class="text-green-500 font-black">${t}</h2><p class="text-white text-xs mt-2">${m}</p><button onclick="hideM('resultM')" class="w-full bg-yellow-500 text-black py-3 rounded-xl mt-6">OK</button>`; showM('resultM'); }
        function showError(m) { const box = document.getElementById('resultBox'); box.innerHTML = `<h2 class="text-red-500 font-black">Error</h2><p class="text-white text-xs mt-2">${m}</p><button onclick="hideM('resultM')" class="w-full bg-red-600 text-white py-3 rounded-xl mt-6">Try Again</button>`; showM('resultM'); }
    </script>
</body>
</html>
