<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ProTrade Global | Elite Terminal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-firestore-compat.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&family=Inter:wght@400;600;700&display=swap');
        
        body { background: #05070a; color: #e2e8f0; font-family: 'Plus Jakarta Sans', sans-serif; overflow: hidden; height: 100dvh; margin: 0; }
        .glass-card { background: rgba(17, 24, 39, 0.8); backdrop-filter: blur(12px); border: 1px solid rgba(255,255,255,0.05); }
        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.95); z-index: 1000; align-items: center; justify-content: center; padding: 20px; }
        .auth-input { background: #1a1f29; border: 1px solid #2d3748; padding: 14px; border-radius: 12px; width: 100%; color: white; outline: none; }
        #appTerminal { display: none; height: 100dvh; flex-direction: column; padding: 8px; }
        .timer-badge { position: absolute; bottom: 10px; right: 10px; background: #eab308; color: black; padding: 5px 15px; border-radius: 50px; font-weight: 800; display: none; z-index: 100; font-size: 12px; }
        .btn-grad-green { background: linear-gradient(135deg, #22c55e 0%, #15803d 100%); }
        .btn-grad-red { background: linear-gradient(135deg, #ef4444 0%, #b91c1c 100%); }
        
        #loadingScreen { position: fixed; inset: 0; background: #05070a; z-index: 9999; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .loader-spin { width: 35px; height: 35px; border: 3px solid #1a1f29; border-top: 3px solid #eab308; border-radius: 50%; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        /* Wallet System Styles */
        .wallet-container { width: 100%; max-width: 400px; background: #1e2329; border-radius: 20px; padding: 20px; border: 1px solid #363c4e; font-family: 'Inter', sans-serif; }
        .section-wallet { display: none; }
        .section-wallet.active { display: block; }
        .menu-btn { width: 100%; padding: 14px; margin-bottom: 12px; border-radius: 12px; border: none; font-weight: 600; cursor: pointer; color: white; }
        .btn-deposit { background: #2ebd85; }
        .btn-withdraw { background: #f6465d; }
        .opt-btn { width: 100%; padding: 12px; background: #2b3139; border: 1px solid #363c4e; border-radius: 12px; color: white; margin-bottom: 10px; display: flex; justify-content: space-between; }
        .address-box { background: #161a1e; padding: 10px; border-radius: 8px; font-size: 10px; margin-bottom: 10px; border: 1px dashed #848e9c; word-break: break-all; }
        .qr-box { background: white; padding: 8px; border-radius: 12px; width: 180px; margin: 0 auto 10px; }
        .qr-box img { width: 100%; }
        .swal2-popup { background: #1e2329 !important; color: white !important; border: 1px solid #363c4e !important; }
    </style>
</head>
<body>

    <div id="loadingScreen">
        <div class="loader-spin"></div>
        <p class="mt-3 text-[9px] font-bold text-yellow-500 uppercase tracking-widest">Verifying Session...</p>
    </div>

    <div id="authSection" class="h-full flex items-center justify-center p-4">
        <div class="glass-card w-full max-w-sm p-8 rounded-[32px]">
            <h1 class="text-3xl font-black text-center mb-8 uppercase italic">ProTrade</h1>
            <div class="flex bg-black/40 p-1.5 rounded-2xl mb-8">
                <button onclick="switchAuth('login')" id="loginTab" class="flex-1 py-3 text-sm font-bold">Login</button>
                <button onclick="switchAuth('reg')" id="regTab" class="flex-1 py-3 text-sm font-bold bg-[#2d3748] rounded-xl">Registration</button>
            </div>
            <input type="email" id="userEmail" placeholder="Email" class="auth-input mb-4">
            <input type="password" id="userPass" placeholder="Password" class="auth-input mb-6">
            <button onclick="handleAuth()" id="authBtn" class="w-full py-4 bg-blue-600 text-white font-black rounded-2xl uppercase">Registration</button>
        </div>
    </div>

    <div id="appTerminal">
        <header class="flex justify-between items-center mb-2 px-1">
            <div class="flex items-center gap-2">
                <div onclick="showM('settingsM')" id="userInitial" class="w-8 h-8 rounded-full bg-yellow-500 flex items-center justify-center text-black font-extrabold cursor-pointer text-xs">?</div>
                <div><p class="text-[7px] text-gray-500 font-bold uppercase">Balance</p><h1 id="balanceDisp" class="text-lg font-black text-white">$0.00</h1></div>
            </div>
            <button onclick="showM('walletM')" class="bg-yellow-500 text-black px-4 py-2 rounded-xl text-[10px] font-black uppercase shadow-lg shadow-yellow-500/20">Deposit/Withdraw</button>
        </header>

        <div class="mb-2">
            <select id="assetSelect" onchange="loadChart(this.value)" class="w-full bg-white/5 border border-white/10 rounded-xl p-2 text-yellow-500 font-bold text-[11px] outline-none">
                <optgroup label="FOREX MAJOR">
                    <option value="FX:EURUSD">EUR/USD</option><option value="FX:GBPUSD">GBP/USD</option>
                </optgroup>
                <optgroup label="CRYPTO">
                    <option value="BINANCE:BTCUSDT">BTC/USDT</option><option value="BINANCE:ETHUSDT">ETH/USDT</option>
                </optgroup>
            </select>
        </div>

        <main class="relative flex-grow rounded-[24px] overflow-hidden bg-black mb-2 border border-white/5">
            <div id="tv_chart" class="h-full w-full"></div>
            <div id="tradeTimer" class="timer-badge">⏱ <span id="timerText">00:00</span></div>
        </main>

        <footer class="glass-card p-3 rounded-[24px]">
            <div class="grid grid-cols-2 gap-3 mb-3">
                <div class="bg-black/40 p-2 rounded-xl border border-white/5">
                    <span class="text-[8px] text-gray-500 font-bold uppercase block ml-1">Amount</span>
                    <input id="tradeAmt" type="number" value="100" class="bg-transparent outline-none font-black text-white text-base w-full px-1">
                </div>
                <div class="bg-black/40 p-2 rounded-xl border border-white/5">
                    <span class="text-[8px] text-gray-500 font-bold uppercase block ml-1">Time</span>
                    <select id="duration" class="bg-transparent font-black text-white text-base w-full outline-none">
                        <option value="5">5s</option><option value="60">1m</option>
                    </select>
                </div>
            </div>
            <div class="grid grid-cols-2 gap-3">
                <button onclick="initTrade('UP')" class="btn-grad-green h-12 rounded-xl font-black text-white uppercase text-sm">Call</button>
                <button onclick="initTrade('DOWN')" class="btn-grad-red h-12 rounded-xl font-black text-white uppercase text-sm">Put</button>
            </div>
        </footer>
    </div>

    <div id="walletM" class="modal">
        <div class="wallet-container relative">
            <button onclick="hideM('walletM')" class="absolute top-4 right-4 text-gray-400 text-xl">&times;</button>
            <div class="text-center mb-6"><div class="text-xl font-bold text-yellow-500">Dubai Live Trade</div></div>

            <div id="main-menu" class="section-wallet active">
                <button class="menu-btn btn-deposit" onclick="swSection('deposit-options')">Deposit</button>
                <button class="menu-btn btn-withdraw" onclick="swSection('withdraw-options')">Withdraw</button>
            </div>

            <div id="deposit-options" class="section-wallet">
                <button class="text-xs text-gray-400 mb-2" onclick="swSection('main-menu')">&larr; Back</button>
                <button class="opt-btn" onclick="setMode('crypto'); swSection('step-amount')"><span>🪙 Crypto (USDT)</span> <span>&gt;</span></button>
                <button class="opt-btn" onclick="setMode('pkr'); swSection('step-amount')"><span>🇵🇰 PKR (Easypaisa)</span> <span>&gt;</span></button>
            </div>

            <div id="step-amount" class="section-wallet">
                <button class="text-xs text-gray-400 mb-2" onclick="swSection('deposit-options')">&larr; Back</button>
                <input type="number" id="user_amount" placeholder="Enter Amount ($)" class="auth-input mb-2" oninput="calculatePKR()">
                <div id="pkr-conv" class="text-xs text-yellow-500 mb-4 hidden">Pay: 0 PKR</div>
                <button class="menu-btn btn-deposit" onclick="handleWalletNext()">Next</button>
            </div>

            <div id="step-payment" class="section-wallet text-center">
                <button class="text-xs text-gray-400 mb-2" onclick="swSection('step-amount')">&larr; Back</button>
                <div class="qr-box"><img id="disp-qr" src="" alt="QR"></div>
                <div id="crypto-addr" class="address-box hidden">0x76ecfe8a3bd89297189e16cdcd275d743fb71a62</div>
                <button class="menu-btn btn-deposit" onclick="swSection('dep-final')">I Have Paid</button>
            </div>

            <div id="dep-final" class="section-wallet">
                <input type="text" id="dep_txid" placeholder="Transaction ID / Txid" class="auth-input mb-4">
                <button class="menu-btn btn-deposit" onclick="subWallet('Deposit Request Sent!')">Submit Proof</button>
            </div>

            <div id="withdraw-options" class="section-wallet">
                <button class="text-xs text-gray-400 mb-2" onclick="swSection('main-menu')">&larr; Back</button>
                <select id="w_type" class="auth-input mb-2"><option>USDT (BEP20)</option><option>EasyPaisa</option></select>
                <input type="text" id="w_addr" placeholder="Address / Number" class="auth-input mb-2">
                <input type="number" id="w_amt" placeholder="Amount" class="auth-input mb-4">
                <button class="menu-btn btn-withdraw" onclick="subWallet('Withdrawal Request Sent!')">Withdraw Now</button>
            </div>
        </div>
    </div>

    <div id="settingsM" class="modal">
        <div class="glass-card p-8 rounded-[32px] w-full max-w-sm text-center">
            <h2 id="modalEmail" class="text-white font-bold text-sm mb-6">...</h2>
            <button onclick="auth.signOut().then(()=>location.reload())" class="w-full py-4 bg-red-600/10 text-red-500 border border-red-600/20 font-black rounded-2xl uppercase text-[10px]">Logout</button>
            <button onclick="hideM('settingsM')" class="mt-4 text-gray-500 text-xs">Close</button>
        </div>
    </div>

    <script type="text/javascript" src="https://s3.tradingview.com/tv.js"></script>
    <script>
        const firebaseConfig = { apiKey: "AIzaSyAySRA1YSpTpmC8WjnKmDhnNMHkEmkeP50", authDomain: "waqas-47f30.firebaseapp.com", projectId: "waqas-47f30", storageBucket: "waqas-47f30.appspot.com", messagingSenderId: "374104279093", appId: "1:374104279093:web:6e1844b60456c700940364" };
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth(), db = firebase.firestore();
        let userData = null, mode = 'reg', curWMode = '';

        function showM(id) { document.getElementById(id).style.display = 'flex'; }
        function hideM(id) { document.getElementById(id).style.display = 'none'; }

        // --- Wallet Logic ---
        function swSection(id) {
            document.querySelectorAll('.section-wallet').forEach(s => s.classList.remove('active'));
            document.getElementById(id).classList.add('active');
        }
        function setMode(m) { 
            curWMode = m; 
            document.getElementById('pkr-conv').classList.toggle('hidden', m !== 'pkr');
        }
        function calculatePKR() {
            if(curWMode === 'pkr') {
                const pkr = document.getElementById('user_amount').value * 280;
                document.getElementById('pkr-conv').innerText = `Pay: ${pkr.toLocaleString()} PKR`;
            }
        }
        function handleWalletNext() {
            const amt = document.getElementById('user_amount').value;
            if(!amt || amt <= 0) return Swal.fire('Error', 'Enter amount', 'error');
            const qr = document.getElementById('disp-qr');
            if(curWMode === 'crypto') {
                qr.src = "https://api.qrserver.com/v1/create-qr-code/?size=200x200&data=0x76ecfe8a3bd89297189e16cdcd275d743fb71a62";
                document.getElementById('crypto-addr').classList.remove('hidden');
            } else {
                qr.src = "https://i.postimg.cc/HLPQpW92/Screenshot-20260504-033311.jpg";
                document.getElementById('crypto-addr').classList.add('hidden');
            }
            swSection('step-payment');
        }
        function subWallet(msg) {
            Swal.fire({ title: 'Processing...', didOpen: () => Swal.showLoading() });
            setTimeout(() => {
                Swal.fire('Success', msg, 'success');
                hideM('walletM');
                swSection('main-menu');
            }, 2000);
        }

        // --- Core App Logic ---
        auth.onAuthStateChanged(user => {
            if(user) {
                db.collection('users').doc(user.uid).onSnapshot(doc => {
                    userData = doc.data();
                    document.getElementById('balanceDisp').innerText = "$" + (userData.balance || 0).toFixed(2);
                    document.getElementById('userInitial').innerText = user.email[0].toUpperCase();
                    document.getElementById('modalEmail').innerText = user.email;
                    document.getElementById('authSection').style.display = 'none';
                    document.getElementById('appTerminal').style.display = 'flex';
                    new TradingView.widget({ "autosize": true, "symbol": "FX:EURUSD", "interval": "1", "theme": "dark", "container_id": "tv_chart", "hide_top_toolbar": true });
                    document.getElementById('loadingScreen').style.display = 'none';
                });
            } else {
                document.getElementById('authSection').style.display = 'flex';
                document.getElementById('loadingScreen').style.display = 'none';
            }
        });

        async function handleAuth() {
            const e = document.getElementById('userEmail').value, p = document.getElementById('userPass').value;
            try {
                if(mode==='reg') {
                    const r = await auth.createUserWithEmailAndPassword(e, p);
                    await db.collection('users').doc(r.user.uid).set({ email: e, balance: 0 });
                } else { await auth.signInWithEmailAndPassword(e, p); }
            } catch(err) { Swal.fire('Error', err.message, 'error'); }
        }

        function switchAuth(t) { mode = t; document.getElementById('authBtn').innerText = t==='login'?'Login':'Registration'; }

        async function initTrade(type) {
            const amt = parseFloat(document.getElementById('tradeAmt').value);
            if(amt > userData.balance || amt <= 0) return Swal.fire('Error', 'Low Balance', 'error');
            await db.collection('users').doc(auth.currentUser.uid).update({ balance: firebase.firestore.FieldValue.increment(-amt) });
            document.getElementById('tradeTimer').style.display = 'block';
            setTimeout(() => {
                document.getElementById('tradeTimer').style.display = 'none';
                Swal.fire('Trade Complete', 'Result processed', 'info');
            }, 5000);
        }
    </script>
</body>
</html>
