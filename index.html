<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ProTrade Global | Elite Terminal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-firestore-compat.js"></script>
    <script src="https://unpkg.com/lightweight-charts/dist/lightweight-charts.standalone.production.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap');
        body { background: #05070a; color: #e2e8f0; font-family: 'Plus Jakarta Sans', sans-serif; overflow: hidden; height: 100dvh; margin: 0; }
        .glass-card { background: rgba(17, 24, 39, 0.8); backdrop-filter: blur(12px); border: 1px solid rgba(255,255,255,0.05); }
        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.95); z-index: 1000; align-items: center; justify-content: center; padding: 20px; }
        .auth-input { background: #1a1f29; border: 1px solid #2d3748; padding: 14px; border-radius: 12px; width: 100%; color: white; outline: none; }
        #appTerminal { display: none; height: 100dvh; flex-direction: column; padding: 8px; }
        #authSection { display: none; } 
        .timer-badge { position: absolute; bottom: 10px; right: 10px; background: #eab308; color: black; padding: 5px 15px; border-radius: 50px; font-weight: 800; display: none; z-index: 100; font-size: 12px; }
        .btn-grad-green { background: linear-gradient(135deg, #22c55e 0%, #15803d 100%); }
        .btn-grad-red { background: linear-gradient(135deg, #ef4444 0%, #b91c1c 100%); }
        
        #loadingScreen { position: fixed; inset: 0; background: #05070a; z-index: 9999; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .loader-spin { width: 35px; height: 35px; border: 3px solid #1a1f29; border-top: 3px solid #eab308; border-radius: 50%; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        select option { background: #1a1f29; color: white; }

        .success-checkmark { width: 60px; height: 60px; margin: 0 auto; border: 3px solid #22c55e; border-radius: 50%; display: flex; align-items: center; justify-content: center; }
        .error-xmark { width: 60px; height: 60px; margin: 0 auto; border: 3px solid #ef4444; border-radius: 50%; display: flex; align-items: center; justify-content: center; }
    </style>
</head>
<body>

    <div id="loadingScreen">
        <div class="loader-spin"></div>
        <p class="mt-3 text-[9px] font-bold text-yellow-500 uppercase tracking-widest">Verifying Session...</p>
    </div>

    <div id="authSection" class="h-full flex items-center justify-center p-4">
        <div class="glass-card w-full max-w-sm p-8 rounded-[32px]">
            <h1 class="text-3xl font-black text-center mb-8 uppercase italic">ProTrade</h1>
            <div class="flex bg-black/40 p-1.5 rounded-2xl mb-8">
                <button onclick="switchAuth('login')" id="loginTab" class="flex-1 py-3 text-sm font-bold">Login</button>
                <button onclick="switchAuth('reg')" id="regTab" class="flex-1 py-3 text-sm font-bold bg-[#2d3748] rounded-xl">Registration</button>
            </div>
            <input type="email" id="userEmail" placeholder="Email" class="auth-input mb-4">
            <input type="password" id="userPass" placeholder="Password" class="auth-input mb-6">
            <button onclick="handleAuth()" id="authBtn" class="w-full py-4 bg-blue-600 text-white font-black rounded-2xl uppercase">Registration</button>
        </div>
    </div>

    <div id="appTerminal">
        <header class="flex justify-between items-center mb-2 px-1">
            <div class="flex items-center gap-2">
                <div onclick="showM('settingsM')" id="userInitial" class="w-8 h-8 rounded-full bg-yellow-500 flex items-center justify-center text-black font-extrabold cursor-pointer text-xs">?</div>
                <div><p class="text-[7px] text-gray-500 font-bold uppercase">Balance</p><h1 id="balanceDisp" class="text-lg font-black text-white">$0.00</h1></div>
            </div>
            <div class="flex gap-1.5">
                <button onclick="showM('depM')" class="bg-yellow-500 text-black px-3 py-1.5 rounded-lg text-[9px] font-black uppercase">Deposit</button>
                <button onclick="showM('witM')" class="bg-white/10 text-white px-3 py-1.5 rounded-lg text-[9px] font-black uppercase border border-white/10">Withdraw</button>
            </div>
        </header>

        <div class="mb-2">
            <select id="assetSelect" onchange="loadChart(this.value)" class="w-full bg-white/5 border border-white/10 rounded-xl p-2 text-yellow-500 font-bold text-[11px] outline-none">
                <optgroup label="PROTRADE OTC (CONTROLLED)">
                    <option value="OTC:EURUSD">EUR/USD (OTC)</option>
                    <option value="OTC:BTCUSD">BTC/USD (OTC)</option>
                </optgroup>
                <optgroup label="FOREX MAJOR">
                    <option value="FX:EURUSD">EUR/USD (Real)</option>
                    <option value="FX:GBPUSD">GBP/USD</option>
                </optgroup>
            </select>
        </div>

        <main class="relative flex-grow rounded-[24px] overflow-hidden bg-black mb-2 border border-white/5">
            <div id="tv_chart" class="h-full w-full"></div>
            <div id="tradeTimer" class="timer-badge">⏱ <span id="timerText">00:00</span></div>
        </main>

        <footer class="glass-card p-3 rounded-[24px]">
            <div class="grid grid-cols-2 gap-3 mb-3">
                <div class="bg-black/40 p-2 rounded-xl border border-white/5">
                    <span class="text-[8px] text-gray-500 font-bold uppercase block ml-1">Amount</span>
                    <input id="tradeAmt" type="number" value="100" class="bg-transparent outline-none font-black text-white text-base w-full px-1">
                </div>
                <div class="bg-black/40 p-2 rounded-xl border border-white/5">
                    <span class="text-[8px] text-gray-500 font-bold uppercase block ml-1">Time</span>
                    <select id="duration" class="bg-transparent font-black text-white text-base w-full outline-none">
                        <option value="5">5s</option><option value="15">15s</option><option value="30">30s</option><option value="60">1m</option>
                    </select>
                </div>
            </div>
            <div class="grid grid-cols-2 gap-3">
                <button onclick="initTrade('UP')" class="btn-grad-green h-12 rounded-xl font-black text-white uppercase text-sm">Call</button>
                <button onclick="initTrade('DOWN')" class="btn-grad-red h-12 rounded-xl font-black text-white uppercase text-sm">Put</button>
            </div>
        </footer>
    </div>

    <div id="settingsM" class="modal"><div class="glass-card p-8 rounded-[32px] w-full max-w-sm text-center"><div class="flex justify-between items-center mb-6"><h2 class="text-[10px] font-black text-gray-500 uppercase">Account Details</h2><button onclick="hideM('settingsM')" class="text-gray-500 text-2xl font-light">&times;</button></div><div class="mb-8"><div id="modalInitial" class="w-20 h-20 bg-yellow-500 rounded-full flex items-center justify-center mx-auto text-3xl font-black text-black mb-4">?</div><h2 id="modalEmail" class="text-white font-bold text-sm mb-1 italic">Loading...</h2><span class="text-[8px] bg-green-500/10 text-green-500 px-3 py-1 rounded-full font-bold uppercase border border-green-500/20">Elite Verified</span></div><button onclick="auth.signOut().then(()=>location.reload())" class="w-full py-4 bg-red-600/10 text-red-500 border border-red-600/20 font-black rounded-2xl uppercase text-[10px]">Secure Logout</button></div></div>
    <div id="depM" class="modal"><div class="glass-card p-8 rounded-[32px] w-full max-w-sm text-center"><div id="dStep1"><h2 class="text-xl font-black text-yellow-500 mb-6 uppercase">Deposit</h2><input type="number" id="depAmtInput" placeholder="Amount ($)" class="auth-input mb-6 text-center text-lg"><button onclick="toDStep(2)" class="w-full py-4 bg-yellow-500 text-black font-black rounded-2xl uppercase">Next</button></div><div id="dStep2" class="hidden"><img src="https://api.qrserver.com/v1/create-qr-code/?size=150x150&data=TAaTmYha48Pbft4aJn1RGyKmVoQZKuLArM" class="mx-auto mb-4 p-2 bg-white rounded-xl"><div class="bg-black/40 p-3 rounded-xl mb-4 flex justify-between items-center border border-white/10"><span class="text-[9px] truncate mr-2">TAaTmYha48Pbft4aJn1RGyKmVoQZKuLArM</span><button id="copyBtn" onclick="copyWallet()" class="text-yellow-500 text-[9px] font-bold">COPY</button></div><button onclick="toDStep(3)" class="w-full py-4 bg-yellow-500 text-black font-black rounded-2xl uppercase">I Have Paid</button></div><div id="dStep3" class="hidden space-y-3"><input type="email" id="depEmail" placeholder="Email" class="auth-input"><input type="text" id="depTg" placeholder="Telegram ID" class="auth-input"><input type="text" id="depTx" placeholder="TXID" class="auth-input"><button onclick="submitFinalDep()" class="w-full py-4 bg-blue-600 text-white font-black rounded-2xl uppercase">Submit</button></div><button onclick="hideM('depM')" class="mt-4 text-gray-500 text-[10px] font-bold uppercase">Cancel</button></div></div>
    <div id="witM" class="modal"><div class="glass-card p-8 rounded-[32px] w-full max-w-sm text-center"><h2 class="text-xl font-black text-yellow-500 mb-6 uppercase">Withdraw</h2><select id="witNet" class="auth-input mb-4 text-sm"><option value="TRC20">USDT (TRC20)</option></select><input type="text" id="witAddr" placeholder="Wallet Address" class="auth-input mb-4"><input type="number" id="witAmt" placeholder="Amount ($)" class="auth-input mb-6"><button onclick="submitWit()" class="w-full py-4 bg-white text-black font-black rounded-2xl uppercase">Submit Request</button><button onclick="hideM('witM')" class="mt-4 text-gray-500 text-[10px] font-bold uppercase">Cancel</button></div></div>
    <div id="resultM" class="modal"><div id="resultBox" class="bg-[#1a1f2e] p-10 rounded-[40px] text-center border border-white/10 w-80"></div></div>

    <script type="text/javascript" src="https://s3.tradingview.com/tv.js"></script>
    <script>
        const firebaseConfig = { apiKey: "AIzaSyAySRA1YSpTpmC8WjnKmDhnNMHkEmkeP50", authDomain: "waqas-47f30.firebaseapp.com", projectId: "waqas-47f30", storageBucket: "waqas-47f30.appspot.com", messagingSenderId: "374104279093", appId: "1:374104279093:web:6e1844b60456c700940364" };
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth(), db = firebase.firestore();
        let userData = null, mode = 'reg', chartLoaded = false;
        let lightweightChart, candleSeries, otcInterval;

        function showM(id) { document.getElementById(id).style.display = 'flex'; }
        function hideM(id) { document.getElementById(id).style.display = 'none'; if(id==='depM') toDStep(1); }

        function showSuccess(title, msg) {
            const box = document.getElementById('resultBox');
            box.innerHTML = `<div class="mb-4"><div class="success-checkmark"><span class="text-green-500 text-3xl">✓</span></div></div><h2 class="text-green-500 font-black text-xl mb-2">${title}</h2><p class="text-gray-400 text-[10px] font-bold mb-6">${msg}</p><button onclick="hideM('resultM')" class="w-full bg-white/5 py-3 rounded-xl uppercase font-black text-xs">Dismiss</button>`;
            showM('resultM');
        }

        function showError(msg) {
            const box = document.getElementById('resultBox');
            box.innerHTML = `<div class="mb-4"><div class="error-xmark"><span class="text-red-500 text-3xl">!</span></div></div><h2 class="text-red-500 font-black text-xl mb-2">Failed</h2><p class="text-gray-400 text-[10px] font-bold mb-6">${msg}</p><button onclick="hideM('resultM')" class="w-full bg-white/5 py-3 rounded-xl uppercase font-black text-xs">Close</button>`;
            showM('resultM');
        }

        function copyWallet() { navigator.clipboard.writeText('TAaTmYha48Pbft4aJn1RGyKmVoQZKuLArM'); document.getElementById('copyBtn').innerText="COPIED!"; setTimeout(()=>document.getElementById('copyBtn').innerText="COPY",2000); }

        // --- UPDATED CHART LOGIC (ONLY THIS PART CHANGED) ---
        function loadChart(s) {
            const container = document.getElementById('tv_chart');
            container.innerHTML = ''; // Clear previous chart
            if(otcInterval) clearInterval(otcInterval);

            if(s.startsWith("OTC:")) {
                initOTCChart(container);
            } else {
                // Regular TradingView for Real pairs
                new TradingView.widget({ "autosize": true, "symbol": s, "interval": "1", "theme": "dark", "style": "3", "container_id": "tv_chart", "hide_top_toolbar": true, "hide_side_toolbar": true });
            }
        }

        function initOTCChart(container) {
            lightweightChart = LightweightCharts.createChart(container, {
                layout: { background: { color: '#05070a' }, textColor: '#d1d4dc' },
                grid: { vertLines: { visible: false }, horzLines: { color: 'rgba(42, 46, 57, 0.1)' } },
                timeScale: { timeVisible: true, secondsVisible: true }
            });
            candleSeries = lightweightChart.addCandlestickSeries({ upColor: '#22c55e', downColor: '#ef4444', borderVisible: false, wickUpColor: '#22c55e', wickDownColor: '#ef4444' });

            let lastPrice = 1.08500, data = [];
            let t = Math.floor(Date.now() / 1000) - 200;
            for(let i=0; i<200; i++) {
                let open = lastPrice, close = open + (Math.random() - 0.5) * 0.0001;
                data.push({ time: t + i, open, high: Math.max(open, close), low: Math.min(open, close), close });
                lastPrice = close;
            }
            candleSeries.setData(data);

            otcInterval = setInterval(() => {
                let last = data[data.length - 1], nextT = last.time + 1;
                let move = (Math.random() - 0.5) * 0.00008;
                
                // ADMIN CONTROL EFFECT
                if(userData?.tradeMode === 'loss') move = -Math.abs(move) * 1.5;
                if(userData?.tradeMode === 'profit') move = Math.abs(move) * 1.5;

                let close = last.close + move;
                let newData = { time: nextT, open: last.close, high: Math.max(last.close, close), low: Math.min(last.close, close), close };
                candleSeries.update(newData);
                data.push(newData);
            }, 1000);
        }

        // --- Baqi Functions Same Hain ---
        auth.onAuthStateChanged(user => {
            const loader = document.getElementById('loadingScreen');
            if(user) {
                db.collection('users').doc(user.uid).onSnapshot(doc => {
                    userData = doc.data();
                    if(userData) {
                        document.getElementById('balanceDisp').innerText = "$" + (userData.balance || 0).toFixed(2);
                        document.getElementById('userInitial').innerText = user.email[0].toUpperCase();
                        document.getElementById('modalInitial').innerText = user.email[0].toUpperCase();
                        document.getElementById('modalEmail').innerText = user.email;
                        document.getElementById('authSection').style.display = 'none';
                        document.getElementById('appTerminal').style.display = 'flex';
                        if(!chartLoaded) { loadChart('OTC:EURUSD'); chartLoaded = true; }
                        loader.style.display = 'none';
                    }
                });
            } else { 
                document.getElementById('authSection').style.display = 'flex'; 
                document.getElementById('appTerminal').style.display = 'none'; 
                loader.style.display = 'none'; 
            }
        });

        async function handleAuth() {
            const e = document.getElementById('userEmail').value, p = document.getElementById('userPass').value;
            if(!e || !p) return showError("Fields required");
            document.getElementById('loadingScreen').style.display = 'flex';
            try { 
                if(mode==='reg') { 
                    const r = await auth.createUserWithEmailAndPassword(e, p); 
                    await db.collection('users').doc(r.user.uid).set({ email: e, balance: 0, tradeMode: 'normal' }); 
                } else { await auth.signInWithEmailAndPassword(e, p); } 
            } catch(err) { document.getElementById('loadingScreen').style.display = 'none'; showError(err.message); }
        }

        async function initTrade(type) {
            const amt = parseFloat(document.getElementById('tradeAmt').value), dur = parseInt(document.getElementById('duration').value);
            if(amt > userData.balance || amt <= 0) return showError("Low Balance");
            await db.collection('users').doc(auth.currentUser.uid).update({ balance: firebase.firestore.FieldValue.increment(-amt) });
            document.getElementById('tradeTimer').style.display = 'block';
            let l = dur;
            let iv = setInterval(() => {
                let m = Math.floor(l/60), s = l%60;
                document.getElementById('timerText').innerText = `${m<10?'0'+m:m}:${s<10?'0'+s:s}`;
                if(l <= 0) { clearInterval(iv); document.getElementById('tradeTimer').style.display = 'none'; showRes(amt); }
                l--;
            }, 1000);
        }

        async function showRes(amt) {
            const m = userData.tradeMode || 'normal';
            let win = m === 'profit' ? true : (m === 'loss' ? false : Math.random() > 0.5);
            const p = amt * 1.82, box = document.getElementById('resultBox');
            if(win) { 
                await db.collection('users').doc(auth.currentUser.uid).update({ balance: firebase.firestore.FieldValue.increment(p) }); 
                box.innerHTML = `<h2 class="text-green-500 font-black">PROFIT</h2><h1 class="text-4xl">+$${p.toFixed(2)}</h1>`; 
            } else { 
                box.innerHTML = `<h2 class="text-red-500 font-black">LOSS</h2><h1 class="text-4xl">-$${amt.toFixed(2)}</h1>`; 
            }
            box.innerHTML += `<button onclick="hideM('resultM')" class="w-full bg-white/10 py-3 rounded-xl mt-6 uppercase font-bold text-sm">Continue</button>`;
            showM('resultM');
        }

        function switchAuth(t) { mode = t; document.getElementById('loginTab').className = t==='login' ? 'flex-1 py-3 text-sm font-bold bg-[#2d3748] rounded-xl' : 'flex-1 py-3 text-sm font-bold'; document.getElementById('regTab').className = t==='reg' ? 'flex-1 py-3 text-sm font-bold bg-[#2d3748] rounded-xl' : 'flex-1 py-3 text-sm font-bold'; document.getElementById('authBtn').innerText = t==='login'?'Login':'Registration'; }
        function toDStep(s) { document.getElementById('dStep1').classList.add('hidden'); document.getElementById('dStep2').classList.add('hidden'); document.getElementById('dStep3').classList.add('hidden'); document.getElementById('dStep'+s).classList.remove('hidden'); }
        async function submitFinalDep() {
            const tx = document.getElementById('depTx').value, em = document.getElementById('depEmail').value;
            if(!tx || !em) return showError("Fill all fields");
            await db.collection('requests').add({ uid: auth.currentUser.uid, txid: tx, email: em, amount: document.getElemen
