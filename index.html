<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Dubai Live Trade | Elite Terminal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-firestore-compat.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap');
        body { background: #05070a; color: #e2e8f0; font-family: 'Plus Jakarta Sans', sans-serif; overflow-x: hidden; min-height: 100dvh; margin: 0; }
        .glass-card { background: rgba(17, 24, 39, 0.8); backdrop-filter: blur(12px); border: 1px solid rgba(255,255,255,0.05); }
        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.95); z-index: 1000; align-items: center; justify-content: center; padding: 20px; }
        .auth-input { background: #1a1f29; border: 1px solid #2d3748; padding: 14px; border-radius: 12px; width: 100%; color: white; outline: none; }
        #appTerminal { display: none; height: 100dvh; flex-direction: column; padding: 10px; }
        .timer-badge { position: absolute; bottom: 20px; right: 20px; background: #eab308; color: black; padding: 10px 20px; border-radius: 50px; font-weight: 800; display: none; z-index: 100; box-shadow: 0 0 15px rgba(234,179,8,0.4); }
        .btn-grad-green { background: linear-gradient(135deg, #22c55e 0%, #15803d 100%); }
        .btn-grad-red { background: linear-gradient(135deg, #ef4444 0%, #b91c1c 100%); }
        
        /* Member Hub Styles from attach.html */
        .glass { background: rgba(15, 23, 42, 0.8); backdrop-filter: blur(16px); border: 1px solid rgba(255,255,255,0.05); }
        .history-card { background: #0a0f1d; border-radius: 12px; padding: 10px; margin-bottom: 8px; border: 1px solid rgba(255,255,255,0.03); display: flex; justify-content: space-between; align-items: center; }
        .status-badge { padding: 2px 8px; border-radius: 50px; font-size: 8px; font-weight: 800; text-transform: uppercase; }
        .pending { background: rgba(234, 179, 8, 0.1); color: #eab308; }
        .success { background: rgba(34, 197, 94, 0.1); color: #22c55e; }
        .failed { background: rgba(239, 68, 68, 0.1); color: #ef4444; }
        .option-card { background: rgba(255,255,255,0.02); border: 1px solid rgba(255,255,255,0.08); padding: 12px; border-radius: 12px; cursor: pointer; transition: 0.2s; margin-bottom: 8px; }
        .btn-small { padding: 12px; border-radius: 10px; font-size: 10px; font-weight: 800; text-transform: uppercase; letter-spacing: 0.5px; }
        #fancyToast { display: none; position: fixed; top: 20px; left: 50%; transform: translateX(-50%); z-index: 2000; padding: 15px 25px; border-radius: 20px; text-align: center; border: 1px solid; width: 80%; max-width: 300px; }
    </style>
</head>
<body>

    <div id="fancyToast" class="glass">
        <div id="toastIcon" class="text-2xl mb-1"></div>
        <div id="toastMsg" class="text-xs font-black uppercase tracking-widest text-white"></div>
    </div>

    <div id="authSection" class="h-full flex items-center justify-center p-4">
        <div class="glass-card w-full max-w-sm p-8 rounded-[32px]">
            <h1 class="text-3xl font-black text-center mb-8 uppercase italic tracking-tighter">Dubai Live</h1>
            <div class="flex bg-black/40 p-1.5 rounded-2xl mb-8">
                <button onclick="switchAuth('login')" id="loginTab" class="flex-1 py-3 text-sm font-bold">Login</button>
                <button onclick="switchAuth('reg')" id="regTab" class="flex-1 py-3 text-sm font-bold bg-[#2d3748] rounded-xl shadow-lg">Registration</button>
            </div>
            <div class="space-y-4">
                <input type="email" id="userEmail" placeholder="Email" class="auth-input">
                <input type="password" id="userPass" placeholder="Password" class="auth-input">
                <button onclick="handleAuth()" id="authBtn" class="w-full py-4 bg-blue-600 text-white font-black rounded-2xl text-sm uppercase">Registration</button>
            </div>
        </div>
    </div>

    <div id="appTerminal">
        <header class="flex justify-between items-center mb-3 px-1">
            <div class="flex items-center gap-3">
                <div onclick="showM('settingsM')" id="userInitial" class="w-10 h-10 rounded-full bg-yellow-500 flex items-center justify-center text-black font-extrabold cursor-pointer border-2 border-yellow-500/20 shadow-lg">?</div>
                <div>
                    <p class="text-[9px] text-gray-500 font-bold uppercase tracking-widest">Real Balance</p>
                    <h1 id="balanceDisp" class="text-2xl font-black text-white">$0.00</h1>
                </div>
            </div>
            <div class="flex gap-2">
                <button onclick="showM('assetsM')" class="bg-yellow-500 text-black px-6 py-2 rounded-xl text-[10px] font-black uppercase">My Assets</button>
            </div>
        </header>

        <div class="px-1 mb-3">
            <select id="assetSelect" onchange="loadChart(this.value)" class="w-full bg-white/5 border border-white/10 rounded-2xl p-3 text-yellow-500 font-black text-xs outline-none">
                <optgroup label="CRYPTO (TOP)">
                    <option value="BINANCE:BTCUSDT">BTC/USDT</option>
                    <option value="BINANCE:ETHUSDT">ETH/USDT</option>
                </optgroup>
            </select>
        </div>

        <main class="relative flex-grow rounded-[32px] overflow-hidden border border-gray-800 bg-black mb-3">
            <div id="tv_chart" class="h-full w-full"></div>
            <div id="tradeTimer" class="timer-badge">⏱ <span id="timerText">00:00</span></div>
        </main>

        <footer class="glass-card p-4 rounded-[32px]">
            <div class="grid grid-cols-2 gap-4 mb-4">
                <div class="bg-black/40 px-5 py-3 rounded-2xl border border-white/5">
                    <span class="text-[9px] text-gray-500 font-bold uppercase block mb-1">Amount</span>
                    <input id="tradeAmt" type="number" value="100" class="bg-transparent outline-none font-black text-white text-lg w-full">
                </div>
                <div class="bg-black/40 px-5 py-3 rounded-2xl border border-white/5">
                    <span class="text-[9px] text-gray-500 font-bold uppercase block mb-1">Time</span>
                    <select id="duration" class="bg-transparent font-black text-white text-lg w-full outline-none">
                        <option value="5">5 Sec</option>
                        <option value="60">1 Min</option>
                    </select>
                </div>
            </div>
            <div class="grid grid-cols-2 gap-4">
                <button onclick="initTrade('UP')" class="btn-grad-green h-16 rounded-[24px] font-black text-white text-base uppercase">Call</button>
                <button onclick="initTrade('DOWN')" class="btn-grad-red h-16 rounded-[24px] font-black text-white text-base uppercase">Put</button>
            </div>
        </footer>
    </div>

    <div id="assetsM" class="modal">
        <div class="glass p-5 rounded-[30px] w-full max-w-sm h-[85vh] flex flex-col overflow-hidden relative">
            <div id="assetDashboard" class="flex-grow overflow-y-auto">
                <header class="flex justify-between items-center py-4 mb-6">
                    <div class="flex items-center gap-3">
                        <div class="w-10 h-10 rounded-xl bg-yellow-500 flex items-center justify-center text-xl">👤</div>
                        <div>
                            <p class="text-[8px] text-gray-500 font-bold uppercase mb-1">Total Balance</p>
                            <h2 id="assetBalanceDisp" class="text-xl font-black text-white">$0.00</h2>
                        </div>
                    </div>
                </header>

                <div class="grid grid-cols-2 gap-3 mb-3">
                    <button onclick="showM('depM')" class="btn-small bg-white text-black">Deposit</button>
                    <button onclick="showM('witM')" class="btn-small bg-red-600 text-white">Withdraw</button>
                </div>
                <button onclick="showM('histM')" class="w-full btn-small border border-white/10 bg-white/5 text-gray-400 mb-6">Transaction History</button>
            </div>
            <button onclick="hideM('assetsM')" class="w-full py-4 bg-white/5 text-[9px] font-bold text-gray-500 uppercase rounded-2xl mt-auto">Back to Terminal</button>
        </div>
    </div>

    <div id="depM" class="modal" style="z-index: 1100;">
        <div class="glass p-6 rounded-[25px] w-full max-w-xs">
            <div id="d0">
                <h2 class="text-[10px] font-black text-center mb-4 uppercase italic">Select Method</h2>
                <div onclick="selectDepMethod('crypto')" class="option-card text-center"><p class="text-white text-[11px] font-bold">Crypto (BEP20)</p></div>
                <div onclick="selectDepMethod('pkr')" class="option-card text-center"><p class="text-white text-[11px] font-bold">PKR (Local Bank)</p></div>
            </div>
            <div id="d1" class="hidden">
                <input type="number" id="dAmount" oninput="calcUsdDep()" placeholder="Enter Amount" class="auth-input mb-2 text-center">
                <p id="usdConvertDep" class="text-center text-[9px] text-yellow-500 font-bold mb-4 hidden"></p>
                <button onclick="toStepDep(2)" class="w-full btn-small bg-yellow-500 text-black">Next Step</button>
            </div>
            <div id="d2" class="hidden text-center">
                <img id="depQR" src="" class="mx-auto mb-3 rounded-lg w-36 h-36 object-contain bg-white p-2">
                <button onclick="toStepDep(3)" class="w-full btn-small bg-yellow-500 text-black">I Have Paid</button>
            </div>
            <div id="d3" class="hidden space-y-3">
                <input type="text" id="dName" placeholder="Account Name" class="auth-input">
                <input type="text" id="dTxid" placeholder="Transaction ID" class="auth-input">
                <button onclick="submitDep()" class="w-full btn-small bg-green-600 text-white">Submit Request</button>
            </div>
            <button onclick="hideM('depM')" class="w-full mt-4 text-[9px] font-bold text-gray-600 uppercase text-center">Back</button>
        </div>
    </div>

    <div id="witM" class="modal" style="z-index: 1100;">
        <div class="glass p-6 rounded-[25px] w-full max-w-xs">
            <div id="w0" class="space-y-2">
                <h2 class="text-[10px] font-black text-center mb-4 uppercase italic">Withdraw Method</h2>
                <div onclick="selectWitMethod('crypto')" class="option-card text-center"><p class="text-white text-[11px] font-bold">Crypto Wallet</p></div>
                <div onclick="selectWitMethod('pkr')" class="option-card text-center"><p class="text-white text-[11px] font-bold">PKR Bank/JazzCash</p></div>
            </div>
            <div id="wC" class="hidden space-y-3">
                <input type="text" id="wcWallet" placeholder="Wallet Address" class="auth-input">
                <input type="number" id="wcAmt" placeholder="Amount ($)" class="auth-input">
                <button onclick="submitWitCrypto()" class="w-full btn-small bg-white text-black">Confirm</button>
            </div>
            <div id="wP" class="hidden space-y-3">
                <input type="text" id="wAccNum" placeholder="Account Number" class="auth-input">
                <input type="number" id="wAmt" placeholder="Amount (PKR)" class="auth-input">
                <button onclick="submitWitPkr()" class="w-full btn-small bg-white text-black">Confirm</button>
            </div>
            <button onclick="hideM('witM')" class="w-full mt-4 text-[9px] font-bold text-gray-600 uppercase text-center">Back</button>
        </div>
    </div>

    <div id="histM" class="modal" style="z-index: 1100;">
        <div class="glass p-5 rounded-[25px] w-full max-w-sm h-[70vh] flex flex-col">
            <h2 class="text-[10px] font-black text-center mb-4 uppercase italic text-gray-400">Activity Logs</h2>
            <div class="flex gap-2 mb-4">
                <button onclick="loadHistory('requests')" class="flex-1 py-2 bg-green-500/10 text-green-500 rounded-lg text-[8px] font-black uppercase">Deposits</button>
                <button onclick="loadHistory('withdrawals')" class="flex-1 py-2 bg-red-500/10 text-red-500 rounded-lg text-[8px] font-black uppercase">Withdraws</button>
            </div>
            <div id="historyList" class="flex-grow overflow-y-auto pr-1 text-[9px]"></div>
            <button onclick="hideM('histM')" class="w-full mt-4 py-3 border border-white/10 text-[9px] font-bold text-gray-500 uppercase rounded-xl">Back</button>
        </div>
    </div>

    <div id="settingsM" class="modal">
        <div class="glass-card p-8 rounded-[32px] w-full max-w-sm">
            <h2 class="text-xl font-black text-yellow-500 mb-6 uppercase">Settings</h2>
            <p id="sEmailDisp" class="text-xs text-gray-400 mb-6 text-center"></p>
            <button onclick="auth.signOut().then(()=>location.reload())" class="w-full py-4 bg-red-600/20 text-red-500 border border-red-600/30 font-black rounded-2xl uppercase">Logout</button>
            <button onclick="hideM('settingsM')" class="w-full mt-4 text-center text-gray-500 text-[10px] font-bold uppercase">Back</button>
        </div>
    </div>

    <div id="resultM" class="modal"><div id="resultBox" class="bg-[#1a1f2e] p-10 rounded-[40px] text-center border border-white/10 w-80"></div></div>

    <script type="text/javascript" src="https://s3.tradingview.com/tv.js"></script>
    <script>
        const firebaseConfig = { apiKey: "AIzaSyAySRA1YSpTpmC8WjnKmDhnNMHkEmkeP50", authDomain: "waqas-47f30.firebaseapp.com", projectId: "waqas-47f30", storageBucket: "waqas-47f30.appspot.com", messagingSenderId: "374104279093", appId: "1:374104279093:web:6e1844b60456c700940364" };
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth(), db = firebase.firestore();
        let userData = null, mode = 'reg', chartWidget = null, currentDepMethod = '', userBalance = 0;

        function showToast(msg, icon, color) { 
            const t = document.getElementById('fancyToast'); 
            document.getElementById('toastMsg').innerText = msg; 
            document.getElementById('toastIcon').innerText = icon; 
            t.style.borderColor = color; 
            t.style.display = 'block'; 
            setTimeout(() => t.style.display = 'none', 3000); 
        }

        function switchAuth(t) {
            mode = t;
            document.getElementById('loginTab').className = t==='login' ? 'flex-1 py-3 text-sm font-bold bg-[#2d3748] rounded-xl' : 'flex-1 py-3 text-sm font-bold';
            document.getElementById('regTab').className = t==='reg' ? 'flex-1 py-3 text-sm font-bold bg-[#2d3748] rounded-xl' : 'flex-1 py-3 text-sm font-bold';
            document.getElementById('authBtn').innerText = t==='login' ? 'Login' : 'Registration';
        }

        async function handleAuth() {
            const e = document.getElementById('userEmail').value, p = document.getElementById('userPass').value;
            try {
                if(mode==='reg') {
                    const r = await auth.createUserWithEmailAndPassword(e, p);
                    await db.collection('users').doc(r.user.uid).set({ email: e, balance: 0 });
                } else { await auth.signInWithEmailAndPassword(e, p); }
            } catch(err) { alert(err.message); }
        }

        auth.onAuthStateChanged(user => {
            if(user) {
                db.collection('users').doc(user.uid).onSnapshot(doc => {
                    userData = doc.data();
                    userBalance = userData.balance || 0;
                    document.getElementById('balanceDisp').innerText = "$" + userBalance.toFixed(2);
                    document.getElementById('assetBalanceDisp').innerText = "$" + userBalance.toFixed(2);
                    document.getElementById('userInitial').innerText = user.email[0].toUpperCase();
                    document.getElementById('sEmailDisp').innerText = user.email;
                    document.getElementById('authSection').style.display = 'none';
                    document.getElementById('appTerminal').style.display = 'flex';
                    if(!chartWidget) loadChart('BINANCE:BTCUSDT');
                });
            } else {
                document.getElementById('authSection').style.display = 'flex';
                document.getElementById('appTerminal').style.display = 'none';
            }
        });

        function loadChart(s) { chartWidget = new TradingView.widget({ "autosize": true, "symbol": s, "interval": "1", "theme": "dark", "container_id": "tv_chart", "hide_top_toolbar": true }); }
        function showM(id) { document.getElementById(id).style.display = 'flex'; }
        function hideM(id) { document.getElementById(id).style.display = 'none'; }

        // --- Member Hub Functions (from attach.html) ---
        function selectDepMethod(m) {
            currentDepMethod = m;
            document.getElementById('depQR').src = m === 'crypto' ? "https://api.qrserver.com/v1/create-qr-code/?size=180x180&data=0x76ecfe8a3bd89297189e16cdcd275d743fb71a62" : "https://i.postimg.cc/HLPQpW92/Screenshot-20260504-033311.jpg";
            toStepDep(1);
        }
        function toStepDep(s) {
            ['d0','d1','d2','d3'].forEach(d => document.getElementById(d).classList.add('hidden'));
            document.getElementById('d'+s).classList.remove('hidden');
        }
        function calcUsdDep() { if(currentDepMethod === 'pkr') { const usd = (document.getElementById('dAmount').value / 280).toFixed(2); document.getElementById('usdConvertDep').innerText = `Approx: $${usd}`; document.getElementById('usdConvertDep').classList.remove('hidden'); } }
        
        async function submitDep() {
            const tx = document.getElementById('dTxid').value;
            await db.collection('requests').add({ uid: auth.currentUser.uid, email: auth.currentUser.email, currency: currentDepMethod==='crypto'?'USD':'PKR', txid: tx, status: 'Pending', time: Date.now() });
            hideM('depM'); showToast("Submitted", "🚀", "#22c55e");
        }

        function selectWitMethod(m) { document.getElementById('w0').classList.add('hidden'); m === 'crypto' ? document.getElementById('wC').classList.remove('hidden') : document.getElementById('wP').classList.remove('hidden'); }

        async function submitWitCrypto() {
            const amt = parseFloat(document.getElementById('wcAmt').value);
            if(userBalance < amt) return showToast("Low Balance", "❌", "#ef4444");
            await db.collection('users').doc(auth.currentUser.uid).update({ balance: firebase.firestore.FieldValue.increment(-amt) });
            await db.collection('withdrawals').add({ uid: auth.currentUser.uid, amount: amt, currency: 'USD', status: 'Pending', time: Date.now() });
            hideM('witM'); showToast("Requested", "⏳", "#eab308");
        }

        async function initTrade(type) {
            const amt = parseFloat(document.getElementById('tradeAmt').value), dur = parseInt(document.getElementById('duration').value);
            if(amt > userBalance) return alert("Low Balance!");
            await db.collection('users').doc(auth.currentUser.uid).update({ balance: firebase.firestore.FieldValue.increment(-amt) });
            document.getElementById('tradeTimer').style.display = 'block';
            let l = dur;
            let iv = setIn
