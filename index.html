<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ProTrade Global | Elite Terminal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-firestore-compat.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap');
        body { background: #05070a; color: #e2e8f0; font-family: 'Plus Jakarta Sans', sans-serif; overflow: hidden; height: 100dvh; margin: 0; }
        .glass-card { background: rgba(17, 24, 39, 0.8); backdrop-filter: blur(12px); border: 1px solid rgba(255,255,255,0.05); }
        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.98); z-index: 1000; align-items: center; justify-content: center; padding: 15px; }
        .auth-input { background: #1a1f29; border: 1px solid #2d3748; padding: 14px; border-radius: 12px; width: 100%; color: white; outline: none; font-size: 14px; }
        #appTerminal { display: none; height: 100dvh; flex-direction: column; padding: 8px; }
        #authSection { display: none; }
        .timer-badge { position: absolute; bottom: 10px; right: 10px; background: #eab308; color: black; padding: 5px 15px; border-radius: 50px; font-weight: 800; display: none; z-index: 100; font-size: 12px; }
        .btn-grad-green { background: linear-gradient(135deg, #22c55e 0%, #15803d 100%); }
        .btn-grad-red { background: linear-gradient(135deg, #ef4444 0%, #b91c1c 100%); }
        #loadingScreen { position: fixed; inset: 0; background: #05070a; z-index: 9999; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .loader-spin { width: 35px; height: 35px; border: 3px solid #1a1f29; border-top: 3px solid #eab308; border-radius: 50%; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        
        /* Assets Styles */
        #assetsPanel { display: none; position: fixed; inset: 0; background: #020408; z-index: 500; overflow-y: auto; padding: 16px; }
        .history-card { background: #0a0f1d; border-radius: 12px; padding: 12px; margin-bottom: 8px; border: 1px solid rgba(255,255,255,0.03); display: flex; justify-content: space-between; align-items: center; }
        .status-badge { padding: 2px 8px; border-radius: 50px; font-size: 8px; font-weight: 800; text-transform: uppercase; }
        .pending { background: rgba(234, 179, 8, 0.1); color: #eab308; }
        .success { background: rgba(34, 197, 94, 0.1); color: #22c55e; }
        .option-card { background: rgba(255,255,255,0.02); border: 1px solid rgba(255,255,255,0.08); padding: 15px; border-radius: 12px; cursor: pointer; transition: 0.2s; margin-bottom: 10px; }
    </style>
</head>
<body>

    <div id="loadingScreen">
        <div class="loader-spin"></div>
        <p class="mt-3 text-[9px] font-bold text-yellow-500 uppercase tracking-widest">Securing Connection...</p>
    </div>

    <div id="authSection" class="h-full flex items-center justify-center p-4">
        <div class="glass-card w-full max-w-sm p-8 rounded-[32px]">
            <h1 class="text-3xl font-black text-center mb-8 uppercase italic tracking-tighter">ProTrade</h1>
            <div class="flex bg-black/40 p-1.5 rounded-2xl mb-8">
                <button onclick="switchAuth('login')" id="loginTab" class="flex-1 py-3 text-sm font-bold bg-[#2d3748] rounded-xl">Login</button>
                <button onclick="switchAuth('reg')" id="regTab" class="flex-1 py-3 text-sm font-bold">Registration</button>
            </div>
            <input type="email" id="userEmail" placeholder="Email Address" class="auth-input mb-4">
            <input type="password" id="userPass" placeholder="Password" class="auth-input mb-6">
            <button onclick="handleAuth()" id="authBtn" class="w-full py-4 bg-blue-600 text-white font-black rounded-2xl uppercase shadow-xl">Login Account</button>
        </div>
    </div>

    <div id="appTerminal">
        <header class="flex justify-between items-center mb-2 px-1">
            <div class="flex items-center gap-2">
                <div onclick="showM('profileM')" id="userInitial" class="w-8 h-8 rounded-full bg-yellow-500 flex items-center justify-center text-black font-extrabold cursor-pointer text-xs shadow-lg shadow-yellow-500/20">?</div>
                <div>
                    <p class="text-[7px] text-gray-500 font-bold uppercase">Live Balance</p>
                    <h1 id="balanceDisp" class="text-lg font-black text-white leading-none">$0.00</h1>
                </div>
            </div>
            <button onclick="openAssets()" class="bg-white text-black px-4 py-2 rounded-lg text-[10px] font-black uppercase shadow-lg">My Assets</button>
        </header>

        <div class="mb-2">
            <select id="assetSelect" onchange="loadChart(this.value)" class="w-full bg-white/5 border border-white/10 rounded-xl p-2.5 text-yellow-500 font-bold text-[12px] outline-none">
                <optgroup label="POPULAR PAIRS">
                    <option value="FX:EURUSD">EUR/USD (OTC)</option>
                    <option value="FX:GBPUSD">GBP/USD (OTC)</option>
                    <option value="BINANCE:BTCUSDT">BTC/USDT</option>
                    <option value="BINANCE:ETHUSDT">ETH/USDT</option>
                    <option value="OANDA:XAUUSD">GOLD (XAU/USD)</option>
                </optgroup>
            </select>
        </div>

        <main class="relative flex-grow rounded-[24px] overflow-hidden bg-black mb-2 border border-white/5 shadow-inner">
            <div id="tv_chart" class="h-full w-full"></div>
            <div id="tradeTimer" class="timer-badge">⏱ <span id="timerText">00:00</span></div>
        </main>

        <footer class="glass-card p-4 rounded-[28px]">
            <div class="grid grid-cols-2 gap-3 mb-4">
                <div class="bg-black/40 p-2.5 rounded-xl border border-white/5">
                    <span class="text-[8px] text-gray-500 font-bold uppercase block ml-1 mb-1">Amount ($)</span>
                    <input id="tradeAmt" type="number" value="100" class="bg-transparent outline-none font-black text-white text-lg w-full px-1">
                </div>
                <div class="bg-black/40 p-2.5 rounded-xl border border-white/5">
                    <span class="text-[8px] text-gray-500 font-bold uppercase block ml-1 mb-1">Duration</span>
                    <select id="duration" class="bg-transparent font-black text-white text-lg w-full outline-none">
                        <option value="5">5 SEC</option>
                        <option value="60">1 MIN</option>
                        <option value="300">5 MIN</option>
                    </select>
                </div>
            </div>
            <div class="grid grid-cols-2 gap-4">
                <button onclick="initTrade('UP')" class="btn-grad-green h-14 rounded-2xl font-black text-white uppercase text-sm shadow-lg shadow-green-500/20">Call</button>
                <button onclick="initTrade('DOWN')" class="btn-grad-red h-14 rounded-2xl font-black text-white uppercase text-sm shadow-lg shadow-red-500/20">Put</button>
            </div>
        </footer>
    </div>

    <div id="assetsPanel">
        <header class="flex justify-between items-center py-6 mb-4">
            <div class="flex items-center gap-4">
                <div class="w-12 h-12 rounded-2xl bg-yellow-500 flex items-center justify-center text-2xl shadow-lg shadow-yellow-500/20">💰</div>
                <div>
                    <p class="text-[9px] text-gray-500 font-bold uppercase tracking-widest">Total Assets</p>
                    <h2 id="assetBalanceDisp" class="text-2xl font-black text-white">$0.00</h2>
                </div>
            </div>
            <button onclick="closeAssets()" class="w-10 h-10 rounded-full bg-white/5 flex items-center justify-center text-gray-400 font-bold">✕</button>
        </header>

        <div class="grid grid-cols-2 gap-4 mb-6">
            <button onclick="showM('depM')" class="py-4 bg-white text-black font-black rounded-2xl text-[11px] uppercase shadow-xl">Deposit</button>
            <button onclick="showM('witM')" class="py-4 bg-red-600 text-white font-black rounded-2xl text-[11px] uppercase shadow-xl shadow-red-600/10">Withdraw</button>
        </div>

        <h3 class="text-[10px] font-black text-gray-500 uppercase mb-4 tracking-widest ml-1">Recent Activity</h3>
        <div id="historyList" class="space-y-2">
            </div>
    </div>

    <div id="depM" class="modal">
        <div class="glass-card p-7 rounded-[30px] w-full max-w-xs text-center">
            <h2 class="text-white font-black text-sm mb-6 uppercase italic">Add Funds</h2>
            <div id="d0" class="space-y-3">
                <div onclick="selectDepMethod('crypto')" class="option-card bg-blue-600/10 border-blue-500/20">
                    <p class="text-white font-bold">CRYPTO (USDT BEP20)</p>
                    <p class="text-[8px] text-blue-400 font-bold mt-1">Instant Processing</p>
                </div>
                <div onclick="selectDepMethod('pkr')" class="option-card bg-green-600/10 border-green-500/20">
                    <p class="text-white font-bold">LOCAL PKR (BANK/JAZZCASH)</p>
                    <p class="text-[8px] text-green-400 font-bold mt-1">Min 2800 PKR</p>
                </div>
            </div>
            <div id="dStep" class="hidden space-y-4">
                <input type="number" id="dAmount" placeholder="Amount" class="auth-input text-center text-lg">
                <div id="qrArea" class="hidden">
                    <img id="depQR" src="" class="mx-auto w-40 h-40 bg-white p-2 rounded-xl mb-2">
                    <p id="cryptoAddr" class="text-[8px] text-gray-500 break-all px-4 mb-4">0x76ecfe8a3bd89297189e16cdcd275d743fb71a62</p>
                </div>
                <input type="text" id="dTxid" placeholder="Transaction ID (TXID)" class="auth-input">
                <button onclick="submitDep()" class="w-full py-4 bg-yellow-500 text-black font-black rounded-xl uppercase text-[11px]">Confirm Payment</button>
            </div>
            <button onclick="hideM('depM')" class="mt-6 text-gray-600 font-bold text-[10px] uppercase">Close Window</button>
        </div>
    </div>

    <div id="witM" class="modal">
        <div class="glass-card p-7 rounded-[30px] w-full max-w-xs">
            <h2 class="text-white font-black text-sm mb-6 text-center uppercase italic">Withdraw Funds</h2>
            <div class="space-y-4">
                <input type="text" id="wAcc" placeholder="Account/Wallet Number" class="auth-input">
                <input type="number" id="wAmt" placeholder="Amount" class="auth-input">
                <button onclick="submitWit()" class="w-full py-4 bg-white text-black font-black rounded-xl uppercase text-[11px]">Submit Request</button>
            </div>
            <button onclick="hideM('witM')" class="w-full mt-6 text-gray-600 font-bold text-[10px] uppercase text-center">Close</button>
        </div>
    </div>

    <div id="profileM" class="modal">
        <div class="glass-card p-8 rounded-[32px] w-full max-w-sm text-center">
            <div class="w-16 h-16 bg-yellow-500 rounded-full mx-auto mb-4 flex items-center justify-center text-3xl text-black font-black shadow-xl">👤</div>
            <p id="uEmail" class="text-white font-bold text-sm mb-8 opacity-60">Loading...</p>
            <button onclick="auth.signOut().then(()=>location.reload())" class="w-full py-4 bg-red-600/10 text-red-500 border border-red-600/20 font-black rounded-2xl uppercase text-[10px]">Logout Account</button>
            <button onclick="hideM('profileM')" class="mt-6 text-gray-500 uppercase font-bold text-[10px]">Back to Terminal</button>
        </div>
    </div>

    <div id="resultM" class="modal"><div id="resultBox" class="bg-[#0a0f1d] p-10 rounded-[40px] text-center w-80 border border-white/5 shadow-2xl"></div></div>

    <script type="text/javascript" src="https://s3.tradingview.com/tv.js"></script>
    <script>
        // Firebase Config
        const firebaseConfig = { apiKey: "AIzaSyAySRA1YSpTpmC8WjnKmDhnNMHkEmkeP50", authDomain: "waqas-47f30.firebaseapp.com", projectId: "waqas-47f30", storageBucket: "waqas-47f30.appspot.com", messagingSenderId: "374104279093", appId: "1:374104279093:web:6e1844b60456c700940364" };
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth(), db = firebase.firestore();
        
        let userData = null, mode = 'login', chartLoaded = false, currentDep = '';

        // FIX: Optimized Session Verification
        auth.onAuthStateChanged(user => {
            const loader = document.getElementById('loadingScreen');
            if(user) {
                // Loader immediately hide on auth detection
                document.getElementById('authSection').style.display = 'none';
                document.getElementById('appTerminal').style.display = 'flex';
                loader.style.display = 'none';

                db.collection('users').doc(user.uid).onSnapshot(doc => {
                    userData = doc.data() || { balance: 0 };
                    const bal = (userData.balance || 0).toFixed(2);
                    document.getElementById('balanceDisp').innerText = "$" + bal;
                    document.getElementById('assetBalanceDisp').innerText = "$" + bal;
                    document.getElementById('userInitial').innerText = user.email[0].toUpperCase();
                    document.getElementById('uEmail').innerText = user.email;
                    if(!chartLoaded) { loadChart('FX:EURUSD'); chartLoaded = true; loadHistory(); }
                });
            } else {
                loader.style.display = 'none';
                document.getElementById('authSection').style.display = 'flex';
                document.getElementById('appTerminal').style.display = 'none';
            }
        });

        async function handleAuth() {
            const e = document.getElementById('userEmail').value, p = document.getElementById('userPass').value;
            if(!e || !p) return alert("Please fill all fields");
            document.getElementById('loadingScreen').style.display = 'flex';
            try {
                if(mode==='reg') {
                    const r = await auth.createUserWithEmailAndPassword(e, p);
                    await db.collection('users').doc(r.user.uid).set({ email: e, balance: 0, tradeMode: 'normal' });
                } else { await auth.signInWithEmailAndPassword(e, p); }
            } catch(err) { alert(err.message); document.getElementById('loadingScreen').style.display = 'none'; }
        }

        // Trading Logic
        function loadChart(s) { new TradingView.widget({ "autosize": true, "symbol": s, "interval": "1", "theme": "dark", "container_id": "tv_chart", "hide_top_toolbar": true, "hide_side_toolbar": true }); }
        
        async function initTrade(type) {
            const amt = parseFloat(document.getElementById('tradeAmt').value), dur = parseInt(document.getElementById('duration').value);
            if(amt > userData.balance || amt <= 0) return alert("Insufficient Balance!");
            
            await db.collection('users').doc(auth.currentUser.uid).update({ balance: firebase.firestore.FieldValue.increment(-amt) });
            document.getElementById('tradeTimer').style.display = 'block';
            let l = dur;
            let iv = setInterval(() => {
                let m = Math.floor(l/60), s = l%60;
                document.getElementById('timerText').innerText = `${m<10?'0'+m:m}:${s<10?'0'+s:s}`;
                if(l <= 0) { clearInterval(iv); document.getElementById('tradeTimer').style.display = 'none'; showRes(amt); }
                l--;
            }, 1000);
        }

        function showRes(amt) {
            const m = userData.tradeMode || 'normal';
            let win = m === 'profit' ? true : (m === 'loss' ? false : Math.random() > 0.5);
            const p = amt * 1.82, box = document.getElementById('resultBox');
            if(win) { 
                db.collection('users').doc(auth.currentUser.uid).update({ balance: firebase.firestore.FieldValue.increment(p) });
                box.innerHTML = `<h2 class="text-green-500 font-black tracking-widest text-xs mb-2">RESULT: PROFIT</h2><h1 class="text-white text-5xl font-black">+$${p.toFixed(2)}</h1>`;
            } else {
                box.innerHTML = `<h2 class="text-red-500 font-black tracking-widest text-xs mb-2">RESULT: LOSS</h2><h1 class="text-white text-5xl font-black">-$${amt.toFixed(2)}</h1>`;
            }
            box.innerHTML += `<button onclick="hideM('resultM')" class="w-full bg-white/10 py-4 rounded-2xl mt-8 uppercase font-bold text-xs text-white">Back to Market</button>`;
            showM('resultM');
        }

        // Assets Logic
        function openAssets() { document.getElementById('assetsPanel').style.display = 'block'; }
        function closeAssets() { document.getElementById('assetsPanel').style.display = 'none'; }
        function showM(id) { document.getElementById(id).style.display = 'flex'; }
        function hideM(id) { document.getElementById(id).style.display = 'none'; }

        function selectDepMethod(m) {
            currentDep = m;
            document.getElementById('d0').classList.add('hidden');
            document.getElementById('dStep').classList.remove('hidden');
            if(m==='crypto') {
                document.getElementById('qrArea').classList.remove('hidden');
                document.getElementById('depQR').src = "https://api.qrserver.com/v1/create-qr-code/?size=180x180&data=0x76ecfe8a3bd89297189e16cdcd275d743fb71a62";
            } else {
                document.getElementById('qrArea').classList.remove('hidden');
                document.getElementById('depQR').src = "https://i.postimg.cc/HLPQpW92/Screenshot-20260504-033311.jpg";
            }
        }

        async function submitDep() {
            const amt = document.getElementById('dAmount').value, tx = document.getElementById('dTxid').value;
            if(!amt || !tx) return alert("Enter Amount and TXID");
            await db.collection('requests').add({ uid: auth.currentUser.uid, email: auth.currentUser.email, amount: parseFloat(amt), txid: tx, status: 'Pending', time: Date.now() });
            alert("Deposit request submitted!"); hideM('depM');
        }

        async function submitWit() {
            const amt = parseFloat(document.getElementById('wAmt').value), acc = document.getElementById('wAcc').value;
            if(amt > userData.balance || amt < 10) return alert("Min $10 & Max Balance limit");
            await db.collection('users').doc(auth.currentUser.uid).update({ balance: firebase.firestore.FieldValue.increment(-amt) });
            await db.collection('withdrawals').add({ uid: auth.currentUser.uid, amount: amt, account: acc, status: 'Pending', time: Date.now() });
            alert("Withdrawal request sent!"); hideM('witM');
        }

        function loadHistory() {
            const list = document.getElementById('historyList');
            db.collection('requests').where('uid', '==', auth.currentUser.uid).limit(10).onSnapshot(snap => {
                let h = '';
                snap.forEach(doc => {
                    const d = doc.data();
                    h += `<div class="history-card"><div><p class="text-white text-[10px] font-black uppercase">Deposit</p><p class="text-[7px] text-gray-500">${new Date(d.time).toLocaleString()}</p></div><div class="text-right">
