<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ProTrade Global | Elite Terminal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-firestore-compat.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap');
        body { background: #05070a; color: #e2e8f0; font-family: 'Plus Jakarta Sans', sans-serif; overflow: hidden; height: 100dvh; margin: 0; }
        .glass-card { background: rgba(17, 24, 39, 0.8); backdrop-filter: blur(12px); border: 1px solid rgba(255,255,255,0.05); }
        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.92); z-index: 1000; align-items: center; justify-content: center; padding: 20px; }
        .auth-input { background: #1a1f29; border: 1px solid #2d3748; padding: 14px; border-radius: 12px; width: 100%; color: white; outline: none; }
        #appTerminal { display: none; height: 100dvh; flex-direction: column; padding: 8px; }
        .timer-badge { position: absolute; bottom: 10px; right: 10px; background: #eab308; color: black; padding: 5px 15px; border-radius: 50px; font-weight: 800; display: none; z-index: 100; font-size: 12px; }
        .btn-grad-green { background: linear-gradient(135deg, #22c55e 0%, #15803d 100%); }
        .btn-grad-red { background: linear-gradient(135deg, #ef4444 0%, #b91c1c 100%); }
        
        /* Profile & Loader Styling */
        #loadingScreen { position: fixed; inset: 0; background: #05070a; z-index: 9999; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .loader-spin { width: 35px; height: 35px; border: 3px solid #1a1f29; border-top: 3px solid #eab308; border-radius: 50%; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        
        .profile-btn { width: 42px; height: 42px; border-radius: 50%; background: linear-gradient(135deg, #eab308 0%, #ca8a04 100%); border: 2px solid rgba(255,255,255,0.1); display: flex; align-items: center; justify-content: center; color: black; font-weight: 800; cursor: pointer; transition: 0.3s; box-shadow: 0 4px 15px rgba(234, 179, 8, 0.2); }
        .profile-btn:active { scale: 0.9; }
    </style>
</head>
<body>

    <div id="loadingScreen">
        <div class="loader-spin"></div>
        <p class="mt-3 text-[10px] font-bold text-yellow-500 uppercase tracking-[0.3em]">Authenticating...</p>
    </div>

    <div id="authSection" class="h-full flex items-center justify-center p-4">
        <div class="glass-card w-full max-w-sm p-8 rounded-[32px] border border-white/5">
            <h1 class="text-3xl font-black text-center mb-8 uppercase italic tracking-tighter">ProTrade</h1>
            <div class="flex bg-black/40 p-1.5 rounded-2xl mb-8">
                <button onclick="switchAuth('login')" id="loginTab" class="flex-1 py-3 text-sm font-bold">Login</button>
                <button onclick="switchAuth('reg')" id="regTab" class="flex-1 py-3 text-sm font-bold bg-[#2d3748] rounded-xl">Register</button>
            </div>
            <input type="email" id="userEmail" placeholder="Email" class="auth-input mb-4">
            <input type="password" id="userPass" placeholder="Password" class="auth-input mb-6">
            <button onclick="handleAuth()" id="authBtn" class="w-full py-4 bg-blue-600 text-white font-black rounded-2xl uppercase">Join Now</button>
        </div>
    </div>

    <div id="appTerminal">
        <header class="flex justify-between items-center mb-2 px-1">
            <div class="flex items-center gap-3">
                <div onclick="showM('settingsM')" id="userInitial" class="profile-btn text-sm">?</div>
                <div>
                    <p class="text-[7px] text-gray-500 font-bold uppercase tracking-widest">Available Balance</p>
                    <h1 id="balanceDisp" class="text-xl font-black text-white leading-none">$0.00</h1>
                </div>
            </div>
            <div class="flex gap-2">
                <button onclick="showM('depM')" class="bg-yellow-500 text-black px-4 py-2 rounded-xl text-[10px] font-black uppercase">Deposit</button>
                <button onclick="showM('witM')" class="bg-white/5 text-white px-4 py-2 rounded-xl text-[10px] font-black uppercase border border-white/10">Withdraw</button>
            </div>
        </header>

        <div class="mb-2">
            <select id="assetSelect" onchange="loadChart(this.value)" class="w-full bg-white/5 border border-white/10 rounded-xl p-3 text-yellow-500 font-bold text-[11px] outline-none">
                <optgroup label="POPULAR ASSETS">
                    <option value="FX:EURUSD">EUR/USD (98%)</option>
                    <option value="FX:GBPUSD">GBP/USD (95%)</option>
                    <option value="BINANCE:BTCUSDT">BTC/USDT (OTC)</option>
                    <option value="OANDA:XAUUSD">GOLD (XAU/USD)</option>
                </optgroup>
                <optgroup label="FOREX MAJOR">
                    <option value="FX:USDJPY">USD/JPY</option><option value="FX:AUDUSD">AUD/USD</option><option value="FX:USDCAD">USD/CAD</option>
                </optgroup>
                <optgroup label="STOCKS">
                    <option value="NASDAQ:TSLA">TESLA</option><option value="NASDAQ:AAPL">APPLE</option><option value="NASDAQ:NVDA">NVIDIA</option>
                </optgroup>
            </select>
        </div>

        <main class="relative flex-grow rounded-[28px] overflow-hidden bg-black mb-2 border border-white/5">
            <div id="tv_chart" class="h-full w-full"></div>
            <div id="tradeTimer" class="timer-badge">⏱ <span id="timerText">00:00</span></div>
        </main>

        <footer class="glass-card p-4 rounded-[32px] border-t border-white/5">
            <div class="grid grid-cols-2 gap-3 mb-4">
                <div class="bg-black/40 p-2.5 rounded-2xl border border-white/5">
                    <span class="text-[8px] text-gray-500 font-bold uppercase block ml-1 mb-1">Amount ($)</span>
                    <input id="tradeAmt" type="number" value="10" class="bg-transparent outline-none font-black text-white text-lg w-full px-1">
                </div>
                <div class="bg-black/40 p-2.5 rounded-2xl border border-white/5">
                    <span class="text-[8px] text-gray-500 font-bold uppercase block ml-1 mb-1">Duration</span>
                    <select id="duration" class="bg-transparent font-black text-white text-lg w-full outline-none">
                        <option value="5">5s</option><option value="30">30s</option><option value="60">1m</option>
                        <option value="300">5m</option><option value="900">15m</option>
                    </select>
                </div>
            </div>
            <div class="grid grid-cols-2 gap-4">
                <button onclick="initTrade('UP')" class="btn-grad-green h-14 rounded-2xl font-black text-white uppercase text-sm tracking-widest">Call</button>
                <button onclick="initTrade('DOWN')" class="btn-grad-red h-14 rounded-2xl font-black text-white uppercase text-sm tracking-widest">Put</button>
            </div>
        </footer>
    </div>

    <div id="settingsM" class="modal">
        <div class="glass-card p-8 rounded-[40px] w-full max-w-sm text-center border border-white/10 shadow-2xl">
            <div class="flex justify-between items-center mb-8">
                <span class="text-[9px] font-bold text-gray-500 uppercase tracking-widest">User Profile</span>
                <button onclick="hideM('settingsM')" class="text-gray-400 text-2xl">&times;</button>
            </div>
            
            <div class="w-20 h-20 bg-gradient-to-tr from-yellow-400 to-yellow-600 rounded-full flex items-center justify-center mx-auto text-3xl font-black text-black mb-4 shadow-xl border-4 border-white/5" id="modalInitial">?</div>
            
            <div class="mb-8">
                <h2 id="modalEmail" class="text-white font-bold text-base truncate mb-1">...</h2>
                <div class="flex items-center justify-center gap-2">
                    <span class="w-2 h-2 bg-green-500 rounded-full"></span>
                    <span class="text-[10px] text-green-500 font-black uppercase tracking-tighter">Verified Trader</span>
                </div>
            </div>

            <div class="bg-white/5 rounded-2xl p-4 mb-8 grid grid-cols-2 gap-4 text-left border border-white/5">
                <div>
                    <p class="text-[8px] text-gray-500 font-bold uppercase">Status</p>
                    <p class="text-xs text-white font-bold">VIP Active</p>
                </div>
                <div>
                    <p class="text-[8px] text-gray-500 font-bold uppercase">ID</p>
                    <p class="text-xs text-white font-bold">#662901</p>
                </div>
            </div>

            <button onclick="auth.signOut().then(()=>location.reload())" class="w-full py-4 bg-red-600/10 text-red-500 border border-red-600/20 font-black rounded-2xl uppercase text-[11px] tracking-widest hover:bg-red-600 hover:text-white transition">Sign Out</button>
        </div>
    </div>

    <div id="depM" class="modal">
        <div class="glass-card p-8 rounded-[32px] w-full max-w-sm text-center">
            <div id="dStep1">
                <h2 class="text-xl font-black text-yellow-500 mb-6 uppercase">Deposit PKR</h2>
                <input type="number" id="depAmtInput" placeholder="Amount (PKR)" class="auth-input mb-6 text-center text-lg">
                <button onclick="toDStep(2)" class="w-full py-4 bg-yellow-500 text-black font-black rounded-2xl uppercase">Next</button>
            </div>
            <div id="dStep2" class="hidden">
                <img src="https://i.postimg.cc/vTdBngYS/Screenshot-20260504-033311.jpg" class="mx-auto mb-4 p-2 bg-white rounded-xl w-48 h-48 object-contain shadow-lg">
                <p class="text-white font-bold mb-6 italic uppercase">Dubai Live Trade</p>
                <button onclick="toDStep(3)" class="w-full py-4 bg-yellow-500 text-black font-black rounded-2xl uppercase">I Have Paid</button>
            </div>
            <div id="dStep3" class="hidden space-y-3">
                <input type="text" id="depAccName" placeholder="Account Name" class="auth-input">
                <input type="number" id="depActualAmt" placeholder="Sent Amount (PKR)" class="auth-input">
                <input type="text" id="depTx" placeholder="TXID" class="auth-input">
                <button onclick="submitFinalDep()" class="w-full py-4 bg-blue-600 text-white font-black rounded-2xl uppercase">Submit</button>
            </div>
            <button onclick="hideM('depM')" class="mt-4 text-gray-500 text-[10px] font-bold uppercase">Cancel</button>
        </div>
    </div>

    <div id="witM" class="modal">
        <div class="glass-card p-8 rounded-[32px] w-full max-w-sm text-center">
            <h2 class="text-xl font-black text-yellow-500 mb-6 uppercase">Withdraw</h2>
            <div class="space-y-3">
                <select id="witBank" class="auth-input text-sm">
                    <option value="" disabled selected>Choose Method</option>
                    <option value="EasyPaisa">EasyPaisa</option><option value="JazzCash">JazzCash</option>
                    <option value="HBL">HBL Bank</option><option value="SadaPay">SadaPay</option>
                </select>
                <input type="text" id="witAccNum" placeholder="Account Number" class="auth-input">
                <input type="text" id="witAccName" placeholder="Account Holder Name" class="auth-input">
                <input type="number" id="witAmtPKR" placeholder="Amount (PKR)" class="auth-input">
                <button onclick="submitWit()" class="w-full py-4 bg-white text-black font-black rounded-2xl uppercase mt-4">Confirm Request</button>
            </div>
            <button onclick="hideM('witM')" class="mt-4 text-gray-500 text-[10px] font-bold uppercase">Cancel</button>
        </div>
    </div>

    <div id="resultM" class="modal"><div id="resultBox" class="bg-[#1a1f2e] p-10 rounded-[40px] text-center border border-white/10 w-80 shadow-2xl"></div></div>

    <script type="text/javascript" src="https://s3.tradingview.com/tv.js"></script>
    <script>
        const firebaseConfig = { apiKey: "AIzaSyAySRA1YSpTpmC8WjnKmDhnNMHkEmkeP50", authDomain: "waqas-47f30.firebaseapp.com", projectId: "waqas-47f30", storageBucket: "waqas-47f30.appspot.com", messagingSenderId: "374104279093", appId: "1:374104279093:web:6e1844b60456c700940364" };
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth(), db = firebase.firestore();
        let userData = null, mode = 'reg', chartLoaded = false;
        const PKR_RATE = 280; // Exchange rate

        function showM(id) { document.getElementById(id).style.display = 'flex'; }
        function hideM(id) { document.getElementById(id).style.display = 'none'; if(id==='depM') toDStep(1); }
        function toDStep(s) { ['dStep1','dStep2','dStep3'].forEach(d => document.getElementById(d).classList.add('hidden')); document.getElementById('dStep'+s).classList.remove('hidden'); }

        // Loader fallback
        setTimeout(() => { if(!userData) document.getElementById('loadingScreen').style.display = 'none'; }, 6000);

        auth.onAuthStateChanged(user => {
            if(user) {
                db.collection('users').doc(user.uid).onSnapshot(doc => {
                    userData = doc.data();
                    if(userData) {
                        document.getElementById('balanceDisp').innerText = "$" + (userData.balance || 0).toFixed(2);
                        const initial = user.email[0].toUpperCase();
                        document.getElementById('userInitial').innerText = initial;
                        document.getElementById('modalInitial').innerText = initial;
                        document.getElementById('modalEmail').innerText = user.email;
                        document.getElementById('authSection').style.display = 'none';
                        document.getElementById('appTerminal').style.display = 'flex';
                        if(!chartLoaded) { loadChart('FX:EURUSD'); chartLoaded = true; }
                        document.getElementById('loadingScreen').style.display = 'none';
                    }
                });
            } else {
                document.getElementById('authSection').style.display = 'flex';
                document.getElementById('appTerminal').style.display = 'none';
                document.getElementById('loadingScreen').style.display = 'none';
            }
        });

        async function submitFinalDep() {
            const acc = document.getElementById('depAccName').value, amt = document.getElementById('depActualAmt').value, tx = document.getElementById('depTx').value;
            if(!acc || !amt || !tx) return alert("All fields required");
            await db.collection('requests').add({ uid: auth.currentUser.uid, email: auth.currentUser.email, accountName: acc, amount: parseFloat(amt), txid: tx, time: Date.now() });
            hideM('depM'); alert("Submitted. Wait for approval.");
        }

        async function submitWit() {
            const b = document.getElementById('witBank').value, n = document.getElementById('witAccNum').value, nm = document.getElementById('witAccName').value, amtPkr = parseFloat(document.getElementById('witAmtPKR').value);
            if(!b || !n || !nm || !amtPkr) return alert("Fill all fields");
            const amtUsd = amtPkr / PKR_RATE;
            if(amtUsd > userData.balance) return alert("Short balance ($" + amtUsd.toFixed(2) + " needed)");
            await db.collection('users').doc(auth.currentUser.uid).update({ balance: firebase.firestore.FieldValue.increment(-amtUsd) });
            await db.collection('withdrawals').add({ uid: auth.currentUser.uid, email: auth.currentUser.email, bankName: b, accountNumber: n, accountName: nm, amount: amtPkr, time: Date.now() });
            hideM('witM'); alert("Withdrawal request sent.");
        }

        async function initTrade(type) {
            const amt = parseFloat(document.getElementById('tradeAmt').value), dur = parseInt(document.getElementById('duration').value);
            if(amt > userData.balance || amt <= 0) return alert("Low balance");
            await db.collection('users').doc(auth.currentUser.uid).update({ balance: firebase.firestore.FieldValue.increment(-amt) });
            document.getElementById('tradeTimer').style.display = 'block';
            let l = dur;
            let iv = setInterval(() => {
                let m = Math.floor(l/60), s = l%60;
                document.getElementById('timerText').innerText = `${m<10?'0'+m:m}:${s<10?'0'+s:s}`;
                if(l <= 0) { clearInterval(iv); document.getElementById('tradeTimer').style.display = 'none'; showRes(amt); }
                l--;
            }, 1000);
        }

        function showRes(amt) {
            const win = Math.random() > 0.5;
            const p = amt * 1.82, box = document.getElementById('resultBox');
            if(win) { 
                db.collection('users').doc(auth.currentUser.uid).update({ balance: firebase.firestore.FieldValue.increment(p) }); 
                box.innerHTML = `<h2 class="text-green-500 font-black tracking-widest">PROFIT</h2><h1 class="text-4xl">+$${p.toFixed(2)}</h1>`;
            } else { box.innerHTML = `<h2 class="text-red-500 font-black tracking-widest">LOSS</h2><h1 class="text-4xl">-$${amt.toFixed(2)}</h1>`; }
            box.innerHTML += `<button onclick="hideM('resultM')" class="w-full bg-white/10 py-3 rounded-xl mt-6 font-bold uppercase text-xs">Continue</button>`;
            showM('resultM');
        }

        function loadChart(s) { new TradingView.widget({ "autosize": true, "symbol": s, "interval": "1", "theme": "dark", "container_id": "tv_chart", "hide_top_toolbar": true, "hide_side_toolbar": true }); }
        async function handleAuth() {
            const e = document.getElementById('userEmail').value, p = document.getElementById('userPass').value;
            if(mode==='reg') { 
                const r = await auth.createUserWithEmailAndPassword(e, p); 
                await db.collection('users').doc(r.user.uid).set({ email: e, balance: 0 });
            } else { await auth.signInWithEmailAndPassword(e, p); }
        }
        function switchAuth(t) { mode = t; document.getElementById('loginTab').className = t==='login' ? 'flex-1 py-3 text-sm font-bold bg-[#2d3748] rounded-xl' : 'flex-1 py-3 text-sm font-bold'; document.getElementById('regTab').className = t==='reg' ? 'flex-1 py-3 text-sm font-bold bg-[#2d3748] rounded-xl' : 'flex-1 py-3 text-sm font-bold'; document.getElementById('authBtn').innerText = t==='login'?'Login':'Registration'; }
    </script>
</body>
</html>
