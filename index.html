<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ProTrade Global | Elite Terminal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-firestore-compat.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap');
        body { background: #05070a; color: #e2e8f0; font-family: 'Plus Jakarta Sans', sans-serif; overflow: hidden; height: 100dvh; margin: 0; }
        .glass-card { background: rgba(17, 24, 39, 0.8); backdrop-filter: blur(12px); border: 1px solid rgba(255,255,255,0.05); }
        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.94); z-index: 1000; align-items: center; justify-content: center; padding: 20px; }
        .auth-input { background: #1a1f29; border: 1px solid #2d3748; padding: 14px; border-radius: 12px; width: 100%; color: white; outline: none; }
        #appTerminal { display: none; height: 100dvh; flex-direction: column; padding: 8px; }
        
        .profile-trigger { width: 44px; height: 44px; background: linear-gradient(135deg, #facc15 0%, #ca8a04 100%); border-radius: 15px; display: flex; align-items: center; justify-content: center; color: #000; font-weight: 800; cursor: pointer; box-shadow: 0 8px 20px -6px rgba(234, 179, 8, 0.4); border: 2px solid rgba(255,255,255,0.1); }
        .btn-grad-green { background: linear-gradient(135deg, #22c55e 0%, #15803d 100%); }
        .btn-grad-red { background: linear-gradient(135deg, #ef4444 0%, #b91c1c 100%); }
        .timer-badge { position: absolute; bottom: 10px; right: 10px; background: #eab308; color: black; padding: 5px 15px; border-radius: 50px; font-weight: 800; display: none; z-index: 100; font-size: 12px; }
    </style>
</head>
<body>

    <div id="appTerminal">
        <header class="flex justify-between items-center p-2 mb-2">
            <div class="flex items-center gap-3">
                <div onclick="showM('settingsM')" id="userInitial" class="profile-trigger">?</div>
                <div onclick="toggleCurrency()" class="cursor-pointer">
                    <p class="text-[7px] text-gray-500 font-bold uppercase tracking-widest">Balance (Tap to Switch)</p>
                    <h1 id="balanceDisp" class="text-xl font-black text-white">$0.00</h1>
                </div>
            </div>
            <div class="flex gap-2">
                <button onclick="showM('depM')" class="bg-yellow-500 text-black px-4 py-2.5 rounded-xl text-[10px] font-black uppercase">Deposit</button>
                <button onclick="showM('witM')" class="bg-white/5 text-white px-4 py-2.5 rounded-xl text-[10px] font-black uppercase border border-white/10">Withdraw</button>
            </div>
        </header>

        <main class="relative flex-grow rounded-[32px] overflow-hidden bg-black mb-2 border border-white/5">
            <div id="tv_chart" class="h-full w-full"></div>
            <div id="tradeTimer" class="timer-badge">⏱ <span id="timerText">00:00</span></div>
        </main>

        <footer class="glass-card p-4 rounded-[36px]">
            <div class="grid grid-cols-2 gap-3 mb-4">
                <div class="bg-black/40 p-3 rounded-2xl border border-white/5">
                    <span class="text-[8px] text-gray-500 font-bold uppercase block mb-1">Amount ($)</span>
                    <input id="tradeAmt" type="number" value="10" class="bg-transparent outline-none font-black text-white text-lg w-full">
                </div>
                <div class="bg-black/40 p-3 rounded-2xl border border-white/5">
                    <span class="text-[8px] text-gray-500 font-bold uppercase block mb-1">Duration</span>
                    <select id="duration" class="bg-transparent font-black text-white text-lg w-full outline-none">
                        <option value="5">5s</option><option value="30">30s</option><option value="60">1m</option>
                        <option value="300">5m</option><option value="600">10m</option><option value="900">15m</option>
                    </select>
                </div>
            </div>
            <div class="grid grid-cols-2 gap-4">
                <button onclick="initTrade('UP')" class="btn-grad-green h-14 rounded-2xl font-black text-white uppercase text-sm">Call</button>
                <button onclick="initTrade('DOWN')" class="btn-grad-red h-14 rounded-2xl font-black text-white uppercase text-sm">Put</button>
            </div>
        </footer>
    </div>

    <div id="settingsM" class="modal">
        <div class="glass-card p-8 rounded-[40px] w-full max-w-sm text-center border border-white/10 shadow-2xl">
            <div class="w-20 h-20 bg-gradient-to-tr from-yellow-400 to-yellow-600 rounded-2xl flex items-center justify-center mx-auto mb-6 shadow-2xl rotate-3">
                <span id="modalInitial" class="text-3xl font-black text-black -rotate-3">?</span>
            </div>
            <h2 id="modalEmail" class="text-white font-black text-base mb-2">User Account</h2>
            <div class="flex justify-center mb-6"><span class="bg-green-500/10 text-green-500 text-[9px] px-3 py-1 rounded-full border border-green-500/20 font-black uppercase">● Verified Elite</span></div>
            <button onclick="auth.signOut().then(()=>location.reload())" class="w-full py-4 bg-red-600/10 text-red-500 border border-red-600/20 font-black rounded-2xl uppercase text-[10px] tracking-widest active:scale-95 transition">Logout Account</button>
        </div>
    </div>

    <script type="text/javascript" src="https://s3.tradingview.com/tv.js"></script>
    <script>
        const firebaseConfig = { apiKey: "AIzaSyAySRA1YSpTpmC8WjnKmDhnNMHkEmkeP50", authDomain: "waqas-47f30.firebaseapp.com", projectId: "waqas-47f30", storageBucket: "waqas-47f30.appspot.com", messagingSenderId: "374104279093", appId: "1:374104279093:web:6e1844b60456c700940364" };
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth(), db = firebase.firestore();
        let userData = null, isPkr = false;
        const PKR_RATE = 280;

        function toggleCurrency() {
            isPkr = !isPkr;
            updateBalanceDisplay();
        }

        function updateBalanceDisplay() {
            if(!userData) return;
            const bal = userData.balance || 0;
            if(isPkr) {
                document.getElementById('balanceDisp').innerText = "Rs " + (bal * PKR_RATE).toLocaleString();
            } else {
                document.getElementById('balanceDisp').innerText = "$" + bal.toFixed(2);
            }
        }

        auth.onAuthStateChanged(user => {
            if(user) {
                db.collection('users').doc(user.uid).onSnapshot(doc => {
                    userData = doc.data();
                    updateBalanceDisplay();
                    document.getElementById('userInitial').innerText = user.email[0].toUpperCase();
                    document.getElementById('modalInitial').innerText = user.email[0].toUpperCase();
                    document.getElementById('modalEmail').innerText = user.email;
                    document.getElementById('appTerminal').style.display = 'flex';
                    new TradingView.widget({ "autosize": true, "symbol": "FX:EURUSD", "interval": "1", "theme": "dark", "container_id": "tv_chart", "hide_top_toolbar": true });
                });
            } else { document.getElementById('appTerminal').style.display = 'none'; }
        });

        // Other functions (initTrade, submitWit etc.) same as previous correct version.
    </script>
</body>
</html>
