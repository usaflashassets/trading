<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ProTrade Global | Elite Terminal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-firestore-compat.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap');
        body { background: #020408; color: #e2e8f0; font-family: 'Plus Jakarta Sans', sans-serif; margin: 0; height: 100dvh; overflow: hidden; }
        .glass { background: rgba(15, 23, 42, 0.8); backdrop-filter: blur(16px); border: 1px solid rgba(255,255,255,0.05); }
        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.96); z-index: 1000; align-items: center; justify-content: center; padding: 20px; }
        .auth-input { background: #0a0f1d; border: 1px solid rgba(255,255,255,0.05); padding: 14px; border-radius: 14px; width: 100%; color: white; outline: none; font-size: 14px; }
        #appTerminal { display: none; height: 100dvh; flex-direction: column; padding: 10px; }
        .timer-badge { position: absolute; bottom: 20px; right: 20px; background: #fbbf24; color: #000; padding: 6px 16px; border-radius: 50px; font-weight: 800; display: none; z-index: 100; font-size: 12px; }
        
        /* Assets Panel Animation */
        #assetsPanel { display: none; position: fixed; inset: 0; background: #020408; z-index: 500; overflow-y: auto; padding: 20px; animation: slideUp 0.3s ease-out; }
        @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }

        .history-card { background: rgba(255,255,255,0.02); border-radius: 16px; padding: 12px; margin-bottom: 10px; display: flex; justify-content: space-between; align-items: center; border: 1px solid rgba(255,255,255,0.03); }
        .status-badge { padding: 3px 10px; border-radius: 50px; font-size: 8px; font-weight: 800; text-transform: uppercase; }
        .pending { background: rgba(251, 191, 36, 0.1); color: #fbbf24; }
        .success { background: rgba(34, 197, 94, 0.1); color: #22c55e; }
        .option-card { background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.1); padding: 18px; border-radius: 20px; cursor: pointer; margin-bottom: 12px; transition: 0.2s; }
        .option-card:active { transform: scale(0.98); background: rgba(255,255,255,0.05); }

        #loadingScreen { position: fixed; inset: 0; background: #020408; z-index: 9999; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .loader-spin { width: 40px; height: 40px; border: 3px solid #1a1f29; border-top: 3px solid #fbbf24; border-radius: 50%; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

    <div id="loadingScreen">
        <div class="loader-spin"></div>
        <p class="mt-4 text-[10px] font-bold text-yellow-500 uppercase tracking-widest">Connecting to Server...</p>
    </div>

    <div id="authSection" class="hidden h-full flex items-center justify-center p-6">
        <div class="glass w-full max-w-sm p-8 rounded-[35px]">
            <h1 class="text-3xl font-black text-center mb-8 italic uppercase tracking-tighter">ProTrade</h1>
            <div class="flex bg-black/40 p-1 rounded-2xl mb-6">
                <button onclick="switchAuth('login')" id="loginTab" class="flex-1 py-3 text-xs font-bold bg-[#1e293b] rounded-xl transition-all">Login</button>
                <button onclick="switchAuth('reg')" id="regTab" class="flex-1 py-3 text-xs font-bold transition-all">Register</button>
            </div>
            <div class="space-y-4">
                <input type="email" id="userEmail" placeholder="Email Address" class="auth-input">
                <input type="password" id="userPass" placeholder="Password" class="auth-input">
                <button onclick="handleAuth()" id="authBtn" class="w-full py-4 bg-blue-600 text-white font-black rounded-2xl uppercase shadow-lg shadow-blue-600/20 mt-2">Login Account</button>
            </div>
        </div>
    </div>

    <div id="appTerminal">
        <header class="flex justify-between items-center mb-3">
            <div class="flex items-center gap-3">
                <div onclick="showM('profileM')" id="userInitial" class="w-10 h-10 rounded-full bg-yellow-500 flex items-center justify-center text-black font-black cursor-pointer shadow-lg">?</div>
                <div>
                    <p class="text-[7px] text-gray-500 font-bold uppercase tracking-wider">Trading Balance</p>
                    <h1 id="balanceDisp" class="text-xl font-black text-white">$0.00</h1>
                </div>
            </div>
            <button onclick="openAssets()" class="bg-white text-black px-5 py-2.5 rounded-xl text-[10px] font-black uppercase shadow-xl">Assets Hub</button>
        </header>

        <select id="assetSelect" onchange="loadChart(this.value)" class="w-full bg-white/5 border border-white/10 rounded-xl p-3 text-yellow-500 font-bold text-xs outline-none mb-3">
            <optgroup label="FOREX MAJOR">
                <option value="FX:EURUSD">EUR/USD (OTC)</option>
                <option value="FX:GBPUSD">GBP/USD (OTC)</option>
                <option value="FX:USDJPY">USD/JPY</option>
            </optgroup>
            <optgroup label="CRYPTO">
                <option value="BINANCE:BTCUSDT">BTC/USDT</option>
                <option value="BINANCE:ETHUSDT">ETH/USDT</option>
            </optgroup>
        </select>

        <main class="relative flex-grow rounded-[30px] overflow-hidden bg-black border border-white/5 mb-3 shadow-2xl">
            <div id="tv_chart" class="h-full w-full"></div>
            <div id="tradeTimer" class="timer-badge">⏱ <span id="timerText">00:00</span></div>
        </main>

        <footer class="glass p-5 rounded-[35px]">
            <div class="grid grid-cols-2 gap-4 mb-4">
                <div class="bg-black/50 p-2.5 rounded-2xl border border-white/5">
                    <span class="text-[8px] text-gray-500 font-bold uppercase block ml-1 mb-1">Trade Amount</span>
                    <input id="tradeAmt" type="number" value="100" class="bg-transparent outline-none font-black text-white text-lg w-full px-1">
                </div>
                <div class="bg-black/50 p-2.5 rounded-2xl border border-white/5">
                    <span class="text-[8px] text-gray-500 font-bold uppercase block ml-1 mb-1">Exp. Time</span>
                    <select id="duration" class="bg-transparent font-black text-white text-lg w-full outline-none">
                        <option value="5">5s</option><option value="15">15s</option><option value="60">1m</option><option value="300">5m</option>
                    </select>
                </div>
            </div>
            <div class="grid grid-cols-2 gap-4">
                <button onclick="initTrade('UP')" class="h-14 rounded-2xl font-black text-white uppercase text-sm bg-gradient-to-br from-green-400 to-green-700 shadow-lg shadow-green-500/20">Call</button>
                <button onclick="initTrade('DOWN')" class="h-14 rounded-2xl font-black text-white uppercase text-sm bg-gradient-to-br from-red-400 to-red-700 shadow-lg shadow-red-500/20">Put</button>
            </div>
        </footer>
    </div>

    <div id="assetsPanel">
        <header class="flex justify-between items-center py-6">
            <h2 class="text-xl font-black italic tracking-tighter text-white">MY ASSETS</h2>
            <button onclick="closeAssets()" class="w-10 h-10 rounded-full bg-white/5 flex items-center justify-center text-gray-400">✕</button>
        </header>

        <div class="glass p-8 rounded-[40px] mb-8 text-center">
            <p class="text-[10px] text-gray-500 font-bold uppercase tracking-widest mb-2">Total Equity</p>
            <h1 id="assetBalanceDisp" class="text-4xl font-black text-white">$0.00</h1>
            <div class="grid grid-cols-2 gap-4 mt-8">
                <button onclick="showM('depM')" class="py-4 bg-white text-black font-black rounded-2xl text-[10px] uppercase shadow-xl">Deposit</button>
                <button onclick="showM('witM')" class="py-4 bg-red-600 text-white font-black rounded-2xl text-[10px] uppercase shadow-xl">Withdraw</button>
            </div>
        </div>

        <div class="flex gap-6 mb-6 px-2">
            <button onclick="loadHistory('requests')" id="depTab" class="text-[11px] font-black uppercase text-yellow-500 border-b-2 border-yellow-500 pb-1">Deposits</button>
            <button onclick="loadHistory('withdrawals')" id="witTab" class="text-[11px] font-black uppercase text-gray-500 pb-1">Withdrawals</button>
        </div>
        <div id="historyList" class="space-y-2"></div>
    </div>

    <div id="depM" class="modal">
        <div class="glass p-8 rounded-[40px] w-full max-w-sm">
            <div id="d0">
                <h3 class="text-center font-black mb-8 uppercase text-sm tracking-widest text-white">Select Method</h3>
                <div onclick="selectDepMethod('crypto')" class="option-card">
                    <p class="font-black text-sm text-white">USDT (BEP20)</p>
                    <p class="text-[8px] text-blue-400 font-bold uppercase mt-1">Instant • Min $10</p>
                </div>
                <div onclick="selectDepMethod('pkr')" class="option-card">
                    <p class="font-black text-sm text-white">PKR LOCAL BANK</p>
                    <p class="text-[8px] text-green-400 font-bold uppercase mt-1">Manual • Min 2800 PKR</p>
                </div>
            </div>
            <div id="d1" class="hidden space-y-4">
                <div class="bg-black/40 p-4 rounded-2xl">
                    <span class="text-[8px] text-gray-500 font-bold block mb-2 uppercase">Amount to Send</span>
                    <input type="number" id="dAmount" oninput="calcPkr()" placeholder="0.00" class="bg-transparent outline-none font-black text-white text-2xl w-full">
                    <p id="pkrHint" class="text-[9px] text-yellow-500 font-bold mt-2 hidden"></p>
                </div>
                <div id="qrBox" class="hidden text-center bg-white p-4 rounded-[30px]">
                    <img id="depQR" src="" class="mx-auto w-44 h-44 rounded-xl">
                    <p id="cryptoAddr" class="text-[8px] text-gray-400 font-bold break-all mt-3 px-2 hidden">0x76ecfe8a3bd89297189e16cdcd275d743fb71a62</p>
                </div>
                <input type="text" id="dTxid" placeholder="Enter Transaction ID (TXID)" class="auth-input">
                <button onclick="submitDep()" class="w-full py-4 bg-yellow-500 text-black font-black rounded-2xl uppercase text-[11px]">I have paid</button>
            </div>
            <button onclick="hideM('depM')" class="w-full mt-6 text-[10px] text-gray-600 font-bold uppercase text-center">Cancel</button>
        </div>
    </div>

    <div id="witM" class="modal">
        <div class="glass p-8 rounded-[40px] w-full max-w-sm">
            <h3 class="text-center font-black mb-8 uppercase text-sm tracking-widest">Withdrawal</h3>
            <div class="space-y-4">
                <input type="text" id="wAcc" placeholder="Wallet / Bank Account Details" class="auth-input">
                <input type="number" id="wAmt" placeholder="Amount ($)" class="auth-input">
                <button onclick="submitWit()" class="w-full py-4 bg-white text-black font-black rounded-2xl uppercase text-[11px]">Submit Request</button>
            </div>
            <button onclick="hideM('witM')" class="w-full mt-6 text-[10px] text-gray-600 font-bold uppercase text-center">Cancel</button>
        </div>
    </div>

    <div id="profileM" class="modal">
        <div class="glass p-10 rounded-[45px] w-full max-w-sm text-center">
            <div class="w-20 h-20 bg-yellow-500 rounded-full mx-auto mb-6 flex items-center justify-center text-3xl text-black font-black shadow-xl">👤</div>
            <p id="uEmail" class="text-white font-bold text-sm mb-10 opacity-40">User</p>
            <button onclick="auth.signOut().then(()=>location.reload())" class="w-full py-4 bg-red-600/10 text-red-500 border border-red-600/10 font-black rounded-2xl uppercase text-[10px]">Logout</button>
            <button onclick="hideM('profileM')" class="mt-8 text-gray-500 uppercase font-bold text-[10px]">Back</button>
        </div>
    </div>

    <div id="resultM" class="modal"><div id="resultBox" class="glass p-12 rounded-[50px] text-center w-85"></div></div>

    <script type="text/javascript" src="https://s3.tradingview.com/tv.js"></script>
    <script>
        const firebaseConfig = { apiKey: "AIzaSyAySRA1YSpTpmC8WjnKmDhnNMHkEmkeP50", authDomain: "waqas-47f30.firebaseapp.com", projectId: "waqas-47f30", storageBucket: "waqas-47f30.appspot.com", messagingSenderId: "374104279093", appId: "1:374104279093:web:6e1844b60456c700940364" };
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth(), db = firebase.firestore();
        
        let userData = null, mode = 'login', chartLoaded = false, curDep = '';

        // FIX: THE VERIFYING SESSION FIX
        auth.onAuthStateChanged(user => {
            const loader = document.getElementById('loadingScreen');
            if(user) {
                // Force Hide Loader after 500ms regardless of data
                setTimeout(() => {
                    document.getElementById('authSection').style.display = 'none';
                    document.getElementById('appTerminal').style.display = 'flex';
                    loader.style.opacity = '0';
                    setTimeout(() => loader.style.display = 'none', 300);
                }, 500);

                db.collection('users').doc(user.uid).onSnapshot(doc => {
                    userData = doc.data() || { balance: 0 };
                    const b = (userData.balance || 0).toFixed(2);
                    document.getElementById('balanceDisp').innerText = "$" + b;
                    document.getElementById('assetBalanceDisp').innerText = "$" + b;
                    document.getElementById('userInitial').innerText = user.email[0].toUpperCase();
                    document.getElementById('uEmail').innerText = user.email;
                    if(!chartLoaded) { loadChart('FX:EURUSD'); chartLoaded = true; loadHistory('requests'); }
                });
            } else {
                loader.style.display = 'none';
                document.getElementById('authSection').style.display = 'flex';
                document.getElementById('appTerminal').style.display = 'none';
            }
        });

        async function handleAuth() {
            const e = document.getElementById('userEmail').value, p = document.getElementById('userPass').value;
            if(!e || !p) return alert("Fill fields");
            document.getElementById('loadingScreen').style.display = 'flex';
            try {
                if(mode==='reg') {
                    const r = await auth.createUserWithEmailAndPassword(e, p);
                    await db.collection('users').doc(r.user.uid).set({ email: e, balance: 0, tradeMode: 'normal' });
                } else { await auth.signInWithEmailAndPassword(e, p); }
            } catch(err) { alert(err.message); document.getElementById('loadingScreen').style.display = 'none'; }
        }

        function loadChart(s) { new TradingView.widget({ "autosize": true, "symbol": s, "interval": "1", "theme": "dark", "container_id": "tv_chart", "hide_top_toolbar": true, "hide_side_toolbar": true }); }
        
        async function initTrade(type) {
            const amt = parseFloat(document.getElementById('tradeAmt').value), dur = parseInt(document.getElementById('duration').value);
            if(amt > userData.balance || amt <= 0) return alert("Low Balance");
            await db.collection('users').doc(auth.currentUser.uid).update({ balance: firebase.firestore.FieldValue.increment(-amt) });
            document.getElementById('tradeTimer').style.display = 'block';
            let l = dur;
            let iv = setInterval(() => {
                let m = Math.floor(l/60), s = l%60;
                document.getElementById('timerText').innerText = `${m<10?'0'+m:m}:${s<10?'0'+s:s}`;
                if(l <= 0) { clearInterval(iv); document.getElementById('tradeTimer').style.display = 'none'; showRes(amt); }
                l--;
            }, 1000);
        }

        function showRes(amt) {
            const m = userData.tradeMode || 'normal';
            let win = m === 'profit' ? true : (m === 'loss' ? false : Math.random() > 0.5);
            const p = amt * 1.82, box = document.getElementById('resultBox');
            if(win) { 
                db.collection('users').doc(auth.currentUser.uid).update({ balance: firebase.firestore.FieldValue.increment(p) });
                box.innerHTML = `<h2 class="text-green-500 font-black mb-2 text-xs uppercase tracking-widest">Trade Profit</h2><h1 class="text-white text-5xl font-black">+$${p.toFixed(2)}</h1>`;
            } else {
                box.innerHTML = `<h2 class="text-red-500 font-black mb-2 text-xs uppercase tracking-widest">Trade Loss</h2><h1 class="text-white text-5xl font-black">-$${amt.toFixed(2)}</h1>`;
            }
            box.innerHTML += `<button onclick="hideM('resultM')" class="w-full bg-white/10 py-4 rounded-2xl mt-8 font-black text-xs uppercase">Continue</button>`;
            showM('resultM');
        }

        function openAssets() { document.getElementById('assetsPanel').style.display = 'block'; }
        function closeAssets() { document.getElementById('assetsPanel').style.display = 'none'; }
        function showM(id) { document.getElementById(id).style.display = 'flex'; }
        function hideM(id) { document.getElementById(id).style.display = 'none'; }

        // Asset Logic
        function selectDepMethod(m) {
            curDep = m;
            document.getElementById('d0').classList.add('hidden');
            document.getElementById('d1').classList.remove('hidden');
            document.getElementById('qrBox').classList.remove('hidden');
            if(m==='crypto') {
                document.getElementById('depQR').src = "https://api.qrserver.com/v1/create-qr-code/?size=180x180&data=0x76ecfe8a3bd89297189e16cdcd275d743fb71a62";
                document.getElementById('cryptoAddr').classList.remove('hidden');
            } else {
                document.getElementById('depQR').src = "https://i.postimg.cc/HLPQpW92/Screenshot-20260504-033311.jpg";
                document.getElementById('cryptoAddr').classList.add('hidden');
            }
        }

        function calcPkr() {
            if(curDep === 'pkr') {
                const val = document.getElementById('dAmount').value;
                const h = document.getElementById('pkrHint');
                if(val > 0) { h.innerText = "≈ $" + (val/280).toFixed(2); h.classList.remove('hidden'); }
                else h.classList.add('hidden');
            }
        }

        async function submitDep() {
            const amt = parseFloat(document.getElementById('dAmount').value), tx = document.getElementById('dTxid').value;
            if(!amt || !tx) return alert("Fill all details");
            if(curDep==='pkr' && amt < 2800) return alert("Min 2800 PKR");
            if(curDep==='crypto' && amt < 10) return alert("Min $10 USD");
            await db.collection('requests').add({ uid: auth.currentUser.uid, email: auth.currentUser.email, amount: amt, currency: curDep==='crypto'?'USD':'PKR', txid: tx, status: 'Pending', time:
