<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Dubai Live Trade | Member Hub</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-firestore-compat.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap');
        html, body { background: #020408; color: #e2e8f0; font-family: 'Plus Jakarta Sans', sans-serif; margin: 0; min-height: 100vh; overflow-x: hidden; }
        
        /* Flash & Loading Protection */
        #authSec, #dashboard { display: none !important; }
        #loading-screen { position: fixed; inset: 0; background: #020408; display: flex; align-items: center; justify-content: center; z-index: 9999; }
        .spinner { width: 40px; height: 40px; border: 3px solid rgba(234, 179, 8, 0.1); border-top-color: #eab308; border-radius: 50%; animation: spin 1s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }
        
        /* Aapka Original CSS yahan se shuru hota hai */
        .glass { background: rgba(15, 23, 42, 0.8); backdrop-filter: blur(16px); border: 1px solid rgba(255,255,255,0.05); }
        .history-card { background: rgba(255,255,255,0.02); border-radius: 12px; padding: 12px; margin-bottom: 8px; display: flex; justify-content: space-between; align-items: center; border: 1px solid rgba(255,255,255,0.03); }
        .status-badge { font-size: 7px; padding: 2px 6px; border-radius: 4px; font-weight: 800; text-transform: uppercase; }
        .status-badge.success { background: rgba(34,197,94,0.1); color: #22c55e; }
        .status-badge.pending { background: rgba(234,179,8,0.1); color: #eab308; }
    </style>
</head>
<body>

    <div id="loading-screen"><div class="spinner"></div></div>

    <div id="authSec" class="min-h-screen flex flex-col items-center justify-center p-6">
        <h1 class="text-2xl font-black text-white mb-2 italic">DUBAI LIVE TRADE</h1>
        <p class="text-gray-500 text-[10px] uppercase tracking-[4px] mb-8">Secure Terminal Access</p>
        <div class="glass w-full max-w-sm rounded-3xl p-8 space-y-4">
             <p class="text-center text-[10px] text-gray-500">Please login from main terminal</p>
        </div>
    </div>

    <div id="dashboard" class="p-4">
        <div class="glass rounded-3xl p-6 mb-4 relative overflow-hidden">
            <p class="text-[10px] text-gray-400 uppercase tracking-widest mb-1">Available Balance</p>
            <h2 id="balanceDisp" class="text-4xl font-black text-white">$0.00</h2>
            <p id="uEmail" class="text-[9px] text-gray-500 mt-2 opacity-50 uppercase"></p>
        </div>
        
        <div class="flex gap-2 mb-6">
            <button onclick="loadHistory('requests')" class="flex-1 glass py-4 rounded-2xl text-[10px] font-black uppercase tracking-wider text-yellow-500">Deposits</button>
            <button onclick="loadHistory('withdrawals')" class="flex-1 glass py-4 rounded-2xl text-[10px] font-black uppercase tracking-wider text-gray-400">Withdrawals</button>
        </div>

        <div id="historyList">
             </div>
    </div>

    <script>
        // Aapka Firebase Config
        const firebaseConfig = {
            apiKey: "AIzaSy...",
            authDomain: "dubai-live-trade.firebaseapp.com",
            projectId: "dubai-live-trade",
            storageBucket: "dubai-live-trade.appspot.com",
            messagingSenderId: "...",
            appId: "..."
        };
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();

        auth.onAuthStateChanged(user => {
            const loader = document.getElementById('loading-screen');
            if(user) {
                document.getElementById('dashboard').style.display = 'block';
                document.getElementById('authSec').style.display = 'none';
                document.getElementById('uEmail').innerText = user.email;
                
                // Balance Update Logic
                db.collection('users').doc(user.uid).onSnapshot(doc => {
                    if(doc.exists) {
                        document.getElementById('balanceDisp').innerText = "$" + (doc.data().balance || 0).toFixed(2);
                    }
                });
                loadHistory('requests');
            } else {
                document.getElementById('authSec').style.display = 'flex';
                document.getElementById('dashboard').style.display = 'none';
            }
            loader.style.display = 'none';
        });

        function loadHistory(coll) {
            const list = document.getElementById('historyList');
            list.innerHTML = '<p class="text-center py-10 opacity-30 text-[8px] uppercase">Syncing...</p>';
            db.collection(coll).where('uid', '==', auth.currentUser.uid).onSnapshot(snap => {
                let html = '';
                snap.forEach(doc => {
                    const d = doc.data();
                    const st = d.status || 'Pending';
                    html += `<div class="history-card">
                        <div><p class="font-black text-white text-[9px] uppercase">${coll==='requests'?'Dep':'Wit'}</p></div>
                        <div class="text-right"><p class="font-black text-[10px] text-white">$${d.amount}</p><span class="status-badge ${st.toLowerCase()}">${st}</span></div>
                    </div>`;
                });
                list.innerHTML = html || '<p class="text-center py-10 text-[8px] opacity-20">NO DATA FOUND</p>';
            });
        }
    </script>
</body>
</html>
