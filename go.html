<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ProTrade | Redirecting...</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-firestore-compat.js"></script>
    
    <script>
        // Aapki Firebase Configuration
        const firebaseConfig = { 
            apiKey: "AIzaSyAySRA1YSpTpmC8WjnKmDhnNMHkEmkeP50", 
            authDomain: "waqas-47f30.firebaseapp.com", 
            projectId: "waqas-47f30", 
            storageBucket: "waqas-47f30.appspot.com", 
            messagingSenderId: "374104279093", 
            appId: "1:374104279093:web:6e1844b60456c700940364" 
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        async function handleRedirect() {
            try {
                // 1. URL se Referral Code (?ref=XXXX) pakarna
                const urlParams = new URLSearchParams(window.location.search);
                const refCode = urlParams.get('ref');

                if (refCode) {
                    // 2. Browser ki memory (LocalStorage) mein save karna
                    localStorage.setItem('referredBy', refCode);
                    console.log("Partner ID Saved:", refCode);

                    // 3. Database mein Partner ke 'Clicks' barhana
                    const partnerSnap = await db.collection('affiliates').where('refID', '==', refCode).get();
                    if (!partnerSnap.empty) {
                        const partnerDoc = partnerSnap.docs[0];
                        await db.collection('affiliates').doc(partnerDoc.id).update({
                            clicks: firebase.firestore.FieldValue.increment(1)
                        });
                    }
                }
            } catch (error) {
                console.error("Error:", error);
            } finally {
                // 4. Main Website par redirect karna
                window.location.href = "https://dubailivetrade.online/";
            }
        }

        // Page load hotay hi function chalayein
        window.onload = handleRedirect;
    </script>

    <style>
        body {
            background: #05070a;
            color: #eab308;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        .loader {
            width: 40px;
            height: 40px;
            border: 3px solid #1a1f29;
            border-top: 3px solid #eab308;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-bottom: 20px;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        p { font-size: 10px; font-weight: bold; letter-spacing: 3px; text-transform: uppercase; }
    </style>
</head>
<body>
    <div class="loader"></div>
    <p>Connecting to Secure Terminal...</p>
</body>
</html>
