<!DOCTYPE html>
<html>
<head>
    <title>Redirecting...</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-firestore-compat.js"></script>
</head>
<body style="background:#05070a; color:white; display:flex; align-items:center; justify-content:center; height:100vh; font-family:sans-serif;">
    <div style="text-align:center;">
        <p>Verifying Link...</p>
    </div>

    <script>
        const firebaseConfig = { apiKey: "AIzaSyAySRA1YSpTpmC8WjnKmDhnNMHkEmkeP50", authDomain: "waqas-47f30.firebaseapp.com", projectId: "waqas-47f30", storageBucket: "waqas-47f30.appspot.com", messagingSenderId: "374104279093", appId: "1:374104279093:web:6e1844b60456c700940364" };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        const urlParams = new URLSearchParams(window.location.search);
        const refID = urlParams.get('ref');

        if (refID) {
            localStorage.setItem('referredBy', refID);
            db.collection('affiliates').where('refID', '==', refID).get().then(snap => {
                if (!snap.empty) {
                    db.collection('affiliates').doc(snap.docs[0].id).update({
                        clicks: firebase.firestore.FieldValue.increment(1)
                    });
                }
            });
        }
        // Redirecting to the Registration Page (join.html)
        setTimeout(() => { window.location.href = "join.html"; }, 1000);
    </script>
</body>
</html>
